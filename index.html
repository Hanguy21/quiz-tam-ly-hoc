<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Tâm Lý Học Ứng Dụng – 206 Câu</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap');

  :root {
    --bg: #0f1624;
    --surface: #1a2236;
    --card: #212f47;
    --border: #2d4066;
    --accent: #4f8ef7;
    --accent2: #7c5cfc;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #e2e8f0;
    --muted: #8899b4;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Be Vietnam Pro', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #1a2236 0%, #0f1624 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }
  .header-title { font-size: 18px; font-weight: 700; }
  .header-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .sound-toggle {
    margin-left: auto;
    width: 40px; height: 40px; flex-shrink: 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; transition: all .15s; color: var(--text);
  }
  .sound-toggle:hover { border-color: var(--accent); }

  /* MAIN LAYOUT */
  .container { max-width: 960px; margin: 0 auto; padding: 32px 20px; }

  /* HOME SCREEN */
  #home-screen { display: block; }
  .home-hero {
    text-align: center;
    padding: 40px 20px 32px;
    background: linear-gradient(180deg, #1e2f50 0%, transparent 100%);
    border-radius: 20px;
    margin-bottom: 32px;
    border: 1px solid var(--border);
  }
  .home-hero h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
  .home-hero h1 span { background: linear-gradient(90deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .home-hero p { color: var(--muted); font-size: 15px; }

  .quiz-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }
  .quiz-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    cursor: pointer;
    transition: all .2s;
    position: relative;
    overflow: hidden;
  }
  .quiz-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transform: scaleX(0); transform-origin: left;
    transition: transform .2s;
  }
  .quiz-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(79,142,247,.15); }
  .quiz-card:hover::before { transform: scaleX(1); }
  .quiz-num { font-size: 28px; font-weight: 800; color: var(--accent); margin-bottom: 4px; }
  .quiz-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .quiz-info { font-size: 12px; color: var(--muted); }
  .quiz-topics { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 4px; }
  .topic-tag {
    font-size: 10px; padding: 2px 8px;
    background: rgba(79,142,247,.12); color: var(--accent);
    border-radius: 20px; border: 1px solid rgba(79,142,247,.2);
  }
  .quiz-score-badge {
    position: absolute; top: 12px; right: 12px;
    font-size: 11px; font-weight: 700;
    padding: 2px 8px; border-radius: 20px;
    display: none;
  }
  .quiz-score-badge.show { display: block; }
  .badge-good { background: rgba(34,197,94,.2); color: var(--green); }
  .badge-mid { background: rgba(245,158,11,.2); color: var(--yellow); }
  .badge-bad { background: rgba(239,68,68,.2); color: var(--red); }

  /* QUIZ SCREEN */
  #quiz-screen { display: none; }

  .quiz-header {
    display: flex; align-items: center; gap: 16px; margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .back-btn {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 8px 16px; border-radius: 8px;
    cursor: pointer; font-size: 14px; font-family: inherit;
    display: flex; align-items: center; gap: 6px;
    transition: all .15s;
  }
  .back-btn:hover { border-color: var(--accent); }
  .quiz-title-bar { flex: 1; }
  .quiz-title-bar h2 { font-size: 18px; font-weight: 700; }
  .quiz-progress-info { font-size: 12px; color: var(--muted); }

  .progress-bar-wrap { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 28px; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg,var(--accent),var(--accent2)); border-radius: 2px; transition: width .3s; }

  /* QUESTION CARD */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 16px;
  }
  .q-number {
    font-size: 11px; font-weight: 700; color: var(--accent);
    text-transform: uppercase; letter-spacing: .08em; margin-bottom: 12px;
  }
  .q-text { font-size: 16px; font-weight: 600; line-height: 1.6; margin-bottom: 20px; }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    display: flex; align-items: flex-start; gap: 12px;
    background: var(--card); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 14px 16px;
    cursor: pointer; text-align: left; transition: all .15s;
    font-family: inherit; color: var(--text); font-size: 14px; line-height: 1.5;
    width: 100%;
  }
  .option-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(79,142,247,.08); }
  .opt-letter {
    width: 28px; height: 28px; flex-shrink: 0;
    background: rgba(255,255,255,.07); border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
  }
  .option-btn.selected .opt-letter { background: var(--accent); }
  .option-btn.correct { border-color: var(--green); background: rgba(34,197,94,.08); }
  .option-btn.correct .opt-letter { background: var(--green); }
  .option-btn.wrong { border-color: var(--red); background: rgba(239,68,68,.08); }
  .option-btn.wrong .opt-letter { background: var(--red); }
  .option-btn:disabled { cursor: default; }

  /* NAV */
  .nav-row {
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    margin-top: 20px; justify-content: space-between;
  }
  .nav-left { display: flex; gap: 10px; }
  .btn {
    padding: 10px 22px; border-radius: 9px; border: none;
    font-family: inherit; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all .15s;
  }
  .btn-primary { background: linear-gradient(135deg,var(--accent),var(--accent2)); color: #fff; }
  .btn-primary:hover { opacity: .88; transform: translateY(-1px); }
  .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
  .btn-outline:hover { border-color: var(--accent); }
  .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

  /* RESULT */
  #result-screen { display: none; }
  .result-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 40px; text-align: center;
    margin-bottom: 24px;
  }
  .result-score {
    font-size: 64px; font-weight: 800;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .result-label { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .result-sub { color: var(--muted); font-size: 14px; }
  .result-stats {
    display: flex; gap: 16px; justify-content: center; margin-top: 24px; flex-wrap: wrap;
  }
  .stat-box {
    background: var(--card); border-radius: 12px; padding: 16px 24px; min-width: 120px;
  }
  .stat-val { font-size: 26px; font-weight: 800; margin-bottom: 4px; }
  .stat-lbl { font-size: 12px; color: var(--muted); }

  /* REVIEW */
  .review-section { margin-top: 24px; }
  .review-section h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: var(--muted); }
  .review-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; margin-bottom: 12px;
  }
  .review-item.correct-item { border-left: 3px solid var(--green); }
  .review-item.wrong-item { border-left: 3px solid var(--red); }
  .review-q { font-size: 14px; font-weight: 600; margin-bottom: 10px; }
  .review-ans { font-size: 13px; margin-bottom: 4px; }
  .review-ans span { font-weight: 600; }
  .correct-ans { color: var(--green); }
  .wrong-ans { color: var(--red); }

  /* QUESTION NAV DOT */
  .q-nav { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
  .q-dot {
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; cursor: pointer;
    background: var(--card); border: 1.5px solid var(--border);
    transition: all .1s; color: var(--muted);
  }
  .q-dot.answered { background: rgba(79,142,247,.15); border-color: var(--accent); color: var(--accent); }
  .q-dot.current { background: var(--accent); border-color: var(--accent); color: #fff; }
  .q-dot:hover { border-color: var(--accent); }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .container { padding: 20px 12px; }
    .q-card { padding: 20px; }
    .result-score { font-size: 48px; }
    .quiz-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🧠</div>
  <div>
    <div class="header-title">Tâm Lý Học Ứng Dụng</div>
    <div class="header-sub">206 Câu Trắc Nghiệm · 7 Bộ Quiz</div>
  </div>
  <button class="sound-toggle" id="sound-toggle" onclick="toggleSound()" title="Bật/tắt âm thanh">🔊</button>
</div>

<!-- HOME -->
<div class="container">
<div id="home-screen">
  <div class="home-hero">
    <h1>Ôn Tập <span>Tâm Lý Học</span></h1>
    <p>Chọn một bộ quiz để bắt đầu luyện tập · Mỗi bộ gồm 30 câu hỏi</p>
  </div>
  <div class="quiz-grid" id="quiz-grid"></div>
</div>

<!-- QUIZ -->
<div id="quiz-screen">
  <div class="quiz-header">
    <button class="back-btn" onclick="goHome()">← Về trang chủ</button>
    <div class="quiz-title-bar">
      <h2 id="quiz-title-bar"></h2>
      <div class="quiz-progress-info" id="quiz-prog-info"></div>
    </div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
  </div>
  
  <!-- Question dots -->
  <div class="q-nav" id="q-nav"></div>
  <br>

  <div class="q-card" id="q-card">
    <div class="q-number" id="q-number"></div>
    <div class="q-text" id="q-text"></div>
    <div class="options" id="q-options"></div>
  </div>

  <div class="nav-row">
    <div class="nav-left">
      <button class="btn btn-outline" id="btn-prev" onclick="prevQ()">← Trước</button>
      <button class="btn btn-outline" id="btn-next" onclick="nextQ()">Tiếp →</button>
    </div>
    <button class="btn btn-primary" id="btn-submit" onclick="submitQuiz()">Nộp bài</button>
  </div>
</div>

<!-- RESULT -->
<div id="result-screen">
  <div class="result-card">
    <div class="result-score" id="res-score"></div>
    <div class="result-label" id="res-label"></div>
    <div class="result-sub" id="res-sub"></div>
    <div class="result-stats">
      <div class="stat-box">
        <div class="stat-val" id="stat-correct" style="color:var(--green)"></div>
        <div class="stat-lbl">Đúng</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="stat-wrong" style="color:var(--red)"></div>
        <div class="stat-lbl">Sai</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="stat-skip" style="color:var(--yellow)"></div>
        <div class="stat-lbl">Bỏ qua</div>
      </div>
    </div>
  </div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;">
    <button class="btn btn-outline" onclick="goHome()">← Về trang chủ</button>
    <button class="btn btn-primary" onclick="retakeQuiz()">🔄 Làm lại</button>
    <button class="btn btn-outline" onclick="showReview()">📋 Xem đáp án</button>
  </div>
  <div class="review-section" id="review-section"></div>
</div>
</div>

<script>
// ==================== DATA ====================
// Đáp án: a=0, b=1, c=2, d=3
// Format: [câu hỏi, [đáp án A, B, C, D], đáp án đúng (0-3)]

const allQuestions = [
  // === BÀI 1: Công dụng tâm lí (1-19) ===
  ["Trong các hiện tượng dưới đây, hiện tượng nào là tâm lí?",
    ["Thần kinh căng thẳng như dây đàn sắp đứt","Tim đập như muốn nhảy ra khỏi lồng ngực","Ăn, ngủ đều kém","Bồn chồn như có hẹn với ai"], 3],
  ["Tâm lí người là:",
    ["Do một lực lượng siêu nhiên sinh ra","Do não sản sinh ra, tương tự như gan tiết ra mật","Sự phản ánh hiện thực khách quan vào não người qua lăng kính chủ quan","Cả a, b, c"], 2],
  ["Hiện tượng nào cho thấy tâm lí tác động đến sinh lý?",
    ["Lo lắng đến mất ngủ","Mệt mỏi không minh mẫn","Mắt kém tri giác kém","Ăn uống đầy đủ giúp cơ thể khỏe mạnh"], 0],
  ["Hiện tượng nào cho thấy sinh lý có ảnh hưởng rõ rệt đến tâm lí?",
    ["Tuyến nội tiết làm thay đổi tâm trạng","Lạnh làm run người","Buồn rầu làm ngưng trệ tiêu hóa","Thẹn làm đỏ mặt"], 0],
  ["Tâm lí người có nguồn gốc từ:",
    ["Não người","Hoạt động của cá nhân","Thế giới khách quan","Giao tiếp của cá nhân"], 2],
  ["Những đứa trẻ do động vật nuôi từ nhỏ không có được tâm lí người vì:",
    ["Các mối quan hệ xã hội quy định bản chất tâm lí người","Môi trường sống quy định bản chất tâm lí người","Các dạng hoạt động và giao tiếp quy định trực tiếp sự hình thành tâm lí người","Cả a, b, c"], 3],
  ["Nhân tố tâm lí giữ vai trò cơ bản trong hoạt động của con người, bởi vì:",
    ["Tâm lí có chức năng định hướng cho hoạt động","Tâm lí điều khiển, kiểm tra và điều chỉnh hoạt động","Tâm lí là động lực thúc đẩy con người hoạt động","Cả a, b, c"], 3],
  ["Đâu không phải là chức năng của các hiện tượng tâm lí người?",
    ["Định hướng hoạt động","Điều chỉnh hoạt động","Điều khiển hoạt động","Dự đoán hoạt động"], 3],
  ["\"Tâm lý là động lực thôi thúc, lôi cuốn con người hoạt động, khắc phục mọi khó khăn vươn tới mục đích\". Chức năng nào đã được đề cập?",
    ["Động lực","Điều khiển","Điều chỉnh","Định hướng"], 0],
  ["Phản ánh tâm lí người là một loại phản ánh đặc biệt vì:",
    ["Hình ảnh tâm lí là sự phản ánh hiện thực khách quan vào não","Hình ảnh tâm lí là bản sao chép về thế giới khách quan","Hình ảnh tâm lí mang tính sinh động, sáng tạo","Hình ảnh tâm lí là dấu vết của thế giới khách quan"], 2],
  ["Hiện tượng nào dưới đây là trạng thái tâm lí?",
    ["Lành lạnh","Căng thẳng","Nhạy cảm","Yêu đời"], 1],
  ["Trong các tình huống, đâu là quá trình tâm lí?",
    ["Thoáng thấy một vật gì đo đỏ lướt qua","Cô ta do dự trước quyết định học thêm Pháp văn","Chị ấy luôn thích thú học môn thể dục thẩm mỹ","Tôi chăm chú nghe giảng bài"], 3],
  ["Những hiện tượng nào là thuộc tính tâm lí?",
    ["Nghe và nghĩ về những điều thầy giảng","Chăm chú ghi chép bài","Trung thực, không quay cóp khi làm bài thi","Giải bài tập"], 2],
  ["Hiện tượng nào dưới đây là ý thức?",
    ["Học sinh làm tính nhân nhanh chóng không nhớ tới quy tắc","Học sinh quyết định thi vào Sư phạm và giải thích vì em rất yêu trẻ","Trẻ sơ sinh nắm chặt ngón tay người lớn khi chạm vào bàn tay","Khi say rượu Minh nói ra điều tâm sự mà trước đây chính Minh còn mơ hồ"], 1],
  ["Khi đi du lịch, dù đến cùng địa điểm nhưng mỗi lần đến lại mang cảm xúc khác nhau. Điều này chứng tỏ:",
    ["Tâm lý người mang tính tích cực","Tâm lý người mang tính tiêu cực","Tâm lý người mang bản chất xã hội - văn hóa","Tâm lý người mang tính chủ thể"], 3],
  ["Các quá trình tâm lí là những hiện tượng tâm lí có đặc điểm nào?",
    ["Thời gian tương đối ngắn, có mở đầu, diễn biến, kết thúc tương đối rõ ràng","Thời gian tương đối ngắn, không mở đầu, không diễn biến, kết thúc không rõ ràng","Thời gian tương đối ngắn, không mở đầu, diễn biến, kết thúc tương đối rõ ràng","Thời gian tương đối ngắn, có mở đầu, diễn biến, kết thúc không rõ ràng"], 0],
  ["Thuộc tính tâm lí mang những đặc điểm nào?",
    ["Không thay đổi","Tương đối ổn định, bền vững","Thay đổi theo thời gian","Đặc trưng cho mỗi cá thể và có tính độc đáo"], 1],
  ["Hiện tượng nào dưới đây là quá trình tâm lí?",
    ["Giải bài tập","Chăm chú ghi chép bài","Hồi hộp khi đi thi","Trung thực, không quay cóp khi làm bài thi"], 0],
  ["Hiện tượng nào dưới đây là trạng thái tâm lí?",
    ["Chăm chú nghe giảng bài","Tập thể dục buổi sáng","Thoáng thấy một vật gì đo đỏ lướt qua","Chị ấy luôn thích thú học môn thể dục thẩm mĩ"], 0],

  // === BÀI 2: Cảm giác - Tri giác (20-54) ===
  ["Đặc điểm thể hiện sự khác biệt căn bản của tri giác so với cảm giác là:",

  ["Yêu cầu học sinh chỉ ra giống và khác nhau của khí hậu châu Âu và châu Á. Giáo dục năng lực nào?",
    ["Trí nhớ","Tư duy","Tưởng tượng","Óc quan sát"], 1],
  ["Yêu cầu học sinh căn cứ mô tả bài học để hình dung bức tranh thiên nhiên. Giáo dục năng lực nào?",
    ["Trí nhớ","Tư duy","Tưởng tượng","Óc quan sát"], 2],
];

// ==================== QUIZ SETS ====================
const QUIZ_SIZE = 30;
const NUM_SETS = 7;
const quizSets = [];
for (let i = 0; i < NUM_SETS; i++) {
  const chunk = allQuestions.slice(i * QUIZ_SIZE, (i + 1) * QUIZ_SIZE);
  if (chunk.length === 0) continue;
  quizSets.push({
    id: i + 1,
    name: `Bộ Quiz ${i + 1}`,
    questions: chunk,
    startIndex: i * QUIZ_SIZE
  });
}

const quizTopics = [
  ["Công dụng TL","Cảm giác","Tri giác"],
  ["Tri giác","Chú ý","Trí nhớ"],
  ["Trí nhớ","Tư duy","Tưởng tượng"],
  ["Tưởng tượng","Mức Khá"],
  ["Mức Khá","Cảm giác Khá"],
  ["Chú ý Khá","Tư duy Khá","Mức Giỏi"],
  ["Mức Giỏi","Cảm giác Giỏi","Tư duy Giỏi"],
];

// ==================== STATE ====================
let currentSet = null;
let currentQ = 0;
let answers = [];
let reviewed = false;
let scores = {};

// ==================== SOUND ====================
let soundEnabled = localStorage.getItem('quizSoundEnabled') !== 'false';
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return null;
    audioCtx = new AC();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playTone(freq, duration, type, delay, gainVal) {
  if (!soundEnabled) return;
  const ctx = getAudioCtx();
  if (!ctx) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  const t0 = ctx.currentTime + (delay || 0);
  gain.gain.setValueAtTime(0, t0);
  gain.gain.linearRampToValueAtTime(gainVal || 0.15, t0 + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, t0 + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(t0);
  osc.stop(t0 + duration + 0.02);
}

function playCorrectSound() {
  playTone(880, 0.12, 'sine', 0, 0.15);
  playTone(1318.5, 0.2, 'sine', 0.1, 0.15);
}

function playWrongSound() {
  playTone(220, 0.28, 'sawtooth', 0, 0.1);
  playTone(174.6, 0.32, 'sawtooth', 0.08, 0.09);
}

function playClickSound() {
  playTone(700, 0.05, 'square', 0, 0.04);
}

function playCompleteSound() {
  const notes = [523.25, 659.25, 783.99, 1046.5];
  notes.forEach((f, i) => playTone(f, 0.22, 'sine', i * 0.12, 0.13));
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  localStorage.setItem('quizSoundEnabled', soundEnabled);
  updateSoundBtn();
  if (soundEnabled) playClickSound();
}

function updateSoundBtn() {
  const btn = document.getElementById('sound-toggle');
  if (btn) btn.textContent = soundEnabled ? '🔊' : '🔇';
}

// ==================== INIT ====================
function init() {
  const grid = document.getElementById('quiz-grid');
  grid.innerHTML = '';
  quizSets.forEach((set, i) => {
    const card = document.createElement('div');
    card.className = 'quiz-card';
    card.onclick = () => startQuiz(i);
    const sc = scores[i];
    const badgeHtml = sc != null ? `<div class="quiz-score-badge show ${sc>=80?'badge-good':sc>=50?'badge-mid':'badge-bad'}">${sc}%</div>` : '';
    card.innerHTML = `
      ${badgeHtml}
      <div class="quiz-num">0${i+1}</div>
      <div class="quiz-name">${set.name}</div>
      <div class="quiz-info">${set.questions.length} câu · Câu ${set.startIndex+1}–${set.startIndex+set.questions.length}</div>
      <div class="quiz-topics">${(quizTopics[i]||[]).map(t=>`<span class="topic-tag">${t}</span>`).join('')}</div>
    `;
    grid.appendChild(card);
  });
}

// ==================== QUIZ LOGIC ====================
function startQuiz(idx) {
  currentSet = idx;
  currentQ = 0;
  answers = new Array(quizSets[idx].questions.length).fill(null);
  reviewed = false;
  document.getElementById('home-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('quiz-title-bar').textContent = quizSets[idx].name;
  renderQNav();
  renderQ();
}

function renderQNav() {
  const nav = document.getElementById('q-nav');
  nav.innerHTML = '';
  const total = quizSets[currentSet].questions.length;
  for (let i = 0; i < total; i++) {
    const dot = document.createElement('div');
    dot.className = 'q-dot' + (answers[i]!==null?' answered':'') + (i===currentQ?' current':'');
    dot.textContent = i+1;
    dot.onclick = () => { currentQ = i; renderQ(); renderQNav(); };
    nav.appendChild(dot);
  }
}

function renderQ() {
  const set = quizSets[currentSet];
  const q = set.questions[currentQ];
  const total = set.questions.length;

  document.getElementById('q-number').textContent = `Câu ${currentQ+1} / ${total}`;
  document.getElementById('q-text').textContent = q[0];
  document.getElementById('quiz-prog-info').textContent = `${answers.filter(a=>a!==null).length} / ${total} đã trả lời`;
  document.getElementById('progress-fill').style.width = ((currentQ+1)/total*100)+'%';
  document.getElementById('btn-prev').disabled = currentQ === 0;

  const opts = document.getElementById('q-options');
  opts.innerHTML = '';
  const letters = ['A','B','C','D'];
  const hasAnswered = answers[currentQ] !== null;
  const correctIdx = q[2];
  q[1].forEach((opt, i) => {
    const btn = document.createElement('button');
    let cls = 'option-btn';
    if (hasAnswered) {
      if (i === correctIdx) cls += ' correct';
      else if (i === answers[currentQ] && i !== correctIdx) cls += ' wrong';
    }
    btn.className = cls;
    btn.disabled = hasAnswered;
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span>${opt}</span>`;
    if (!hasAnswered) btn.onclick = () => selectAnswer(i);
    opts.appendChild(btn);
  });

  // Feedback message
  let fb = document.getElementById('q-feedback');
  if (fb) fb.remove();
  if (hasAnswered) {
    const isRight = answers[currentQ] === correctIdx;
    fb = document.createElement('div');
    fb.id = 'q-feedback';
    fb.style.cssText = `margin-top:16px;padding:12px 16px;border-radius:10px;font-size:14px;font-weight:600;`;
    if (isRight) {
      fb.style.background = 'rgba(34,197,94,.12)';
      fb.style.color = 'var(--green)';
      fb.textContent = '✅ Chính xác!';
    } else {
      fb.style.background = 'rgba(239,68,68,.12)';
      fb.style.color = 'var(--red)';
      fb.textContent = `❌ Sai rồi. Đáp án đúng là ${letters[correctIdx]}.`;
    }
    document.getElementById('q-card').appendChild(fb);
  }

  document.getElementById('btn-next').textContent = currentQ < total-1 ? 'Tiếp →' : 'Câu cuối';
  renderQNav();
}

function selectAnswer(idx) {
  answers[currentQ] = idx;
  const correctIdx = quizSets[currentSet].questions[currentQ][2];
  if (idx === correctIdx) playCorrectSound();
  else playWrongSound();
  renderQ();
}

function prevQ() {
  if (currentQ > 0) { currentQ--; playClickSound(); renderQ(); }
}

function nextQ() {
  if (currentQ < quizSets[currentSet].questions.length - 1) { currentQ++; playClickSound(); renderQ(); }
}

function submitQuiz() {
  const unanswered = answers.filter(a=>a===null).length;
  if (unanswered > 0) {
    if (!confirm(`Bạn còn ${unanswered} câu chưa trả lời. Bạn có muốn nộp bài không?`)) return;
  }
  showResult();
}

function showResult() {
  playCompleteSound();
  const set = quizSets[currentSet];
  let correct = 0, wrong = 0, skip = 0;
  answers.forEach((ans, i) => {
    if (ans === null) skip++;
    else if (ans === set.questions[i][2]) correct++;
    else wrong++;
  });
  const total = set.questions.length;
  const pct = Math.round(correct/total*100);
  scores[currentSet] = pct;

  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
  document.getElementById('res-score').textContent = pct+'%';
  document.getElementById('res-label').textContent = pct>=80?'🎉 Xuất sắc!':pct>=65?'👍 Khá tốt!':pct>=50?'📚 Cần ôn thêm':'💪 Hãy cố gắng hơn!';
  document.getElementById('res-sub').textContent = set.name + ' · ' + correct + '/' + total + ' câu đúng';
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = wrong;
  document.getElementById('stat-skip').textContent = skip;
  document.getElementById('review-section').innerHTML = '';
  reviewed = false;
}

function showReview() {
  if (reviewed) { document.getElementById('review-section').innerHTML = ''; reviewed = false; return; }
  reviewed = true;
  const set = quizSets[currentSet];
  const letters = ['A','B','C','D'];
  let html = '<h3>📋 Chi tiết đáp án</h3>';
  set.questions.forEach((q, i) => {
    const ans = answers[i];
    const correct = q[2];
    const isRight = ans === correct;
    html += `<div class="review-item ${isRight?'correct-item':'wrong-item'}">
      <div class="review-q">${i+1}. ${q[0]}</div>`;
    if (ans !== null) {
      html += `<div class="review-ans ${isRight?'correct-ans':'wrong-ans'}">Bạn chọn: <span>${letters[ans]}. ${q[1][ans]}</span></div>`;
    } else {
      html += `<div class="review-ans" style="color:var(--yellow)">Bỏ qua</div>`;
    }
    if (!isRight) {
      html += `<div class="review-ans correct-ans">Đáp án đúng: <span>${letters[correct]}. ${q[1][correct]}</span></div>`;
    }
    html += '</div>';
  });
  document.getElementById('review-section').innerHTML = html;
}

function retakeQuiz() {
  startQuiz(currentSet);
  document.getElementById('result-screen').style.display = 'none';
}

function goHome() {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('home-screen').style.display = 'block';
  init();
}

init();
updateSoundBtn();
</script>
</body>
</html>
