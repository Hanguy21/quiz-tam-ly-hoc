];

// ==================== STATE ====================
let currentSet = null;
let currentQ = 0;
let answers = [];
let reviewed = false;
let scores = {};

// ==================== SOUND ====================
let soundEnabled = localStorage.getItem('quizSoundEnabled') !== 'false';
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return null;
    audioCtx = new AC();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playTone(freq, duration, type, delay, gainVal) {
  if (!soundEnabled) return;
  const ctx = getAudioCtx();
  if (!ctx) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  const t0 = ctx.currentTime + (delay || 0);
  gain.gain.setValueAtTime(0, t0);
  gain.gain.linearRampToValueAtTime(gainVal || 0.15, t0 + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, t0 + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(t0);
  osc.stop(t0 + duration + 0.02);
}

function playCorrectSound() {
  playTone(880, 0.12, 'sine', 0, 0.15);
  playTone(1318.5, 0.2, 'sine', 0.1, 0.15);
}

function playWrongSound() {
  playTone(220, 0.28, 'sawtooth', 0, 0.1);
  playTone(174.6, 0.32, 'sawtooth', 0.08, 0.09);
}

function playClickSound() {
  playTone(700, 0.05, 'square', 0, 0.04);
}

function playCompleteSound() {
  const notes = [523.25, 659.25, 783.99, 1046.5];
  notes.forEach((f, i) => playTone(f, 0.22, 'sine', i * 0.12, 0.13));
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  localStorage.setItem('quizSoundEnabled', soundEnabled);
  updateSoundBtn();
  if (soundEnabled) playClickSound();
}

function updateSoundBtn() {
  const btn = document.getElementById('sound-toggle');
  if (btn) btn.textContent = soundEnabled ? '🔊' : '🔇';
}

// ==================== INIT ====================
function init() {
  const grid = document.getElementById('quiz-grid');
  grid.innerHTML = '';
  quizSets.forEach((set, i) => {
    const card = document.createElement('div');
    card.className = 'quiz-card';
    card.onclick = () => startQuiz(i);
    const sc = scores[i];
    const badgeHtml = sc != null ? `<div class="quiz-score-badge show ${sc>=80?'badge-good':sc>=50?'badge-mid':'badge-bad'}">${sc}%</div>` : '';
    card.innerHTML = `
      ${badgeHtml}
      <div class="quiz-num">0${i+1}</div>
      <div class="quiz-name">${set.name}</div>
      <div class="quiz-info">${set.questions.length} câu · Câu ${set.startIndex+1}–${set.startIndex+set.questions.length}</div>
      <div class="quiz-topics">${(quizTopics[i]||[]).map(t=>`<span class="topic-tag">${t}</span>`).join('')}</div>
    `;
    grid.appendChild(card);
  });
}

// ==================== QUIZ LOGIC ====================
function startQuiz(idx) {
  currentSet = idx;
  currentQ = 0;
  answers = new Array(quizSets[idx].questions.length).fill(null);
  reviewed = false;
  document.getElementById('home-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('quiz-title-bar').textContent = quizSets[idx].name;
  renderQNav();
  renderQ();
}

function renderQNav() {
  const nav = document.getElementById('q-nav');
  nav.innerHTML = '';
  const total = quizSets[currentSet].questions.length;
  for (let i = 0; i < total; i++) {
    const dot = document.createElement('div');
    dot.className = 'q-dot' + (answers[i]!==null?' answered':'') + (i===currentQ?' current':'');
    dot.textContent = i+1;
    dot.onclick = () => { currentQ = i; renderQ(); renderQNav(); };
    nav.appendChild(dot);
  }
}

function renderQ() {
  const set = quizSets[currentSet];
  const q = set.questions[currentQ];
  const total = set.questions.length;

  document.getElementById('q-number').textContent = `Câu ${currentQ+1} / ${total}`;
  document.getElementById('q-text').textContent = q[0];
  document.getElementById('quiz-prog-info').textContent = `${answers.filter(a=>a!==null).length} / ${total} đã trả lời`;
  document.getElementById('progress-fill').style.width = ((currentQ+1)/total*100)+'%';
  document.getElementById('btn-prev').disabled = currentQ === 0;

  const opts = document.getElementById('q-options');
  opts.innerHTML = '';
  const letters = ['A','B','C','D'];
  const hasAnswered = answers[currentQ] !== null;
  const correctIdx = q[2];
  q[1].forEach((opt, i) => {
    const btn = document.createElement('button');
    let cls = 'option-btn';
    if (hasAnswered) {
      if (i === correctIdx) cls += ' correct';
      else if (i === answers[currentQ] && i !== correctIdx) cls += ' wrong';
    }
    btn.className = cls;
    btn.disabled = hasAnswered;
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span>${opt}</span>`;
    if (!hasAnswered) btn.onclick = () => selectAnswer(i);
    opts.appendChild(btn);
  });

  // Feedback message
  let fb = document.getElementById('q-feedback');
  if (fb) fb.remove();
  let explainWhy = document.getElementById('explain-why-box');
  if (explainWhy) explainWhy.remove();
  let explainSum = document.getElementById('explain-summary-box');
  if (explainSum) explainSum.remove();

  if (hasAnswered) {
    const isRight = answers[currentQ] === correctIdx;
    fb = document.createElement('div');
    fb.id = 'q-feedback';
    fb.style.cssText = `margin-top:16px;padding:12px 16px;border-radius:10px;font-size:14px;font-weight:600;`;
    if (isRight) {
      fb.style.background = 'rgba(34,197,94,.12)';
      fb.style.color = 'var(--green)';
      fb.textContent = '✅ Chính xác!';
    } else {
      fb.style.background = 'rgba(239,68,68,.12)';
      fb.style.color = 'var(--red)';
      fb.textContent = `❌ Sai rồi. Đáp án đúng là ${letters[correctIdx]}.`;
    }
    document.getElementById('q-card').appendChild(fb);

    // Why explanation box
    const why = q[3];
    const summary = q[4];
    if (why) {
      const whyBox = document.createElement('div');
      whyBox.id = 'explain-why-box';
      whyBox.className = 'explain-box explain-why';
      whyBox.innerHTML = `<div class="explain-label">💡 Vì sao chọn đáp án ${letters[correctIdx]}</div><div class="explain-text">${why}</div>`;
      document.getElementById('q-card').appendChild(whyBox);
    }
    if (summary) {
      const sumBox = document.createElement('div');
      sumBox.id = 'explain-summary-box';
      sumBox.className = 'explain-box explain-summary';
      sumBox.innerHTML = `<div class="explain-label">📚 Tóm tắt kiến thức liên quan</div><div class="explain-text">${summary}</div>`;
      document.getElementById('q-card').appendChild(sumBox);
    }
  }

  document.getElementById('btn-next').textContent = currentQ < total-1 ? 'Tiếp →' : 'Câu cuối';
  renderQNav();
}

function selectAnswer(idx) {
  answers[currentQ] = idx;
  const correctIdx = quizSets[currentSet].questions[currentQ][2];
  if (idx === correctIdx) playCorrectSound();
  else playWrongSound();
  renderQ();
}

function prevQ() {
  if (currentQ > 0) { currentQ--; playClickSound(); renderQ(); }
}

function nextQ() {
  if (currentQ < quizSets[currentSet].questions.length - 1) { currentQ++; playClickSound(); renderQ(); }
}

function submitQuiz() {
  const unanswered = answers.filter(a=>a===null).length;
  if (unanswered > 0) {
    if (!confirm(`Bạn còn ${unanswered} câu chưa trả lời. Bạn có muốn nộp bài không?`)) return;
  }
  showResult();
}

function showResult() {
  playCompleteSound();
  const set = quizSets[currentSet];
  let correct = 0, wrong = 0, skip = 0;
  answers.forEach((ans, i) => {
    if (ans === null) skip++;
    else if (ans === set.questions[i][2]) correct++;
    else wrong++;
  });
  const total = set.questions.length;
  const pct = Math.round(correct/total*100);
  scores[currentSet] = pct;

  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
  document.getElementById('res-score').textContent = pct+'%';
  document.getElementById('res-label').textContent = pct>=80?'🎉 Xuất sắc!':pct>=65?'👍 Khá tốt!':pct>=50?'📚 Cần ôn thêm':'💪 Hãy cố gắng hơn!';
  document.getElementById('res-sub').textContent = set.name + ' · ' + correct + '/' + total + ' câu đúng';
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = wrong;
  document.getElementById('stat-skip').textContent = skip;
  document.getElementById('review-section').innerHTML = '';
  reviewed = false;
}

function showReview() {
  if (reviewed) { document.getElementById('review-section').innerHTML = ''; reviewed = false; return; }
  reviewed = true;
  const set = quizSets[currentSet];
  const letters = ['A','B','C','D'];
  let html = '<h3>📋 Chi tiết đáp án</h3>';
  set.questions.forEach((q, i) => {
    const ans = answers[i];
    const correct = q[2];
    const isRight = ans === correct;
    html += `<div class="review-item ${isRight?'correct-item':'wrong-item'}">
      <div class="review-q">${i+1}. ${q[0]}</div>`;
    if (ans !== null) {
      html += `<div class="review-ans ${isRight?'correct-ans':'wrong-ans'}">Bạn chọn: <span>${letters[ans]}. ${q[1][ans]}</span></div>`;
    } else {
      html += `<div class="review-ans" style="color:var(--yellow)">Bỏ qua</div>`;
    }
    if (!isRight) {
      html += `<div class="review-ans correct-ans">Đáp án đúng: <span>${letters[correct]}. ${q[1][correct]}</span></div>`;
    }
    html += '</div>';
  });
  document.getElementById('review-section').innerHTML = html;
}

function retakeQuiz() {
  startQuiz(currentSet);
  document.getElementById('result-screen').style.display = 'none';
}

function goHome() {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('home-screen').style.display = 'block';
  init();
}

init();
updateSoundBtn();
</script>
</body>
