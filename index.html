  ["\"Tạo ra hình ảnh chói lọi, rực sáng của tương lai mong muốn, thúc đẩy cá nhân vươn lên\" là loại tưởng tượng nào?",
    ["Tưởng tượng tích cực","Tưởng tượng tiêu cực","Ước mơ","Lý tưởng"], 3,
    "\"Hình ảnh chói lọi, rực sáng của tương lai, thúc đẩy cá nhân vươn lên\" chính là định nghĩa của lý tưởng (mạnh mẽ và lâu dài hơn ước mơ thông thường).",
    "Tưởng tượng phân theo tính chủ động và hiệu lực: Tưởng tượng tích cực (tạo hình ảnh đáp ứng nhu cầu, kích thích tính tích cực hành động của con người) và Tưởng tượng tiêu cực (tạo ra hình ảnh không được/không thể thực hiện trong thực tế, thường mang tính thay thế hành động thật — VD: mơ mộng viển vông). Trong tưởng tượng tích cực có 2 dạng đặc biệt: Ước mơ (hướng tới tương lai mong muốn của cá nhân, không trực tiếp thể hiện trong hoạt động hiện tại) và Lý tưởng (hình ảnh chói lọi, rực sáng, có tác dụng lôi cuốn mạnh mẽ toàn bộ hoạt động của cá nhân trong thời gian dài)."],
  ["Hiện tượng sinh lí và hiện tượng tâm lí thường:",
    ["Diễn ra song song trong não","Đồng nhất với nhau","Có quan hệ chặt chẽ với nhau","Có quan hệ chặt chẽ với nhau, tâm lí có cơ sở vật chất là não bộ"], 3,
    "Sinh lí và tâm lí có quan hệ chặt chẽ với nhau, trong đó tâm lí có cơ sở vật chất là hoạt động của não bộ (không phải hai hệ thống tách biệt hay đồng nhất với nhau).",
    "Tâm lí và sinh lí có quan hệ chặt chẽ, tâm lí có cơ sở vật chất là hoạt động của não bộ. Sinh lí ảnh hưởng đến tâm lí (VD: nội tiết tố thay đổi làm thay đổi tâm trạng) và ngược lại tâm lí cũng tác động đến sinh lí (VD: lo lắng gây mất ngủ, ăn kém)."],
  ["Điều kiện cần và đủ để có hiện tượng tâm lí người là:",
    ["Có thế giới khách quan và não","Thế giới khách quan tác động vào não và não hoạt động bình thường","Thế giới khách quan tác động vào não","Não hoạt động bình thường"], 1,
    "Điều kiện cần và đủ để có tâm lí người là: thế giới khách quan tác động vào não VÀ não phải hoạt động bình thường để tiếp nhận, xử lí sự tác động đó — thiếu một trong hai đều không đủ.",
    "Tâm lí người là sự phản ánh hiện thực khách quan vào não thông qua lăng kính chủ quan của mỗi người. Nó có nguồn gốc từ thế giới khách quan (chủ yếu là các mối quan hệ xã hội), được nảy sinh bằng hoạt động và giao tiếp. Vì mang tính chủ thể, mỗi người phản ánh thế giới theo cách riêng dựa trên kinh nghiệm, nhu cầu và đặc điểm hệ thần kinh của mình — đây là lí do hai người cùng nhìn một sự việc nhưng cảm nhận khác nhau."],
  ["Hành vi truy tìm dấu vết tội phạm của chó nghiệp vụ là hành vi nào?",
    ["Bản năng","Kỹ xảo","Trí tuệ","Kỹ thuật"], 1,
    "Hành vi truy tìm dấu vết của chó nghiệp vụ là hành vi đã được huấn luyện, lặp đi lặp lại thành thục — đây là kỹ xảo (kỹ năng đã tự động hóa), không phải bản năng bẩm sinh hay hành vi trí tuệ có ý thức như ở người.",
    "Ý thức là hình thức phản ánh tâm lí cao nhất, chỉ có ở con người, thể hiện ở khả năng nhận thức, tỏ thái độ và điều khiển hành vi một cách có mục đích, có lí do rõ ràng (khác với hành động bản năng hoặc vô thức/tự động hóa)."],
  ["Hiện tượng nào là thuộc tính tâm lí?",
    ["Học sinh B luôn thẳng thắn lên án các bạn không trung thực trong thi cử","Học sinh C cảm thấy hài lòng khi trình bày đúng kiến thức","Nghe và nghĩ về những điều thầy giảng","Tim đập như muốn nhảy ra khỏi lồng ngực"], 0,
    "\"Luôn thẳng thắn lên án...\" là một phẩm chất/tính cách ổn định, lặp lại — đây là thuộc tính tâm lí; các phương án khác là cảm xúc nhất thời (hài lòng), hoạt động đang diễn ra (nghe giảng), hoặc phản ứng sinh lí (tim đập nhanh).",
    "Ba loại hiện tượng tâm lí phân biệt theo thời gian tồn tại: Quá trình tâm lí (ngắn, có mở đầu-diễn biến-kết thúc rõ ràng, VD: đang suy nghĩ, đang nghe giảng); Trạng thái tâm lí (tồn tại lâu hơn nhưng không có mốc đầu-cuối rõ, là 'cái nền' đi kèm hoạt động, VD: chú ý, căng thẳng, hồi hộp); Thuộc tính tâm lí (ổn định, bền vững, đặc trưng riêng cho từng người, VD: tính trung thực, kiên trì)."],
  ["Nhà kinh doanh cần nghiên cứu môi trường xã hội của người tiêu dùng dựa vào cơ sở nào?",
    ["Tâm lý người do thượng đế sinh ra","Tâm lý người do não tiết ra","Tâm lý người có nguồn gốc tự nhiên","Tâm lý người có nguồn gốc xã hội"], 3,
    "Vì tâm lí người có nguồn gốc xã hội, nên muốn hiểu người tiêu dùng, nhà kinh doanh phải nghiên cứu môi trường xã hội — nơi hình thành nên tâm lí, thói quen, nhu cầu của họ.",
    "Tâm lí người mang bản chất xã hội - lịch sử: nó được hình thành, phát triển và biểu hiện trong hoạt động và các mối quan hệ giao tiếp xã hội, chứ không phải chỉ do yếu tố sinh học quyết định. Vì vậy trẻ em thiếu môi trường xã hội (bị động vật nuôi) sẽ không có tâm lí người bình thường; muốn hiểu tâm lí một nhóm khách hàng hay cá nhân, phải nghiên cứu môi trường sống, hoàn cảnh xã hội của họ."],
  ["Nhân tố nào là quan trọng nhất trong sự hình thành tự ý thức bản thân?",
    ["Hoạt động của cá nhân","Giao tiếp với người khác","Cá nhân tự nhận thức, tự tỏ thái độ, tự phân tích và điều khiển bản thân","Tiếp thu ý thức xã hội và nền văn hóa"], 2,
    "Tự ý thức được hình thành chủ yếu qua việc cá nhân tự nhận thức, tự đánh giá, tự tỏ thái độ và tự điều khiển hành vi của chính mình — đây là yếu tố quyết định trực tiếp, dù hoạt động và giao tiếp là điều kiện/con đường để có được điều đó.",
    "Ý thức là hình thức phản ánh tâm lí cao nhất, chỉ có ở con người, thể hiện ở khả năng nhận thức, tỏ thái độ và điều khiển hành vi một cách có mục đích, có lí do rõ ràng (khác với hành động bản năng hoặc vô thức/tự động hóa)."],
  ["Khi hình thành tâm lí con người, cần nghiên cứu hoàn cảnh môi trường là vì:",
    ["Tâm lý người có nguồn gốc là thế giới tự nhiên","Tâm lý người có nguồn gốc là thế giới khách quan","Tâm lý người mang tính chủ thể","Tâm lý người sẵn có từ khi sinh ra"], 1,
    "Vì tâm lí người có nguồn gốc là thế giới khách quan (bao gồm cả môi trường sống), nên phải nghiên cứu hoàn cảnh sống mới hiểu được nguồn gốc hình thành tâm lí của một cá nhân.",
    "Tâm lí người mang bản chất xã hội - lịch sử: nó được hình thành, phát triển và biểu hiện trong hoạt động và các mối quan hệ giao tiếp xã hội, chứ không phải chỉ do yếu tố sinh học quyết định. Vì vậy trẻ em thiếu môi trường xã hội (bị động vật nuôi) sẽ không có tâm lí người bình thường; muốn hiểu tâm lí một nhóm khách hàng hay cá nhân, phải nghiên cứu môi trường sống, hoàn cảnh xã hội của họ."],
  ["Hoạt động học ở người học hướng vào làm thay đổi:",
    ["Đối tượng của hoạt động học","Khách thể của hoạt động học","Động cơ của hoạt động học","Chủ thể của hoạt động học"], 3,
    "Hoạt động học có đối tượng đặc thù là tri thức, kỹ năng nhưng mục đích cuối cùng là làm thay đổi CHÍNH CHỦ THỂ (người học) — phát triển năng lực, phẩm chất bản thân, chứ không nhằm biến đổi đối tượng học tập.",
    "Tâm lí người là sự phản ánh hiện thực khách quan vào não thông qua lăng kính chủ quan của mỗi người. Nó có nguồn gốc từ thế giới khách quan (chủ yếu là các mối quan hệ xã hội), được nảy sinh bằng hoạt động và giao tiếp. Vì mang tính chủ thể, mỗi người phản ánh thế giới theo cách riêng dựa trên kinh nghiệm, nhu cầu và đặc điểm hệ thần kinh của mình — đây là lí do hai người cùng nhìn một sự việc nhưng cảm nhận khác nhau."],
  ["\"Giao tiếp được thực hiện bằng các tín hiệu phi ngôn ngữ: qua cử chỉ, điệu bộ, nét mặt\". Là cách phân loại nào?",
    ["Giao tiếp vật chất","Giao tiếp phi ngôn ngữ","Giao tiếp không chính thức","Giao tiếp chính thức"], 1,
    "Giao tiếp qua cử chỉ, điệu bộ, nét mặt (không dùng lời) chính là giao tiếp phi ngôn ngữ.",
    "Giao tiếp là hoạt động xác lập, vận hành quan hệ giữa người với người nhằm trao đổi thông tin, tình cảm, hiểu biết lẫn nhau. Phân loại theo phương tiện: Giao tiếp vật chất (qua hành động với vật thể), Giao tiếp bằng tín hiệu phi ngôn ngữ (cử chỉ, điệu bộ, nét mặt), Giao tiếp ngôn ngữ (bằng lời nói/chữ viết). Đặc điểm phân biệt giao tiếp với hành vi bản năng của động vật: giao tiếp ở người có ý thức, có mục đích, có nội dung xã hội — còn tiếng kêu hay hành động bản năng của động vật (dù để 'trao đổi tín hiệu') không được coi là ngôn ngữ hay giao tiếp theo nghĩa tâm lí học người."],
  ["\"Giao tiếp được thực hiện thông qua các hành động với vật thể\". Là cách phân loại nào?",
    ["Giao tiếp vật chất","Giao tiếp phi ngôn ngữ","Giao tiếp không chính thức","Giao tiếp chính thức"], 0,
    "Giao tiếp thông qua hành động với vật thể (không qua lời nói/cử chỉ trực tiếp giữa người-người) được xếp vào giao tiếp vật chất.",
    "Giao tiếp là hoạt động xác lập, vận hành quan hệ giữa người với người nhằm trao đổi thông tin, tình cảm, hiểu biết lẫn nhau. Phân loại theo phương tiện: Giao tiếp vật chất (qua hành động với vật thể), Giao tiếp bằng tín hiệu phi ngôn ngữ (cử chỉ, điệu bộ, nét mặt), Giao tiếp ngôn ngữ (bằng lời nói/chữ viết). Đặc điểm phân biệt giao tiếp với hành vi bản năng của động vật: giao tiếp ở người có ý thức, có mục đích, có nội dung xã hội — còn tiếng kêu hay hành động bản năng của động vật (dù để 'trao đổi tín hiệu') không được coi là ngôn ngữ hay giao tiếp theo nghĩa tâm lí học người."],
  ["Trường hợp nào dưới đây là sự giao tiếp?",
    ["Em bé đang ngắm cảnh đẹp thiên nhiên","Con khỉ gọi bầy","Em bé vuốt ve, trò chuyện với chú mèo","Cô giáo giảng bài"], 3,
    "Cô giáo giảng bài là hoạt động trao đổi thông tin có ý thức, có mục đích giữa người với người — đây là giao tiếp thực sự (khác hành vi bản năng của động vật hay hành động một chiều với vật/con vật của bé).",
    "Giao tiếp là hoạt động xác lập, vận hành quan hệ giữa người với người nhằm trao đổi thông tin, tình cảm, hiểu biết lẫn nhau. Phân loại theo phương tiện: Giao tiếp vật chất (qua hành động với vật thể), Giao tiếp bằng tín hiệu phi ngôn ngữ (cử chỉ, điệu bộ, nét mặt), Giao tiếp ngôn ngữ (bằng lời nói/chữ viết). Đặc điểm phân biệt giao tiếp với hành vi bản năng của động vật: giao tiếp ở người có ý thức, có mục đích, có nội dung xã hội — còn tiếng kêu hay hành động bản năng của động vật (dù để 'trao đổi tín hiệu') không được coi là ngôn ngữ hay giao tiếp theo nghĩa tâm lí học người."],
  ["Trường hợp nào là giao tiếp?",
    ["Con khỉ đầu đàn hú gọi các con khác","Người chiến sĩ biên phòng điều khiển chó tuần tra","Hai con khỉ bắt chấy cho nhau","Hai em học sinh truy bài cho nhau"], 3,
    "Hai học sinh truy bài cho nhau là trao đổi thông tin có ý thức, có mục đích rõ ràng giữa hai chủ thể người — đây là giao tiếp đích thực, khác với hành vi bản năng bầy đàn ở động vật hay hoạt động điều khiển một chiều.",
    "Giao tiếp là hoạt động xác lập, vận hành quan hệ giữa người với người nhằm trao đổi thông tin, tình cảm, hiểu biết lẫn nhau. Phân loại theo phương tiện: Giao tiếp vật chất (qua hành động với vật thể), Giao tiếp bằng tín hiệu phi ngôn ngữ (cử chỉ, điệu bộ, nét mặt), Giao tiếp ngôn ngữ (bằng lời nói/chữ viết). Đặc điểm phân biệt giao tiếp với hành vi bản năng của động vật: giao tiếp ở người có ý thức, có mục đích, có nội dung xã hội — còn tiếng kêu hay hành động bản năng của động vật (dù để 'trao đổi tín hiệu') không được coi là ngôn ngữ hay giao tiếp theo nghĩa tâm lí học người."],
  ["Ngôn ngữ là:",
    ["Hiện tượng tâm lí cá nhân","Quá trình giao tiếp xã hội","Mang dấu ấn cá nhân rõ rệt","Một hệ thống kí hiệu từ ngữ"], 3,
    "Ngôn ngữ đúng bản chất là một hệ thống kí hiệu từ ngữ mang tính xã hội, được quy ước chung để giao tiếp — không phải hiện tượng tâm lí cá nhân đơn thuần.",
    "Ngôn ngữ là một hệ thống kí hiệu từ ngữ mang tính xã hội (được cả cộng đồng quy ước và sử dụng chung), được cá nhân sử dụng làm phương tiện để giao tiếp và tư duy. Ngôn ngữ khác với tín hiệu bản năng ở động vật vì nó có tính khái quát, tính quy ước xã hội và gắn liền với ý thức con người."],
  ["Tiếng kêu của động vật dùng để trao đổi tín hiệu. Tiếng kêu đó được hiểu là:",
    ["Không phải là ngôn ngữ","Là loại ngôn ngữ riêng","Là loại ngôn ngữ đặc biệt","Là ngôn ngữ tượng thanh"], 0,
    "Tiếng kêu của động vật chỉ là tín hiệu bản năng, không mang tính khái quát và quy ước xã hội như ngôn ngữ loài người, nên không được coi là ngôn ngữ.",
    "Ngôn ngữ là một hệ thống kí hiệu từ ngữ mang tính xã hội (được cả cộng đồng quy ước và sử dụng chung), được cá nhân sử dụng làm phương tiện để giao tiếp và tư duy. Ngôn ngữ khác với tín hiệu bản năng ở động vật vì nó có tính khái quát, tính quy ước xã hội và gắn liền với ý thức con người."],
  ["Tâm lí người khác xa tâm lí động vật ở luận điểm nào?",
    ["Tâm lí người là kết quả của quá trình phản ánh hiện thực","Tâm lí người có tính chủ thể","Tâm lí người mang tính bản năng","Tâm lí người có bản chất xã hội và mang tính lịch sử"], 3,
    "Điểm khác biệt căn bản nhất giữa tâm lí người và động vật là tâm lí người mang bản chất xã hội và có tính lịch sử (hình thành, phát triển qua các mối quan hệ xã hội, được truyền lại qua các thế hệ), điều mà động vật không có.",
    "Tâm lí người mang bản chất xã hội - lịch sử: nó được hình thành, phát triển và biểu hiện trong hoạt động và các mối quan hệ giao tiếp xã hội, chứ không phải chỉ do yếu tố sinh học quyết định. Vì vậy trẻ em thiếu môi trường xã hội (bị động vật nuôi) sẽ không có tâm lí người bình thường; muốn hiểu tâm lí một nhóm khách hàng hay cá nhân, phải nghiên cứu môi trường sống, hoàn cảnh xã hội của họ."],
  ["Hình ảnh tâm lí mang tính chủ thể được cắt nghĩa bởi:",
    ["Sự khác nhau về môi trường sống","Sự phong phú của các mối quan hệ xã hội","Đặc điểm riêng về hệ thần kinh, hoàn cảnh sống và tính tích cực hoạt động","Tính tích cực hoạt động khác nhau"], 2,
    "Tính chủ thể của hình ảnh tâm lí được lý giải bởi sự khác biệt về đặc điểm hệ thần kinh, hoàn cảnh sống và mức độ tích cực hoạt động của mỗi cá nhân — đây là tổ hợp đầy đủ các yếu tố, không chỉ riêng môi trường hay hoạt động.",
    "Tâm lí người là sự phản ánh hiện thực khách quan vào não thông qua lăng kính chủ quan của mỗi người. Nó có nguồn gốc từ thế giới khách quan (chủ yếu là các mối quan hệ xã hội), được nảy sinh bằng hoạt động và giao tiếp. Vì mang tính chủ thể, mỗi người phản ánh thế giới theo cách riêng dựa trên kinh nghiệm, nhu cầu và đặc điểm hệ thần kinh của mình — đây là lí do hai người cùng nhìn một sự việc nhưng cảm nhận khác nhau."],
  ["Các hiện tượng tâm lí diễn ra trong thời gian dài, không có mở đầu, diễn biến và kết thúc rõ ràng là:",
    ["Quá trình tâm lí","Trạng thái tâm lí","Thuộc tính tâm lí","Không đủ cơ sở xác định rõ ràng"], 1,
    "Hiện tượng kéo dài, không có mốc đầu-cuối rõ ràng chính là đặc trưng của trạng thái tâm lí (khác quá trình có mốc rõ, và khác thuộc tính thì tồn tại vĩnh viễn chứ không chỉ 'thời gian dài').",
    "Ba loại hiện tượng tâm lí phân biệt theo thời gian tồn tại: Quá trình tâm lí (ngắn, có mở đầu-diễn biến-kết thúc rõ ràng, VD: đang suy nghĩ, đang nghe giảng); Trạng thái tâm lí (tồn tại lâu hơn nhưng không có mốc đầu-cuối rõ, là 'cái nền' đi kèm hoạt động, VD: chú ý, căng thẳng, hồi hộp); Thuộc tính tâm lí (ổn định, bền vững, đặc trưng riêng cho từng người, VD: tính trung thực, kiên trì)."],
  ["Thuộc tính tâm lí là những hiện tượng tâm lí:",
    ["Không thay đổi","Thay đổi theo thời gian","Tương đối ổn định và bền vững","Tính bền vững và bất biến"], 2,
    "Thuộc tính tâm lí có tính tương đối ổn định và bền vững (không phải 'không thay đổi tuyệt đối' hay 'thay đổi liên tục theo thời gian').",
    "Ba loại hiện tượng tâm lí phân biệt theo thời gian tồn tại: Quá trình tâm lí (ngắn, có mở đầu-diễn biến-kết thúc rõ ràng, VD: đang suy nghĩ, đang nghe giảng); Trạng thái tâm lí (tồn tại lâu hơn nhưng không có mốc đầu-cuối rõ, là 'cái nền' đi kèm hoạt động, VD: chú ý, căng thẳng, hồi hộp); Thuộc tính tâm lí (ổn định, bền vững, đặc trưng riêng cho từng người, VD: tính trung thực, kiên trì)."],
  ["Các chỉ dẫn đầy đủ ở thiết bị máy móc được ứng dụng quy luật nào trong tri giác?",
    ["Quy luật lựa chọn","Quy luật trọn vẹn","Quy luật ý nghĩa","Quy luật tính đối tượng"], 2,
    "Các chỉ dẫn giúp người dùng hiểu rõ ý nghĩa, công dụng của thiết bị — đây là ứng dụng của tính ý nghĩa trong tri giác.",
    "Tính ý nghĩa của tri giác: tri giác luôn gắn liền với tư duy, mang một ý nghĩa nhất định, chịu ảnh hưởng bởi kinh nghiệm, đời sống tâm lí và đặc điểm nhân cách của người tri giác — nên cùng một sự vật nhưng những người khác nhau (khác hiểu biết, trạng thái) có thể tri giác/gọi tên khác nhau."],
  ["\"Cường độ kích thích tối thiểu đủ để gây ra cảm giác\" thể hiện đặc điểm nào?",
    ["Ngưỡng cảm giác phía trên","Ngưỡng cảm giác phía dưới (ngưỡng tuyệt đối)","Ngưỡng cảm giác sai biệt","Độ nhạy cảm sai biệt"], 1,
    "\"Cường độ tối thiểu đủ gây cảm giác\" chính là định nghĩa của ngưỡng cảm giác phía dưới (ngưỡng tuyệt đối dưới).",
    "Ngưỡng cảm giác gồm: Ngưỡng tuyệt đối phía dưới — cường độ kích thích TỐI THIỂU đủ gây cảm giác; Ngưỡng tuyệt đối phía trên — cường độ kích thích TỐI ĐA còn gây được cảm giác (vượt quá sẽ mất cảm giác hoặc gây đau); Ngưỡng sai biệt — mức chênh lệch cường độ TỐI THIỂU giữa hai kích thích để phân biệt được sự khác nhau giữa chúng. Nếu kích thích nằm dưới ngưỡng (quá nhẹ, quá nhỏ) thì ta sẽ không cảm nhận được."],
  ["Siêu thị để mặt hàng trẻ em yêu thích ở tầng thấp. Sử dụng quy luật nào?",
    ["Quy luật ngưỡng cảm giác","Quy luật thích ứng","Quy luật tác động qua lại tương phản","Quy luật tác động qua lại đồng thời"], 0,
    "Đặt hàng trẻ em thích ở tầng thấp (vừa tầm mắt, tầm với) để đảm bảo kích thích đủ mạnh/rõ ràng, đạt ngưỡng cảm giác để trẻ dễ nhận biết và với tới.",
    "Ngưỡng cảm giác gồm: Ngưỡng tuyệt đối phía dưới — cường độ kích thích TỐI THIỂU đủ gây cảm giác; Ngưỡng tuyệt đối phía trên — cường độ kích thích TỐI ĐA còn gây được cảm giác (vượt quá sẽ mất cảm giác hoặc gây đau); Ngưỡng sai biệt — mức chênh lệch cường độ TỐI THIỂU giữa hai kích thích để phân biệt được sự khác nhau giữa chúng. Nếu kích thích nằm dưới ngưỡng (quá nhẹ, quá nhỏ) thì ta sẽ không cảm nhận được."],
  ["Khi thuyết trình, sinh viên cần nói rõ ràng và đủ nghe. Quy luật nào xuất hiện?",
    ["Tác động lẫn nhau của các cảm giác","Ngưỡng cảm giác","Thích ứng cảm giác","Cả ba đáp án trên"], 1,
    "Nói đủ to, đủ rõ để đảm bảo kích thích âm thanh vượt ngưỡng cảm giác nghe của người nghe — vận dụng quy luật ngưỡng cảm giác.",
    "Ngưỡng cảm giác gồm: Ngưỡng tuyệt đối phía dưới — cường độ kích thích TỐI THIỂU đủ gây cảm giác; Ngưỡng tuyệt đối phía trên — cường độ kích thích TỐI ĐA còn gây được cảm giác (vượt quá sẽ mất cảm giác hoặc gây đau); Ngưỡng sai biệt — mức chênh lệch cường độ TỐI THIỂU giữa hai kích thích để phân biệt được sự khác nhau giữa chúng. Nếu kích thích nằm dưới ngưỡng (quá nhẹ, quá nhỏ) thì ta sẽ không cảm nhận được."],
  ["Diễn giả cần nói rõ ràng, âm lượng 1000 HZ. Quy luật nào xuất hiện?",
    ["Tác động qua lại của các cảm giác","Ngưỡng cảm giác","Thích ứng của cảm giác","Không đủ thông tin để xác định"], 1,
    "Đảm bảo âm lượng và tần số phù hợp (1000Hz - dải tần tai người nhạy nhất) để đạt ngưỡng cảm giác nghe hiệu quả.",
    "Ngưỡng cảm giác gồm: Ngưỡng tuyệt đối phía dưới — cường độ kích thích TỐI THIỂU đủ gây cảm giác; Ngưỡng tuyệt đối phía trên — cường độ kích thích TỐI ĐA còn gây được cảm giác (vượt quá sẽ mất cảm giác hoặc gây đau); Ngưỡng sai biệt — mức chênh lệch cường độ TỐI THIỂU giữa hai kích thích để phân biệt được sự khác nhau giữa chúng. Nếu kích thích nằm dưới ngưỡng (quá nhẹ, quá nhỏ) thì ta sẽ không cảm nhận được."],
  ["Khi mất điện, lúc đầu không nhìn thấy gì, sau nhìn rõ hơn. Quy luật nào?",
    ["Tác động qua lại của các cảm giác","Ngưỡng cảm giác","Thích ứng của cảm giác","Không đủ thông tin để xác định"], 2,
    "Sau khi mất điện đột ngột, mắt cần thời gian để độ nhạy cảm tăng lên, thích nghi với bóng tối — đây là quy luật thích ứng của cảm giác.",
    "Quy luật thích ứng: khả năng thay đổi độ nhạy cảm của cảm giác cho phù hợp với sự thay đổi của cường độ kích thích — kích thích tác động lâu, liên tục thì độ nhạy cảm giảm dần (tăng ngưỡng cảm giác) đến khi thấy 'bình thường', quen dần; còn kích thích yếu, ít tác động thì độ nhạy cảm tăng lên để dễ phát hiện hơn."],
  ["Chuyên gia tâm lí khuyên tạo ấn tượng tốt ngay lần gặp đầu. Dựa trên quy luật nào?",
    ["Quy luật về tính có ý nghĩa","Quy luật tính lựa chọn","Quy luật tổng giác","Quy luật tính ổn định"], 2,
    "Ấn tượng ban đầu ảnh hưởng lâu dài đến cách nhìn nhận sau này về một người — đây là biểu hiện của tổng giác (kinh nghiệm/ấn tượng cũ chi phối tri giác về sau).",
    "Tổng giác: sự phụ thuộc của tri giác vào nội dung đời sống tâm lí, kinh nghiệm, nhu cầu, hứng thú, tâm trạng... của con người — cùng một hình ảnh nhưng người khác nhau/tâm trạng khác nhau có thể tri giác khác nhau (VD: nhìn một bức tranh mơ hồ, mỗi người thấy một hình khác)."],
  ["Hình thức định hướng đầu tiên (mức thấp nhất) trong nhận thức của con người là:",
    ["Cảm giác","Tri giác","Tư duy","Tưởng tượng"], 0,
    "Cảm giác là hình thức định hướng đầu tiên, đơn giản nhất trong quá trình nhận thức của con người (mức thấp nhất trong thang nhận thức).",
    "Cảm giác là quá trình tâm lí phản ánh một cách riêng lẻ, từng thuộc tính bề ngoài của sự vật, hiện tượng khi chúng đang trực tiếp tác động vào giác quan. Đây là mức độ nhận thức cảm tính thấp nhất, đơn giản nhất trong nhận thức của con người."],
  ["\"Khi sự vật bên ngoài mang hình ảnh tác động vào giác quan ta, cho ta hình ảnh của sự vật\". Là hiện tượng nào?",
    ["Tri giác","Tư duy","Tưởng tượng","Cảm giác"], 0,
    "Đây chính là mô tả của tri giác: hình ảnh sự vật hình thành khi nó tác động trực tiếp và trọn vẹn vào giác quan.",
    "Tri giác là quá trình tâm lí phản ánh một cách trọn vẹn các thuộc tính bề ngoài của sự vật, hiện tượng khi chúng trực tiếp tác động vào giác quan. Khác cảm giác ở chỗ tri giác cho ta hình ảnh hoàn chỉnh, có cấu trúc về đối tượng, chứ không phải từng thuộc tính rời rạc."],
  ["Kết quả nhận thức chịu ảnh hưởng bởi cảm xúc, trải nghiệm cá nhân là quy luật nào?",
    ["Tính đối tượng","Tính tổng giác","Tính ý nghĩa","Tính ảo ảnh tri giác"], 1,
    "Kết quả tri giác bị ảnh hưởng bởi cảm xúc và kinh nghiệm cá nhân người tri giác — đây là biểu hiện của tổng giác.",
    "Tổng giác: sự phụ thuộc của tri giác vào nội dung đời sống tâm lí, kinh nghiệm, nhu cầu, hứng thú, tâm trạng... của con người — cùng một hình ảnh nhưng người khác nhau/tâm trạng khác nhau có thể tri giác khác nhau (VD: nhìn một bức tranh mơ hồ, mỗi người thấy một hình khác)."],
  ["Nhiệt độ điều hòa tốt nhất 25-28 độ khi ngoài trời 40 độ. Dựa trên quy luật nào?",
    ["Quy luật tương phản của cảm giác","Quy luật tăng tính nhạy cảm","Quy luật thích ứng của cảm giác","Quy luật ngưỡng của cảm giác"], 3,
    "Chênh lệch nhiệt độ trong-ngoài quá lớn (15 độ) sẽ gây sốc nhiệt khi ra vào; mức 25-28 độ là khoảng vừa đủ để cơ thể thích ứng dần dễ dàng — vận dụng quy luật thích ứng của cảm giác.",
    "Quy luật thích ứng: khả năng thay đổi độ nhạy cảm của cảm giác cho phù hợp với sự thay đổi của cường độ kích thích — kích thích tác động lâu, liên tục thì độ nhạy cảm giảm dần (tăng ngưỡng cảm giác) đến khi thấy 'bình thường', quen dần; còn kích thích yếu, ít tác động thì độ nhạy cảm tăng lên để dễ phát hiện hơn."],
  ["Luận điểm nào không đúng về ảo ảnh trong tri giác?",
    ["Cho hình ảnh tri giác sai lệch về đối tượng","Không cần thiết trong đời sống con người","Phụ thuộc vào bối cảnh tri giác","Ít xảy ra nhưng vẫn là quy luật"], 1,
    "Ảo ảnh tri giác VẪN cần thiết và có ích trong đời sống (trang trí, ngụy trang, nghệ thuật, kiến trúc...) — nên phát biểu \"không cần thiết\" là SAI, đây là đáp án được chọn vì nó phản ánh không đúng.",
    "Ảo ảnh tri giác: sự phản ánh sai lệch các sự vật, hiện tượng một cách khách quan (do đặc điểm cấu tạo giác quan hoặc do quy luật của tri giác), xảy ra ở mọi người trong những điều kiện xác định, con người có thể chủ động vận dụng vào thực tiễn (trang trí, ngụy trang, thời trang, kiến trúc...)."],
  ["Khả năng nào của tri giác giúp tạo ra hình ảnh sự vật theo những cấu trúc nhất định?",
    ["Tính trọn vẹn","Tính kết cấu","Tính tổng hợp","Tính ý nghĩa"], 1,
    "Tính kết cấu là khả năng của tri giác sắp xếp các thuộc tính rời rạc thành một cấu trúc/kết cấu nhất định của sự vật (khác tính trọn vẹn là gộp đủ các thuộc tính, không nhấn về cấu trúc).",
    "Tri giác là quá trình tâm lí phản ánh một cách trọn vẹn các thuộc tính bề ngoài của sự vật, hiện tượng khi chúng trực tiếp tác động vào giác quan. Khác cảm giác ở chỗ tri giác cho ta hình ảnh hoàn chỉnh, có cấu trúc về đối tượng, chứ không phải từng thuộc tính rời rạc."],
  ["Khi đeo đồng hồ nhẹ, không có cảm giác về khối lượng vì:",
    ["Khối lượng nằm dưới ngưỡng cảm giác phía dưới của tay","Khối lượng nằm trên ngưỡng cảm giác phía dưới","Khối lượng nằm dưới ngưỡng cảm giác phía trên","Khối lượng nằm trên ngưỡng cảm giác phía trên"], 0,
    "Khối lượng đồng hồ nhẹ nằm dưới ngưỡng cảm giác phía dưới của xúc giác ở tay, nên không đủ để gây ra cảm giác về trọng lượng.",
    "Ngưỡng cảm giác gồm: Ngưỡng tuyệt đối phía dưới — cường độ kích thích TỐI THIỂU đủ gây cảm giác; Ngưỡng tuyệt đối phía trên — cường độ kích thích TỐI ĐA còn gây được cảm giác (vượt quá sẽ mất cảm giác hoặc gây đau); Ngưỡng sai biệt — mức chênh lệch cường độ TỐI THIỂU giữa hai kích thích để phân biệt được sự khác nhau giữa chúng. Nếu kích thích nằm dưới ngưỡng (quá nhẹ, quá nhỏ) thì ta sẽ không cảm nhận được."],
  ["Tăng âm lượng điện thoại một vạch nhưng không cảm thấy to hơn. Nguyên nhân vì:",
    ["Mức tăng nằm dưới ngưỡng sai biệt về âm thanh","Mức tăng nằm trên ngưỡng sai biệt về âm thanh","Mức tăng nằm dưới ngưỡng cảm giác phía dưới","Mức tăng nằm trên ngưỡng cảm giác phía trên"], 0,
    "Mức tăng âm lượng một vạch quá nhỏ, nằm dưới ngưỡng sai biệt về âm thanh (mức chênh lệch tối thiểu để phân biệt được), nên tai không nhận ra sự khác biệt.",
    "Ngưỡng cảm giác gồm: Ngưỡng tuyệt đối phía dưới — cường độ kích thích TỐI THIỂU đủ gây cảm giác; Ngưỡng tuyệt đối phía trên — cường độ kích thích TỐI ĐA còn gây được cảm giác (vượt quá sẽ mất cảm giác hoặc gây đau); Ngưỡng sai biệt — mức chênh lệch cường độ TỐI THIỂU giữa hai kích thích để phân biệt được sự khác nhau giữa chúng. Nếu kích thích nằm dưới ngưỡng (quá nhẹ, quá nhỏ) thì ta sẽ không cảm nhận được."],
  ["Khi hội thoại tiếng Anh, các câu hội thoại được lưu giữ chủ yếu tại:",
    ["Trí nhớ giác quan","Trí nhớ ngắn hạn","Trí nhớ dài hạn","Tất cả bộ nhớ"], 1,
    "Câu hội thoại được xử lí, ghi nhớ tạm thời trong khi giao tiếp — đây là vai trò của trí nhớ ngắn hạn (trí nhớ làm việc).",
    "Trí nhớ phân theo thời gian lưu giữ: Trí nhớ giác quan (cực ngắn, vài giây); Trí nhớ ngắn hạn/trí nhớ làm việc (lưu tạm thời, dung lượng hạn chế, dùng để xử lí thông tin đang thao tác, VD: nhẩm số điện thoại); Trí nhớ dài hạn (lưu trữ lâu dài, gần như không giới hạn dung lượng, thông qua quá trình củng cố — ký ức càng được truy cập/ôn tập thường xuyên càng bền vững, nhưng không phải 'cố định vĩnh viễn' vì vẫn có thể phai nhạt hoặc bị quên)."],
  ["Tiêu chí phân loại trí nhớ thành ngắn hạn, dài hạn và thao tác là:",
    ["Mức độ kéo dài của sự giữ gìn tài liệu","Tính chất tích cực tâm lí nổi bật nhất","Tính chất mục đích của hoạt động","Giác quan đóng vai trò chủ đạo"], 0,
    "Tiêu chí phân chia trí nhớ thành ngắn hạn/dài hạn/thao tác chính là dựa trên mức độ kéo dài (thời gian) của sự giữ gìn tài liệu trong trí nhớ.",
    "Trí nhớ phân theo thời gian lưu giữ: Trí nhớ giác quan (cực ngắn, vài giây); Trí nhớ ngắn hạn/trí nhớ làm việc (lưu tạm thời, dung lượng hạn chế, dùng để xử lí thông tin đang thao tác, VD: nhẩm số điện thoại); Trí nhớ dài hạn (lưu trữ lâu dài, gần như không giới hạn dung lượng, thông qua quá trình củng cố — ký ức càng được truy cập/ôn tập thường xuyên càng bền vững, nhưng không phải 'cố định vĩnh viễn' vì vẫn có thể phai nhạt hoặc bị quên)."],
  ["Ghi nhớ dựa theo dàn ý và mối liên hệ logic giữa các bộ phận tài liệu là loại ghi nhớ nào?",
    ["Ghi nhớ máy móc","Ghi nhớ có ý nghĩa","Ghi nhớ không chủ định","Tất cả các đáp án trên"], 1,
    "Ghi nhớ theo dàn ý và mối liên hệ logic giữa các phần tài liệu chính là ghi nhớ có ý nghĩa (dựa trên hiểu bản chất, không máy móc).",
    "Trí nhớ phân theo mục đích ghi nhớ: Ghi nhớ không chủ định (không đặt mục đích ghi nhớ trước, diễn ra tự nhiên); Ghi nhớ có chủ định (có mục đích, có phương pháp, cần nỗ lực ý chí). Về cách ghi nhớ: Ghi nhớ máy móc (lặp đi lặp lại đơn giản, không cần hiểu nội dung) và Ghi nhớ có ý nghĩa/logic (dựa trên hiểu bản chất, mối liên hệ logic giữa các phần tài liệu — giúp lĩnh hội tri thức sâu sắc và bền vững hơn nhiều so với ghi nhớ máy móc)."],
  ["Điều nào không đúng với ghi nhớ có ý nghĩa?",
    ["Ghi nhớ dựa trên sự thông hiểu nội dung","Đảm bảo lĩnh hội tri thức sâu sắc, bền vững","Ghi nhớ bằng cách lặp đi lặp lại nhiều lần giản đơn","Ghi nhớ dựa trên nhận thức mối liên hệ logic"], 2,
    "Ghi nhớ có ý nghĩa dựa trên THÔNG HIỂU và liên hệ logic — \"lặp đi lặp lại đơn giản\" là đặc trưng của ghi nhớ MÁY MÓC, không phải ghi nhớ có ý nghĩa, nên đây là phát biểu KHÔNG đúng.",
    "Trí nhớ phân theo mục đích ghi nhớ: Ghi nhớ không chủ định (không đặt mục đích ghi nhớ trước, diễn ra tự nhiên); Ghi nhớ có chủ định (có mục đích, có phương pháp, cần nỗ lực ý chí). Về cách ghi nhớ: Ghi nhớ máy móc (lặp đi lặp lại đơn giản, không cần hiểu nội dung) và Ghi nhớ có ý nghĩa/logic (dựa trên hiểu bản chất, mối liên hệ logic giữa các phần tài liệu — giúp lĩnh hội tri thức sâu sắc và bền vững hơn nhiều so với ghi nhớ máy móc)."],
  ["Sinh viên dùng Bản đồ tư duy để ghi nhớ kiến thức. Loại ghi nhớ nào?",
    ["Ghi nhớ máy móc","Ghi nhớ có ý nghĩa","Ghi nhớ không chủ định","Tất cả các đáp án trên"], 1,
    "Bản đồ tư duy giúp thể hiện mối liên hệ logic giữa các ý, hỗ trợ ghi nhớ có ý nghĩa hiệu quả hơn ghi nhớ máy móc.",
    "Trí nhớ phân theo mục đích ghi nhớ: Ghi nhớ không chủ định (không đặt mục đích ghi nhớ trước, diễn ra tự nhiên); Ghi nhớ có chủ định (có mục đích, có phương pháp, cần nỗ lực ý chí). Về cách ghi nhớ: Ghi nhớ máy móc (lặp đi lặp lại đơn giản, không cần hiểu nội dung) và Ghi nhớ có ý nghĩa/logic (dựa trên hiểu bản chất, mối liên hệ logic giữa các phần tài liệu — giúp lĩnh hội tri thức sâu sắc và bền vững hơn nhiều so với ghi nhớ máy móc)."],
  ["Mô-da lên 4 tuổi chỉ cần xem một lần là chơi lại chính xác. Tính ưu thế của giác quan nào?",
    ["Trí nhớ bằng tai","Trí nhớ bằng mắt","Trí nhớ bằng tay","Trí nhớ bằng mũi"], 1,
    "Chỉ cần NGHE một lần đã nhớ và chơi lại chính xác — thể hiện ưu thế vượt trội của trí nhớ bằng tai (thính giác) ở Mozart.",
    "Trí nhớ phân theo nội dung phản ánh: Trí nhớ vận động (nhớ các động tác, thao tác vận động — nền tảng hình thành kỹ xảo); Trí nhớ cảm xúc (nhớ những rung cảm, xúc động đã trải qua, VD: đỏ mặt khi nhớ kỉ niệm cũ); Trí nhớ hình ảnh (nhớ hình ảnh, âm thanh, mùi vị đã tri giác); Trí nhớ từ ngữ - logic (nhớ ý nghĩa, tư tưởng, khái niệm — loại trí nhớ đặc trưng, giữ vai trò chính ở con người)."],
  ["Mệnh đề đúng với trí nhớ:",
    ["Có sử dụng ngôn ngữ","Có sản phẩm là 'biểu tượng của biểu tượng'","Sản phẩm là biểu tượng","Sản phẩm vừa trực quan vừa khái quát"], 2,
    "Sản phẩm của trí nhớ là biểu tượng — hình ảnh về sự vật được tạo dựng lại trên cơ sở những gì đã tri giác trước đó (không cần sự vật tác động trực tiếp).",
    "Trí nhớ là quá trình tâm lí phản ánh những kinh nghiệm đã có của cá nhân dưới hình thức ghi nhớ, giữ gìn và làm xuất hiện lại (nhận lại, nhớ lại) những gì đã trải qua. Sản phẩm của trí nhớ là các biểu tượng — hình ảnh của sự vật được tạo ra trên cơ sở các hình ảnh đã có từ tri giác trước đó (khác với cảm giác/tri giác cần có sự vật tác động trực tiếp)."],
  ["Đặc điểm phù hợp với trí nhớ con người (không phải máy)?",
    ["Ghi nhớ thông tin được tiêu chuẩn hóa chặt chẽ","Ghi nhớ thông tin không được tiêu chuẩn hóa chặt chẽ","Toàn bộ khối lượng tài liệu được ghi nhớ nguyên vẹn","Toàn bộ thông tin luôn được ghi nhớ nguyên vẹn"], 1,
    "Trí nhớ con người mang tính chọn lọc, không tiêu chuẩn hóa chặt chẽ như máy — con người ghi nhớ có chọn lọc theo ý nghĩa/cảm xúc chứ không lưu mọi thứ y nguyên.",
    "Trí nhớ con người khác trí nhớ máy (máy tính) ở chỗ: trí nhớ người mang tính chọn lọc, có chủ thể, gắn với ý nghĩa và cảm xúc, thông tin không được 'tiêu chuẩn hóa chặt chẽ' và không phải lúc nào cũng được ghi nhớ nguyên vẹn toàn bộ (có thể biến dạng, quên một phần); còn trí nhớ máy ghi nhận thông tin chính xác, đầy đủ, tiêu chuẩn hóa."],
  ["Đặc điểm phù hợp với trí nhớ máy?",
    ["Ghi nhớ thông tin được tiêu chuẩn hóa chặt chẽ","Ghi nhớ thông tin không được tiêu chuẩn hóa","Quá trình tri giác, giữ gìn, xử lí mang tính chọn lọc","Quá trình tri giác, xử lí nhờ biến đổi hóa-điện trong prôtêin"], 0,
    "Trí nhớ máy (máy tính) ghi nhận thông tin theo cách tiêu chuẩn hóa chặt chẽ, chính xác — khác với trí nhớ người mang tính chọn lọc, chủ quan.",
    "Trí nhớ con người khác trí nhớ máy (máy tính) ở chỗ: trí nhớ người mang tính chọn lọc, có chủ thể, gắn với ý nghĩa và cảm xúc, thông tin không được 'tiêu chuẩn hóa chặt chẽ' và không phải lúc nào cũng được ghi nhớ nguyên vẹn toàn bộ (có thể biến dạng, quên một phần); còn trí nhớ máy ghi nhận thông tin chính xác, đầy đủ, tiêu chuẩn hóa."],
  ["Loại trí nhớ không chủ định - trường hợp nào đúng?",
    ["Học sinh nhớ ánh mắt cô giáo khi giảng bài","Nhớ công thức toán bằng cách giải bài tập","Sự đỏ mặt khi nhớ đến kỉ niệm cũ","Nhớ về phong cảnh đẹp, mùi thơm"], 0,
    "Nhớ ánh mắt cô giáo khi giảng bài là một chi tiết nảy sinh tự nhiên, không có mục đích ghi nhớ từ trước — đây là ví dụ về trí nhớ không chủ định.",
    "Trí nhớ phân theo mục đích ghi nhớ: Ghi nhớ không chủ định (không đặt mục đích ghi nhớ trước, diễn ra tự nhiên); Ghi nhớ có chủ định (có mục đích, có phương pháp, cần nỗ lực ý chí). Về cách ghi nhớ: Ghi nhớ máy móc (lặp đi lặp lại đơn giản, không cần hiểu nội dung) và Ghi nhớ có ý nghĩa/logic (dựa trên hiểu bản chất, mối liên hệ logic giữa các phần tài liệu — giúp lĩnh hội tri thức sâu sắc và bền vững hơn nhiều so với ghi nhớ máy móc)."],
  ["Loại trí nhớ có chủ định - trường hợp nào đúng?",
    ["Nhớ công thức toán bằng cách giải bài tập","Nhớ được kiến thức khi làm bài thi","Nhớ ý chính của đoạn tài liệu","Nhớ về các động tác bài thể dục"], 0,
    "Nhớ công thức toán thông qua việc chủ động giải nhiều bài tập (có mục đích ghi nhớ rõ ràng) là ví dụ về trí nhớ có chủ định.",
    "Trí nhớ phân theo mục đích ghi nhớ: Ghi nhớ không chủ định (không đặt mục đích ghi nhớ trước, diễn ra tự nhiên); Ghi nhớ có chủ định (có mục đích, có phương pháp, cần nỗ lực ý chí). Về cách ghi nhớ: Ghi nhớ máy móc (lặp đi lặp lại đơn giản, không cần hiểu nội dung) và Ghi nhớ có ý nghĩa/logic (dựa trên hiểu bản chất, mối liên hệ logic giữa các phần tài liệu — giúp lĩnh hội tri thức sâu sắc và bền vững hơn nhiều so với ghi nhớ máy móc)."],
  ["Phát biểu nào không là đặc trưng của trí nhớ dài hạn?",
    ["Ký ức được truy cập thường xuyên trở nên mạnh hơn","Các trải nghiệm được lưu giữ ở trạng thái cố định vĩnh viễn","Trí nhớ dài hạn có khả năng lưu giữ thông tin không giới hạn","Ký ức dài hạn được kích hoạt lại trong giấc ngủ"], 1,
    "Trí nhớ dài hạn KHÔNG phải là \"trạng thái cố định vĩnh viễn\" — ký ức dài hạn vẫn có thể phai nhạt, biến đổi hoặc mất đi theo thời gian nếu không được củng cố; đây là phát biểu SAI về đặc trưng của trí nhớ dài hạn.",
    "Trí nhớ phân theo thời gian lưu giữ: Trí nhớ giác quan (cực ngắn, vài giây); Trí nhớ ngắn hạn/trí nhớ làm việc (lưu tạm thời, dung lượng hạn chế, dùng để xử lí thông tin đang thao tác, VD: nhẩm số điện thoại); Trí nhớ dài hạn (lưu trữ lâu dài, gần như không giới hạn dung lượng, thông qua quá trình củng cố — ký ức càng được truy cập/ôn tập thường xuyên càng bền vững, nhưng không phải 'cố định vĩnh viễn' vì vẫn có thể phai nhạt hoặc bị quên)."],
  ["Theo Baddeley và Hitch (1974), trí nhớ làm việc là diễn giải rõ hơn bộ nhớ nào?",
    ["Trí nhớ giác quan","Trí nhớ ngắn hạn","Trí nhớ dài hạn","Tất cả bộ nhớ"], 1,
    "Theo Baddeley và Hitch, trí nhớ làm việc (working memory) là một mô hình mở rộng, diễn giải chi tiết hơn cho trí nhớ ngắn hạn — mô tả cách thông tin được xử lí tạm thời trong đầu.",
    "Trí nhớ phân theo thời gian lưu giữ: Trí nhớ giác quan (cực ngắn, vài giây); Trí nhớ ngắn hạn/trí nhớ làm việc (lưu tạm thời, dung lượng hạn chế, dùng để xử lí thông tin đang thao tác, VD: nhẩm số điện thoại); Trí nhớ dài hạn (lưu trữ lâu dài, gần như không giới hạn dung lượng, thông qua quá trình củng cố — ký ức càng được truy cập/ôn tập thường xuyên càng bền vững, nhưng không phải 'cố định vĩnh viễn' vì vẫn có thể phai nhạt hoặc bị quên)."],
  ["Khi nhẩm số điện thoại để tìm bút ghi. Số điện thoại lưu giữ chủ yếu tại:",
    ["Trí nhớ giác quan","Trí nhớ ngắn hạn","Trí nhớ dài hạn","Tất cả bộ nhớ"], 1,
    "Số điện thoại được nhẩm để dùng ngay trong thời gian ngắn (tìm bút ghi lại) — đây là vai trò của trí nhớ ngắn hạn.",
    "Trí nhớ phân theo thời gian lưu giữ: Trí nhớ giác quan (cực ngắn, vài giây); Trí nhớ ngắn hạn/trí nhớ làm việc (lưu tạm thời, dung lượng hạn chế, dùng để xử lí thông tin đang thao tác, VD: nhẩm số điện thoại); Trí nhớ dài hạn (lưu trữ lâu dài, gần như không giới hạn dung lượng, thông qua quá trình củng cố — ký ức càng được truy cập/ôn tập thường xuyên càng bền vững, nhưng không phải 'cố định vĩnh viễn' vì vẫn có thể phai nhạt hoặc bị quên)."],
  ["Điều kiện nào cần thiết để duy trì chú ý có chủ định trong giờ học?",
    ["Cường độ kích thích","Do sự mới lạ và tương phản của các tác nhân kích thích","Sự trái ngược giữa vật kích thích và bối cảnh","Nêu câu hỏi và giải bài tập trong khoảng thời gian nhất định"], 3,
    "Để duy trì chú ý có chủ định trong giờ học, cần liên tục đặt câu hỏi và giao nhiệm vụ cụ thể (bài tập) trong khoảng thời gian nhất định để giữ mục đích tự giác của học sinh.",
    "3 loại chú ý theo mức độ tự giác: Chú ý không chủ định — không có mục đích định trước, không cần nỗ lực ý chí, do tác động bên ngoài (mới lạ, nổi bật, tương phản) gây ra một cách tự nhiên; Chú ý có chủ định — có mục đích tự giác, cần sự nỗ lực ý chí để duy trì; Chú ý 'sau khi có chủ định' — vốn là chú ý có chủ định nhưng do hứng thú với công việc nên không còn cần căng thẳng ý chí nữa (VD: say mê đọc sách quên cả giờ giấc)."],
  ["Máy bán hàng tự động ở nơi đông người, màu sắc nổi bật. Ứng dụng loại chú ý nào?",
    ["Chú ý sau khi có chủ định","Chú ý trong khi có chủ định","Chú ý không chủ định","Chú ý thiếu chủ định"], 2,
    "Máy bán hàng đặt ở nơi đông người, màu sắc bắt mắt để thu hút chú ý không chủ định — người qua đường chú ý mà không cần cố gắng.",
    "3 loại chú ý theo mức độ tự giác: Chú ý không chủ định — không có mục đích định trước, không cần nỗ lực ý chí, do tác động bên ngoài (mới lạ, nổi bật, tương phản) gây ra một cách tự nhiên; Chú ý có chủ định — có mục đích tự giác, cần sự nỗ lực ý chí để duy trì; Chú ý 'sau khi có chủ định' — vốn là chú ý có chủ định nhưng do hứng thú với công việc nên không còn cần căng thẳng ý chí nữa (VD: say mê đọc sách quên cả giờ giấc)."],
  ["Sắp xếp chỗ ngồi gọn gàng, tránh tiếng ồn và đồ vật mới lạ. Nhấn mạnh thuộc tính nào của chú ý?",
    ["Sự di chuyển chú ý","Sự tập trung chú ý","Sự phân phối chú ý","Sự phân tán chú ý"], 1,
    "Sắp xếp chỗ ngồi gọn gàng, hạn chế yếu tố gây xao nhãng (tiếng ồn, đồ mới lạ) giúp duy trì sự tập trung chú ý của học sinh vào một đối tượng nhất định.",
    "Chú ý là trạng thái tâm lí, biểu hiện sự tập trung của hoạt động tâm lí vào một hay một số đối tượng nhất định để phản ánh chúng tốt hơn. Chú ý có 4 thuộc tính cơ bản: Sức tập trung (mức độ chú ý dồn vào phạm vi hẹp), Sự bền vững (duy trì chú ý lâu dài trên một đối tượng), Sự phân phối (chú ý cùng lúc nhiều đối tượng/hoạt động khác nhau), Sự di chuyển (chuyển chú ý linh hoạt từ đối tượng này sang đối tượng khác theo yêu cầu)."],
  ["Nhà quảng cáo dùng biển khổ lớn, màu nổi bật ở nơi đông người là hướng vào loại chú ý nào?",
    ["Chú ý không chủ định","Chú ý có chủ định","Chú ý 'sau khi có chủ định'","Không có chú ý"], 0,
    "Biển quảng cáo khổ lớn, màu nổi bật đặt ở nơi đông người nhằm thu hút chú ý không chủ định (gây sự chú ý tự nhiên, không cần cố gắng của người qua đường).",
    "3 loại chú ý theo mức độ tự giác: Chú ý không chủ định — không có mục đích định trước, không cần nỗ lực ý chí, do tác động bên ngoài (mới lạ, nổi bật, tương phản) gây ra một cách tự nhiên; Chú ý có chủ định — có mục đích tự giác, cần sự nỗ lực ý chí để duy trì; Chú ý 'sau khi có chủ định' — vốn là chú ý có chủ định nhưng do hứng thú với công việc nên không còn cần căng thẳng ý chí nữa (VD: say mê đọc sách quên cả giờ giấc)."],
  ["Mệnh đề đúng với tư duy:",
    ["Xuất hiện khi dữ liệu rõ ràng, đầy đủ","Xuất hiện khi dữ liệu không rõ, không đầy đủ","Sáng tạo hình ảnh mới bằng thủ thuật đặc biệt","Sản phẩm là các biểu tượng"], 0,
    "Tư duy chỉ xuất hiện khi dữ liệu RÕ RÀNG, ĐẦY ĐỦ hơn (so với tưởng tượng xuất hiện khi dữ liệu mơ hồ) — đây là đặc điểm chỉ đúng với tư duy.",
    "Tư duy là quá trình nhận thức lí tính bậc cao, phản ánh những thuộc tính bản chất, những mối liên hệ và quan hệ có tính quy luật của sự vật, hiện tượng mà trước đó chủ thể chưa biết. Tư duy chỉ nảy sinh khi gặp 'tình huống có vấn đề' — vấn đề mới, không xa lạ hoàn toàn (phải liên quan tới kinh nghiệm đã có) nhưng vượt quá hiểu biết cũ, đòi hỏi phải tìm cách giải quyết mới."],
  ["Tư duy khác tưởng tượng chủ yếu ở đặc điểm nào?",
    ["Làm cho hoạt động con người có ý thức","Sự chặt chẽ trong cách giải quyết vấn đề","Liên quan đến nhận thức cảm tính","Cả a, b, c"], 1,
    "Điểm khác biệt chính giữa tư duy và tưởng tượng là sự chặt chẽ trong cách giải quyết vấn đề — tư duy đi theo trình tự logic chặt chẽ, còn tưởng tượng có thể 'nhảy cóc'.",
    "Tưởng tượng là quá trình nhận thức lí tính phản ánh những cái chưa từng có trong kinh nghiệm của cá nhân, bằng cách xây dựng những hình ảnh mới trên cơ sở những biểu tượng đã có. Khác với tư duy: tưởng tượng xuất hiện khi tình huống có tính bất định cao (dữ liệu không rõ ràng, không đầy đủ), cho phép 'nhảy cóc' qua một số giai đoạn tư duy chặt chẽ; còn tư duy đòi hỏi dữ liệu rõ ràng, giải quyết theo trình tự logic chặt chẽ hơn."],
  ["Kỹ sư quan sát sơ đồ nguyên lý thiết bị tìm nguyên nhân sự cố. Loại tư duy nào?",
    ["Tư duy trực quan hành động","Tư duy trực quan hình ảnh","Tư duy trừu tượng","Tư duy lí luận"], 1,
    "Kỹ sư dựa vào sơ đồ (hình ảnh cụ thể) để suy luận, không cần thao tác vật lí trực tiếp — đây là tư duy trực quan - hình ảnh.",
    "Tư duy phân loại theo phương tiện/phương thức giải quyết: Tư duy trực quan - hành động (giải quyết bằng hành động vận động cụ thể có thể quan sát được, thường ở trẻ nhỏ hoặc công việc chân tay); Tư duy trực quan - hình ảnh (giải quyết dựa trên hình ảnh cụ thể của sự vật hiện tượng, không cần thao tác vật lí trực tiếp); Tư duy trừu tượng/lí luận (giải quyết dựa trên khái niệm, phán đoán, suy luận logic bằng ngôn ngữ, không cần sự vật cụ thể trước mắt)."],
  ["Dấu hiệu không phù hợp với quá trình tư duy:",
    ["Phản ánh những trải nghiệm của cuộc sống","Phản ánh hiện thực bằng con đường gián tiếp","Kết quả mang tính khái quát","Diễn ra theo một quá trình"], 0,
    "Tư duy luôn hướng tới tìm cái mới; \"phản ánh những trải nghiệm của cuộc sống\" (nhắc lại kinh nghiệm cũ) là đặc trưng của trí nhớ chứ không phải tư duy — đây là dấu hiệu KHÔNG phù hợp với tư duy.",
    "Tư duy là quá trình nhận thức lí tính bậc cao, phản ánh những thuộc tính bản chất, những mối liên hệ và quan hệ có tính quy luật của sự vật, hiện tượng mà trước đó chủ thể chưa biết. Tư duy chỉ nảy sinh khi gặp 'tình huống có vấn đề' — vấn đề mới, không xa lạ hoàn toàn (phải liên quan tới kinh nghiệm đã có) nhưng vượt quá hiểu biết cũ, đòi hỏi phải tìm cách giải quyết mới."],
  ["Trong tư duy, xem xét đúng sai của giả thuyết để khẳng định/phủ định là giai đoạn nào?",
    ["Xác định và biểu đạt vấn đề","Xuất hiện các liên tưởng","Sàng lọc liên tưởng và hình thành giả thuyết","Kiểm tra giả thuyết"], 3,
    "Xem xét đúng/sai của giả thuyết để khẳng định hoặc phủ định chính là giai đoạn kiểm tra giả thuyết trong quá trình tư duy.",
    "Quá trình tư duy giải quyết vấn đề trải qua các giai đoạn: (1) Xác định và biểu đạt vấn đề; (2) Xuất hiện các liên tưởng liên quan; (3) Sàng lọc các liên tưởng và hình thành giả thuyết giải quyết; (4) Kiểm tra giả thuyết (xem đúng/sai để khẳng định hoặc phủ định, nếu sai thì quay lại tìm giả thuyết khác); (5) Giải quyết vấn đề."],
  ["Dùng định luật vật lí giải thích xe máy trượt khi phanh cứng bánh sau. Phản ánh quá trình nào?",
    ["Quá trình cảm giác","Quá trình tri giác","Quá trình tưởng tượng","Quá trình tư duy"], 3,
    "Dùng định luật vật lí (kiến thức khái quát) để giải thích một hiện tượng cụ thể (trượt bánh xe) — đây là quá trình tư duy (suy luận logic dựa trên quy luật đã biết để lí giải hiện tượng mới).",
    "Tư duy là quá trình nhận thức lí tính bậc cao, phản ánh những thuộc tính bản chất, những mối liên hệ và quan hệ có tính quy luật của sự vật, hiện tượng mà trước đó chủ thể chưa biết. Tư duy chỉ nảy sinh khi gặp 'tình huống có vấn đề' — vấn đề mới, không xa lạ hoàn toàn (phải liên quan tới kinh nghiệm đã có) nhưng vượt quá hiểu biết cũ, đòi hỏi phải tìm cách giải quyết mới."],
  ["Tư duy trực quan - hành động là loại tư duy giải quyết nhiệm vụ:",
    ["Nhờ cải tổ thực tế tình huống bằng hành động vận động có thể quan sát","Nhờ cải tổ tình huống chỉ trên bình diện hình ảnh","Dựa trên các khái niệm và mối quan hệ logic nhờ ngôn ngữ","Tất cả các đáp án trên"], 0,
    "Tư duy trực quan - hành động giải quyết nhiệm vụ bằng cách cải tổ TÌNH HUỐNG THỰC bằng hành động vận động có thể quan sát trực tiếp (không qua hình ảnh hay khái niệm trừu tượng).",
    "Tư duy phân loại theo phương tiện/phương thức giải quyết: Tư duy trực quan - hành động (giải quyết bằng hành động vận động cụ thể có thể quan sát được, thường ở trẻ nhỏ hoặc công việc chân tay); Tư duy trực quan - hình ảnh (giải quyết dựa trên hình ảnh cụ thể của sự vật hiện tượng, không cần thao tác vật lí trực tiếp); Tư duy trừu tượng/lí luận (giải quyết dựa trên khái niệm, phán đoán, suy luận logic bằng ngôn ngữ, không cần sự vật cụ thể trước mắt)."],
  ["Mệnh đề đúng với tưởng tượng:",
    ["Tạo sản phẩm bằng cách sắp xếp biểu tượng đã có theo cấu trúc mới","Tạo sản phẩm bằng cách sắp xếp khái niệm theo cấu trúc mới","Sản phẩm mang tính chính xác, hợp lý và chặt chẽ","Tìm cái mới bằng các thao tác trí tuệ qua nhiều giai đoạn"], 0,
    "Tưởng tượng tạo sản phẩm mới bằng cách sắp xếp lại các biểu tượng ĐÃ CÓ theo cấu trúc mới — đây là đặc điểm đúng, phân biệt với tư duy (sắp xếp khái niệm) hay đặc điểm chính xác/chặt chẽ (đó là của tư duy).",
    "Tưởng tượng là quá trình nhận thức lí tính phản ánh những cái chưa từng có trong kinh nghiệm của cá nhân, bằng cách xây dựng những hình ảnh mới trên cơ sở những biểu tượng đã có. Khác với tư duy: tưởng tượng xuất hiện khi tình huống có tính bất định cao (dữ liệu không rõ ràng, không đầy đủ), cho phép 'nhảy cóc' qua một số giai đoạn tư duy chặt chẽ; còn tư duy đòi hỏi dữ liệu rõ ràng, giải quyết theo trình tự logic chặt chẽ hơn."],
  ["Robot lau nhà có cảm biến tránh vật cản. Phương pháp sáng tạo nào là chủ yếu?",
    ["Thay đổi kích thước số lượng","Liên hợp (đa năng)","Loại suy (mô phỏng)","Nhấn mạnh"], 2,
    "Cảm biến giúp robot 'mô phỏng' theo cách con người/động vật né tránh vật cản dựa trên nguyên lí cảm nhận môi trường xung quanh — đây là loại suy (mô phỏng theo nguyên lí có sẵn).",
    "6 cách sáng tạo hình ảnh mới trong tưởng tượng: (1) Chắp ghép — ghép các bộ phận của nhiều sự vật khác nhau, giữ nguyên hình dạng, thành một hình ảnh mới (VD: nàng tiên cá, nhân sư); (2) Liên hợp — ghép các bộ phận/chức năng nhưng có cải biến, sắp xếp lại để tạo ra một chỉnh thể có chức năng mới (VD: xe tăng lội nước, bút đa năng, robot có nhiều cảm biến kết hợp); (3) Nhấn mạnh — phóng đại một bộ phận/thuộc tính để biểu đạt ý nghĩa (VD: tranh biếm họa, tượng nghìn tay nghìn mắt); (4) Điển hình hóa — khái quát những nét chung, tiêu biểu của cả một nhóm đối tượng vào một hình tượng đại diện; (5) Loại suy (mô phỏng) — dựa trên sự tương tự với một cấu tạo/nguyên lí đã có trong tự nhiên (VD: tàu ngầm mô phỏng da cá heo, robot bay mô phỏng cánh chim/bướm); (6) Thay đổi kích thước, số lượng — phóng to/thu nhỏ hoặc tăng giảm số lượng bộ phận so với thực tế (VD: quả cầu địa lí thu nhỏ Trái Đất)."],
  ["Xe tăng lội nước, thủy phi cơ, ô tô bay nhấn mạnh cách tưởng tượng nào?",
    ["Chắp ghép","Điển hình hóa","Loại suy","Liên hợp"], 3,
    "Các phương tiện đa năng lội nước-bay-chạy là sự kết hợp có cải biến nhiều chức năng khác nhau vào một chỉnh thể mới — đây là liên hợp.",
    "6 cách sáng tạo hình ảnh mới trong tưởng tượng: (1) Chắp ghép — ghép các bộ phận của nhiều sự vật khác nhau, giữ nguyên hình dạng, thành một hình ảnh mới (VD: nàng tiên cá, nhân sư); (2) Liên hợp — ghép các bộ phận/chức năng nhưng có cải biến, sắp xếp lại để tạo ra một chỉnh thể có chức năng mới (VD: xe tăng lội nước, bút đa năng, robot có nhiều cảm biến kết hợp); (3) Nhấn mạnh — phóng đại một bộ phận/thuộc tính để biểu đạt ý nghĩa (VD: tranh biếm họa, tượng nghìn tay nghìn mắt); (4) Điển hình hóa — khái quát những nét chung, tiêu biểu của cả một nhóm đối tượng vào một hình tượng đại diện; (5) Loại suy (mô phỏng) — dựa trên sự tương tự với một cấu tạo/nguyên lí đã có trong tự nhiên (VD: tàu ngầm mô phỏng da cá heo, robot bay mô phỏng cánh chim/bướm); (6) Thay đổi kích thước, số lượng — phóng to/thu nhỏ hoặc tăng giảm số lượng bộ phận so với thực tế (VD: quả cầu địa lí thu nhỏ Trái Đất)."],
  ["Hình tượng Phật Bà Nghìn mắt Nghìn tay được tạo ra bằng cách nào?",
    ["Nhấn mạnh","Chắp ghép","Thay đổi kích thước","Điển hình hóa"], 0,
    "Nhân nhiều tay, nhiều mắt để nhấn mạnh khả năng nhìn thấu và cứu giúp khắp nơi — đây là cách nhấn mạnh (phóng đại một đặc điểm để biểu đạt ý nghĩa).",
    "6 cách sáng tạo hình ảnh mới trong tưởng tượng: (1) Chắp ghép — ghép các bộ phận của nhiều sự vật khác nhau, giữ nguyên hình dạng, thành một hình ảnh mới (VD: nàng tiên cá, nhân sư); (2) Liên hợp — ghép các bộ phận/chức năng nhưng có cải biến, sắp xếp lại để tạo ra một chỉnh thể có chức năng mới (VD: xe tăng lội nước, bút đa năng, robot có nhiều cảm biến kết hợp); (3) Nhấn mạnh — phóng đại một bộ phận/thuộc tính để biểu đạt ý nghĩa (VD: tranh biếm họa, tượng nghìn tay nghìn mắt); (4) Điển hình hóa — khái quát những nét chung, tiêu biểu của cả một nhóm đối tượng vào một hình tượng đại diện; (5) Loại suy (mô phỏng) — dựa trên sự tương tự với một cấu tạo/nguyên lí đã có trong tự nhiên (VD: tàu ngầm mô phỏng da cá heo, robot bay mô phỏng cánh chim/bướm); (6) Thay đổi kích thước, số lượng — phóng to/thu nhỏ hoặc tăng giảm số lượng bộ phận so với thực tế (VD: quả cầu địa lí thu nhỏ Trái Đất)."],
  ["Hình ảnh \"Nàng tiên cá\" được tạo ra bằng cách nào?",

  ["Hình ảnh tranh biếm họa được tạo ra bằng cách nào?",

    "6 cách sáng tạo hình ảnh mới trong tưởng tượng: (1) Chắp ghép — ghép các bộ phận của nhiều sự vật khác nhau, giữ nguyên hình dạng, thành một hình ảnh mới (VD: nàng tiên cá, nhân sư); (2) Liên hợp — ghép các bộ phận/chức năng nhưng có cải biến, sắp xếp lại để tạo ra một chỉnh thể có chức năng mới (VD: xe tăng lội nước, bút đa năng, robot có nhiều cảm biến kết hợp); (3) Nhấn mạnh — phóng đại một bộ phận/thuộc tính để biểu đạt ý nghĩa (VD: tranh biếm họa, tượng nghìn tay nghìn mắt); (4) Điển hình hóa — khái quát những nét chung, tiêu biểu của cả một nhóm đối tượng vào một hình tượng đại diện; (5) Loại suy (mô phỏng) — dựa trên sự tương tự với một cấu tạo/nguyên lí đã có trong tự nhiên (VD: tàu ngầm mô phỏng da cá heo, robot bay mô phỏng cánh chim/bướm); (6) Thay đổi kích thước, số lượng — phóng to/thu nhỏ hoặc tăng giảm số lượng bộ phận so với thực tế (VD: quả cầu địa lí thu nhỏ Trái Đất)."],
  ["Học sinh chưa bao giờ bỏ dở công việc. Sau lần thất bại vẫn cố tiếp tục. Hiện tượng tâm lí nào?",
    ["Quá trình tâm lý","Trạng thái tâm lý","Thuộc tính tâm lý","Tất cả các đáp án trên"], 2,
    "Kiên trì theo đuổi công việc dù thất bại là biểu hiện của một phẩm chất ý chí ổn định, đặc trưng cho cá nhân đó lâu dài — đây là thuộc tính tâm lí (không phải một quá trình/trạng thái nhất thời).",
    "Ba loại hiện tượng tâm lí phân biệt theo thời gian tồn tại: Quá trình tâm lí (ngắn, có mở đầu-diễn biến-kết thúc rõ ràng, VD: đang suy nghĩ, đang nghe giảng); Trạng thái tâm lí (tồn tại lâu hơn nhưng không có mốc đầu-cuối rõ, là 'cái nền' đi kèm hoạt động, VD: chú ý, căng thẳng, hồi hộp); Thuộc tính tâm lí (ổn định, bền vững, đặc trưng riêng cho từng người, VD: tính trung thực, kiên trì)."],
  ["Cơ chế chủ yếu của sự hình thành và phát triển tâm lí người là:",
    ["Sự di truyền","Sự chín muồi của tiềm năng sinh vật dưới tác động môi trường","Sự lĩnh hội nền văn hóa xã hội","Sự tự nhận thức, tự giáo dục"], 2,
    "Cơ chế chủ yếu hình thành và phát triển tâm lí người là sự lĩnh hội nền văn hóa xã hội qua hoạt động và giao tiếp — không phải do di truyền hay chỉ do sự chín muồi sinh học đơn thuần.",
    "Cơ chế chủ yếu hình thành và phát triển tâm lí người là sự lĩnh hội (tiếp thu) nền văn hóa - kinh nghiệm xã hội loài người thông qua hoạt động và giao tiếp; yếu tố sinh học (di truyền, thể chất) chỉ đóng vai trò tiền đề vật chất chứ không quyết định trực tiếp nội dung tâm lí."],
  ["Sau 10 năm mất liên lạc, gặp lại bạn cũ thì tính cách của họ sẽ thế nào?",
    ["Thay đổi hoàn toàn","Thay đổi hoàn toàn theo hoàn cảnh sống","Không thể thay đổi","Có thể thay đổi nhưng tương đối ổn định"], 3,
    "Vì thuộc tính tâm lí (tính cách) có tính tương đối ổn định và bền vững, nên dù 10 năm không gặp, tính cách người bạn có thể thay đổi phần nào theo trải nghiệm sống nhưng về cơ bản vẫn giữ được những nét tương đối ổn định.",
    "Ba loại hiện tượng tâm lí phân biệt theo thời gian tồn tại: Quá trình tâm lí (ngắn, có mở đầu-diễn biến-kết thúc rõ ràng, VD: đang suy nghĩ, đang nghe giảng); Trạng thái tâm lí (tồn tại lâu hơn nhưng không có mốc đầu-cuối rõ, là 'cái nền' đi kèm hoạt động, VD: chú ý, căng thẳng, hồi hộp); Thuộc tính tâm lí (ổn định, bền vững, đặc trưng riêng cho từng người, VD: tính trung thực, kiên trì)."],
  ["Muốn biết tâm lí con người, nhìn vào 'con mắt của người ấy'. Điều đó đúng hay sai?",
    ["Điều đó đúng","Điều đó sai","Có khi đúng, có khi sai","Không có phương án trả lời"], 2,
    "Ánh mắt chỉ là một biểu hiện bên ngoài, có thể phản ánh phần nào tâm trạng nhất thời nhưng KHÔNG thể đại diện đầy đủ, chính xác cho toàn bộ tâm lí phức tạp của một người — nên câu này có khi đúng có khi sai tùy tình huống.",
    "Tâm lí người là sự phản ánh hiện thực khách quan vào não thông qua lăng kính chủ quan của mỗi người. Nó có nguồn gốc từ thế giới khách quan (chủ yếu là các mối quan hệ xã hội), được nảy sinh bằng hoạt động và giao tiếp. Vì mang tính chủ thể, mỗi người phản ánh thế giới theo cách riêng dựa trên kinh nghiệm, nhu cầu và đặc điểm hệ thần kinh của mình — đây là lí do hai người cùng nhìn một sự việc nhưng cảm nhận khác nhau."],
  ["Sự tham gia của yếu tố nào tạo nên tính gián tiếp và khái quát trong tư duy?",
    ["Ngôn ngữ","Nhận thức cảm tính","Các quá trình tâm lí khác","Kinh nghiệm đã có về sự vật, hiện tượng"], 0,
    "Ngôn ngữ là công cụ giúp tư duy mang tính gián tiếp (không cần tác động trực tiếp của sự vật) và khái quát (diễn đạt được những khái niệm trừu tượng, chung cho cả loại sự vật) — đây là vai trò cốt lõi của ngôn ngữ đối với tư duy.",
    "Tư duy có các đặc điểm cơ bản: Tính 'có vấn đề' (chỉ nảy sinh khi gặp tình huống chưa biết cách giải quyết); Tính gián tiếp (dùng ngôn ngữ, công cụ, kinh nghiệm để nhận thức chứ không cần tác động trực tiếp của sự vật); Tính trừu tượng và khái quát (phản ánh cái chung, cái bản chất của một loạt sự vật cùng loại); Quan hệ chặt chẽ với ngôn ngữ (không có ngôn ngữ thì tư duy không thể diễn ra và biểu đạt); Quan hệ chặt chẽ với nhận thức cảm tính (lấy cảm giác, tri giác làm 'nguyên liệu' đầu vào, và kết quả tư duy được kiểm nghiệm lại qua thực tiễn cảm tính)."],
  ["Các yếu tố sinh học có vai trò gì trong hình thành và phát triển tâm lí cá nhân?",
    ["Quyết định trực tiếp","Tác động trực tiếp","Tiền đề","Chủ đạo"], 2,
    "Yếu tố sinh học (di truyền, cấu tạo não, thể chất) chỉ đóng vai trò TIỀN ĐỀ vật chất, tạo điều kiện cho tâm lí phát triển, chứ không quyết định trực tiếp hay chủ đạo nội dung tâm lí (điều đó do hoạt động và môi trường xã hội quyết định).",
    "Cơ chế chủ yếu hình thành và phát triển tâm lí người là sự lĩnh hội (tiếp thu) nền văn hóa - kinh nghiệm xã hội loài người thông qua hoạt động và giao tiếp; yếu tố sinh học (di truyền, thể chất) chỉ đóng vai trò tiền đề vật chất chứ không quyết định trực tiếp nội dung tâm lí."],
  ["Thói quen trong học tập của sinh viên được hình thành dựa trên cơ chế nào của não bộ?",
    ["Phản xạ không điều kiện","Phản xạ có điều kiện","Lan tỏa và tập trung","Cảm ứng qua lại"], 1,
    "Thói quen được hình thành qua sự lặp đi lặp lại nhiều lần, tạo thành các đường liên hệ thần kinh bền vững — đây chính là cơ chế phản xạ có điều kiện.",
    "Cơ chế chủ yếu hình thành và phát triển tâm lí người là sự lĩnh hội (tiếp thu) nền văn hóa - kinh nghiệm xã hội loài người thông qua hoạt động và giao tiếp; yếu tố sinh học (di truyền, thể chất) chỉ đóng vai trò tiền đề vật chất chứ không quyết định trực tiếp nội dung tâm lí."],
  ["Người phục vụ bàn ăn phải quan sát và tìm hiểu để ứng xử phù hợp với khách từ nhiều nền văn hóa. Ứng dụng bản chất nào?",
    ["Tính chủ thể","Tính khách thể","Tính xã hội – lịch sử","Tất cả đáp án trên"], 0,
    "Người phục vụ phải hiểu và thích ứng với đặc điểm văn hóa riêng của mỗi khách hàng — đây là ứng dụng của tính chủ thể trong tâm lí (mỗi người/mỗi nền văn hóa phản ánh và ứng xử theo cách riêng).",
    "Tâm lí người là sự phản ánh hiện thực khách quan vào não thông qua lăng kính chủ quan của mỗi người. Nó có nguồn gốc từ thế giới khách quan (chủ yếu là các mối quan hệ xã hội), được nảy sinh bằng hoạt động và giao tiếp. Vì mang tính chủ thể, mỗi người phản ánh thế giới theo cách riêng dựa trên kinh nghiệm, nhu cầu và đặc điểm hệ thần kinh của mình — đây là lí do hai người cùng nhìn một sự việc nhưng cảm nhận khác nhau."],
  ["Lắp gương trong thang máy để người dùng không có cảm giác chật. Quy luật nào?",
    ["Tính có ý nghĩa","Ảo ảnh tri giác","Tính lựa chọn","Tổng giác"], 1,
    "Gương trong thang máy tạo ảo giác về không gian rộng hơn thực tế, giúp giảm cảm giác chật chội — đây là ứng dụng của ảo ảnh tri giác.",
    "Ảo ảnh tri giác: sự phản ánh sai lệch các sự vật, hiện tượng một cách khách quan (do đặc điểm cấu tạo giác quan hoặc do quy luật của tri giác), xảy ra ở mọi người trong những điều kiện xác định, con người có thể chủ động vận dụng vào thực tiễn (trang trí, ngụy trang, thời trang, kiến trúc...)."],
  ["Khoảng cách thích hợp nhất từ mắt đến màn hình máy tính 50cm. Phản ánh quy luật nào?",
    ["Quy luật ngưỡng cảm giác","Quy luật thích ứng","Quy luật tác động qua lại giữa các cảm giác","Tất cả các quy luật trên"], 0,
    "Khoảng cách 50cm là mức phù hợp để mắt không phải điều tiết quá mức hay quá ít — liên quan đến việc đảm bảo kích thích ở mức vừa đủ ngưỡng để mắt hoạt động hiệu quả, tránh mỏi mắt (ứng dụng nguyên lý ngưỡng cảm giác).",
    "Ngưỡng cảm giác gồm: Ngưỡng tuyệt đối phía dưới — cường độ kích thích TỐI THIỂU đủ gây cảm giác; Ngưỡng tuyệt đối phía trên — cường độ kích thích TỐI ĐA còn gây được cảm giác (vượt quá sẽ mất cảm giác hoặc gây đau); Ngưỡng sai biệt — mức chênh lệch cường độ TỐI THIỂU giữa hai kích thích để phân biệt được sự khác nhau giữa chúng. Nếu kích thích nằm dưới ngưỡng (quá nhẹ, quá nhỏ) thì ta sẽ không cảm nhận được."],
  ["Kỹ sư thiết kế bộ phận chỉ báo phải chú ý thời gian lộ sáng. Ứng dụng thuộc quá trình nào?",
    ["Cảm giác","Tri giác","Tư duy","Tưởng tượng"], 1,
    "Thiết kế bộ phận chỉ báo (đèn, còi...) cần đủ thời gian tác động để mắt/tai kịp cảm nhận và xử lí thông tin — đây thuộc về quá trình tri giác (nhận biết trọn vẹn tín hiệu, không chỉ là cảm giác đơn lẻ).",
    "Tri giác là quá trình tâm lí phản ánh một cách trọn vẹn các thuộc tính bề ngoài của sự vật, hiện tượng khi chúng trực tiếp tác động vào giác quan. Khác cảm giác ở chỗ tri giác cho ta hình ảnh hoàn chỉnh, có cấu trúc về đối tượng, chứ không phải từng thuộc tính rời rạc."],
  ["\"Khi dập nước lạnh lên mặt thì độ tinh mắt của người phi công tăng lên\" là quy luật nào?",
    ["Sự thích ứng của cảm giác","Ngưỡng cảm giác","Sự tác động lẫn nhau giữa các cảm giác","Tất cả các đáp án trên"], 2,
    "Dội nước lạnh làm tăng độ tỉnh táo và ảnh hưởng đến các giác quan khác (thị giác tinh hơn) — đây là biểu hiện của quy luật tác động qua lại giữa các cảm giác (một cảm giác này ảnh hưởng đến cảm giác khác).",
    "Quy luật tác động qua lại giữa các cảm giác: các cảm giác không tồn tại độc lập mà luôn ảnh hưởng lẫn nhau. Biểu hiện dưới 2 dạng: Tương phản đồng thời (hai kích thích cùng lúc làm tăng cảm nhận sự khác biệt, VD: phối màu đen-trắng, chữ đỏ nổi bật trên nền khác) và tương phản nối tiếp (kích thích trước ảnh hưởng đến cảm nhận kích thích sau, VD: dội nước lạnh làm mắt tinh hơn tạm thời)."],
  ["\"Công nhân đốt máy xe lửa làm việc hàng giờ dưới nhiệt độ 50-60 độ\" thể hiện quy luật nào?",
    ["Quy luật ngưỡng cảm giác","Quy luật thích ứng của cảm giác","Quy luật tác động qua lại giữa các cảm giác","Tất cả các đáp án trên"], 1,
    "Công nhân làm việc liên tục trong môi trường nhiệt độ cao dần quen với sức nóng, độ nhạy cảm với nhiệt giảm đi — đây là quy luật thích ứng của cảm giác.",
    "Quy luật thích ứng: khả năng thay đổi độ nhạy cảm của cảm giác cho phù hợp với sự thay đổi của cường độ kích thích — kích thích tác động lâu, liên tục thì độ nhạy cảm giảm dần (tăng ngưỡng cảm giác) đến khi thấy 'bình thường', quen dần; còn kích thích yếu, ít tác động thì độ nhạy cảm tăng lên để dễ phát hiện hơn."],
  ["Độ cao không quá 1,5m so với mặt đất để khách quan sát sản phẩm rõ nhất. Dựa trên lý thuyết nào?",
    ["Tính trọn vẹn","Tính bề ngoài của sự vật","Tính trực tiếp","Tính tích cực, tự giác"], 0,
    "Độ cao 1,5m gần tầm mắt trung bình của người đứng, giúp khách nhìn thấy TRỌN VẸN sản phẩm mà không cần ngẩng/cúi quá nhiều — dựa trên tính trọn vẹn của tri giác.",
    "Tri giác là quá trình tâm lí phản ánh một cách trọn vẹn các thuộc tính bề ngoài của sự vật, hiện tượng khi chúng trực tiếp tác động vào giác quan. Khác cảm giác ở chỗ tri giác cho ta hình ảnh hoàn chỉnh, có cấu trúc về đối tượng, chứ không phải từng thuộc tính rời rạc."],
  ["Thay đổi ngữ điệu của lời nói cho phù hợp nội dung. Ứng dụng quy luật nào?",
    ["Thay đổi ngữ điệu lời nói","Lời nói giáo viên rõ ràng, mạch lạc","Tác động đồng thời lên các giác quan để tăng cảm giác","Giới thiệu đồ dùng trực quan kèm lời chỉ dẫn"], 0,
    "Thay đổi ngữ điệu lời nói cho phù hợp nội dung là một hình thức trực tiếp làm tăng hiệu quả truyền đạt/tiếp nhận thông tin — đây chính là bản thân biện pháp được nêu, không cần suy luận thêm qua quy luật khác.",
    "Tính ý nghĩa của tri giác: tri giác luôn gắn liền với tư duy, mang một ý nghĩa nhất định, chịu ảnh hưởng bởi kinh nghiệm, đời sống tâm lí và đặc điểm nhân cách của người tri giác — nên cùng một sự vật nhưng những người khác nhau (khác hiểu biết, trạng thái) có thể tri giác/gọi tên khác nhau."],
  ["Con người nhận biết được những cơn đau đầu là nhờ loại cảm giác nào?",
    ["Cảm giác thăng bằng","Cảm giác cơ thể","Cảm giác rung","Cảm giác vận động"], 1,
    "Cảm giác đau là một dạng cảm giác cơ thể (cảm giác nội tạng/bên trong), phản ánh trạng thái của các cơ quan bên trong cơ thể.",
    "Cảm giác bên ngoài là những cảm giác do kích thích từ bên ngoài cơ thể tác động vào các giác quan (nhìn, nghe, ngửi, nếm, da/sờ mó), khác với cảm giác bên trong (vận động, thăng bằng, cơ thể/nén, rung) phản ánh trạng thái bên trong cơ thể."],
  ["Nhà tuyển dụng chỉ lướt CV vài giây, hãy tập trung từ khóa kỹ năng. Nhấn mạnh quy luật nào?",
    ["Tính lựa chọn của tri giác","Tính ổn định của tri giác","Tính ý nghĩa của tri giác","Tính ảo ảnh của tri giác"], 0,
    "Nhà tuyển dụng chỉ chọn ra một vài từ khóa quan trọng trong số rất nhiều nội dung trên CV — đây là biểu hiện của tính lựa chọn trong tri giác.",
    "Tính lựa chọn của tri giác: con người không phản ánh tất cả các sự vật đang tác động, mà chỉ tách một số đối tượng ra khỏi vô số đối tượng khác để tri giác rõ ràng (đối tượng làm 'hình', phần còn lại làm 'nền')."],
  ["Xem vật 0,05 giây thấy gì sáng; 0,5 giây nhận ra hình dạng. Thuộc quá trình nào?",
    ["Tri giác","Trí nhớ","Tư duy","Tưởng tượng"], 0,
    "Ở mức 0,05 giây (quá ngắn) chỉ đủ để có cảm giác về ánh sáng (thuộc tính đơn lẻ); phải đến 0,5 giây mới đủ thời gian để nhận ra hình dạng trọn vẹn — đây là quá trình tri giác (khi đã đủ để nhận biết đầy đủ đối tượng), phân biệt với cảm giác ở giai đoạn đầu.",
    "Tri giác là quá trình tâm lí phản ánh một cách trọn vẹn các thuộc tính bề ngoài của sự vật, hiện tượng khi chúng trực tiếp tác động vào giác quan. Khác cảm giác ở chỗ tri giác cho ta hình ảnh hoàn chỉnh, có cấu trúc về đối tượng, chứ không phải từng thuộc tính rời rạc."],
  ["Người gầy mặc kẻ ngang, người béo mặc kẻ dọc. Lời khuyên dựa trên quy luật nào?",
    ["Tính ổn định","Tính có ý nghĩa","Ảo ảnh tri giác","Tổng giác"], 2,
    "Kẻ ngang tạo ảo giác về chiều ngang rộng hơn (người gầy trông đầy đặn hơn), kẻ dọc tạo ảo giác cao/gầy hơn (người béo trông thon hơn) — đây là ứng dụng của ảo ảnh tri giác trong thời trang.",
    "Ảo ảnh tri giác: sự phản ánh sai lệch các sự vật, hiện tượng một cách khách quan (do đặc điểm cấu tạo giác quan hoặc do quy luật của tri giác), xảy ra ở mọi người trong những điều kiện xác định, con người có thể chủ động vận dụng vào thực tiễn (trang trí, ngụy trang, thời trang, kiến trúc...)."],
  ["Phạm Ngũ Lão mải nghĩ việc nước không biết lính đi qua, đến khi bị đâm mới biết. Thuộc tính nào?",
    ["Sức tập trung chú ý","Sự bền vững của chú ý","Sự phân phối chú ý","Sự di chuyển chú ý"], 0,
    "Phạm Ngũ Lão dồn hết chú ý vào việc suy nghĩ đến mức không nhận ra kích thích xung quanh (lính đi qua) — đây là biểu hiện của sức tập trung cao độ của chú ý.",
    "Chú ý là trạng thái tâm lí, biểu hiện sự tập trung của hoạt động tâm lí vào một hay một số đối tượng nhất định để phản ánh chúng tốt hơn. Chú ý có 4 thuộc tính cơ bản: Sức tập trung (mức độ chú ý dồn vào phạm vi hẹp), Sự bền vững (duy trì chú ý lâu dài trên một đối tượng), Sự phân phối (chú ý cùng lúc nhiều đối tượng/hoạt động khác nhau), Sự di chuyển (chuyển chú ý linh hoạt từ đối tượng này sang đối tượng khác theo yêu cầu)."],
  ["Học sinh mê bài giảng đến mức không nghe tiếng chuông hết giờ. Thuộc tính nào của chú ý?",
    ["Sức tập trung chú ý","Sự bền vững của chú ý","Sự phân phối chú ý","Sự di chuyển chú ý"], 1,
    "Duy trì trạng thái say mê, tập trung liên tục trong suốt thời gian dài của bài giảng đến mức không để ý tiếng chuông — đây là biểu hiện của sự bền vững của chú ý.",
    "Chú ý là trạng thái tâm lí, biểu hiện sự tập trung của hoạt động tâm lí vào một hay một số đối tượng nhất định để phản ánh chúng tốt hơn. Chú ý có 4 thuộc tính cơ bản: Sức tập trung (mức độ chú ý dồn vào phạm vi hẹp), Sự bền vững (duy trì chú ý lâu dài trên một đối tượng), Sự phân phối (chú ý cùng lúc nhiều đối tượng/hoạt động khác nhau), Sự di chuyển (chuyển chú ý linh hoạt từ đối tượng này sang đối tượng khác theo yêu cầu)."],
  ["\"Người có chú ý là khi nói chuyện vẫn nhìn và nghe tất cả xung quanh\". Thuộc tính nào?",
    ["Sự di chuyển chú ý","Sự tập trung chú ý","Sự phân phối chú ý","Sự phân tán chú ý"], 2,
    "Khả năng cùng lúc chú ý đến nhiều đối tượng khác nhau (vừa nói chuyện vừa quan sát xung quanh) chính là sự phân phối chú ý.",
    "Chú ý là trạng thái tâm lí, biểu hiện sự tập trung của hoạt động tâm lí vào một hay một số đối tượng nhất định để phản ánh chúng tốt hơn. Chú ý có 4 thuộc tính cơ bản: Sức tập trung (mức độ chú ý dồn vào phạm vi hẹp), Sự bền vững (duy trì chú ý lâu dài trên một đối tượng), Sự phân phối (chú ý cùng lúc nhiều đối tượng/hoạt động khác nhau), Sự di chuyển (chuyển chú ý linh hoạt từ đối tượng này sang đối tượng khác theo yêu cầu)."],
  ["Hoa phải tìm đọc sách, nhưng bị cuốn vào đọc quên ăn, quên ngủ. Loại chú ý nào?",
    ["Chú ý có sự chủ động","Chú ý sau chủ động","Chú ý có chủ định","Chú ý sau chủ định"], 3,
    "Hoa ban đầu đọc sách với mục đích (có chủ định), nhưng do bị cuốn hút nên duy trì được sự tập trung mà không cần nỗ lực ý chí nữa — đây là chú ý sau chủ định.",
    "3 loại chú ý theo mức độ tự giác: Chú ý không chủ định — không có mục đích định trước, không cần nỗ lực ý chí, do tác động bên ngoài (mới lạ, nổi bật, tương phản) gây ra một cách tự nhiên; Chú ý có chủ định — có mục đích tự giác, cần sự nỗ lực ý chí để duy trì; Chú ý 'sau khi có chủ định' — vốn là chú ý có chủ định nhưng do hứng thú với công việc nên không còn cần căng thẳng ý chí nữa (VD: say mê đọc sách quên cả giờ giấc)."],
  ["Siêu thị bày hàng mới và dễ tiêu thụ tại các điểm giao lối đi. Hiện tượng tâm lý nào?",
    ["Chú ý sau chủ định","Chú ý trước chủ định","Chú ý không chủ định","Chú ý có chủ định"], 2,
    "Bày hàng ở các điểm giao lối đi (nơi có lưu lượng người qua lại cao, dễ đập vào mắt) để thu hút sự chú ý không chủ định của khách hàng một cách tự nhiên.",
    "3 loại chú ý theo mức độ tự giác: Chú ý không chủ định — không có mục đích định trước, không cần nỗ lực ý chí, do tác động bên ngoài (mới lạ, nổi bật, tương phản) gây ra một cách tự nhiên; Chú ý có chủ định — có mục đích tự giác, cần sự nỗ lực ý chí để duy trì; Chú ý 'sau khi có chủ định' — vốn là chú ý có chủ định nhưng do hứng thú với công việc nên không còn cần căng thẳng ý chí nữa (VD: say mê đọc sách quên cả giờ giấc)."],
  ["Học sinh nhớ lại 70% tuần đầu, sau một tháng chỉ còn 45%. Quá trình trí nhớ nào?",
    ["Quá trình giữ gìn","Quá trình nhớ lại","Quá trình ghi nhớ","Sự quên"], 3,
    "Sự suy giảm % nhớ được theo thời gian (từ 70% xuống 45%) chính là biểu hiện của quá trình quên — tốc độ quên nhanh ở giai đoạn đầu rồi chậm dần.",
    "Trí nhớ gồm 4 quá trình cơ bản: Ghi nhớ (thu nhận, xử lí thông tin ban đầu), Giữ gìn (củng cố dấu vết thông tin), Nhận lại/Nhớ lại (làm xuất hiện lại thông tin: nhận lại khi có sự vật ở trước mặt, nhớ lại khi không có sự vật xuất hiện trực tiếp mà tự tái hiện), và Quên (sự mất khả năng tái hiện, nhưng quên vẫn diễn ra theo quy luật, mang tính hữu ích để 'giải phóng bộ nhớ' chứ không xóa bỏ hoàn toàn 'dấu vết' — vì đôi khi có thể phục hồi lại được)."],
  ["Giáo viên nhắc một phần công thức, học sinh nhận ra ngay. Quá trình trí nhớ nào?",
    ["Quá trình nhớ lại","Quá trình giữ gìn","Quá trình ghi nhớ","Quá trình nhận lại"], 3,
    "Chỉ cần một gợi ý nhỏ (một phần công thức) đã nhận ra ngay toàn bộ — đây là quá trình nhận lại (nhận ra thông tin cũ khi có một phần kích thích xuất hiện trước mặt).",
    "Trí nhớ gồm 4 quá trình cơ bản: Ghi nhớ (thu nhận, xử lí thông tin ban đầu), Giữ gìn (củng cố dấu vết thông tin), Nhận lại/Nhớ lại (làm xuất hiện lại thông tin: nhận lại khi có sự vật ở trước mặt, nhớ lại khi không có sự vật xuất hiện trực tiếp mà tự tái hiện), và Quên (sự mất khả năng tái hiện, nhưng quên vẫn diễn ra theo quy luật, mang tính hữu ích để 'giải phóng bộ nhớ' chứ không xóa bỏ hoàn toàn 'dấu vết' — vì đôi khi có thể phục hồi lại được)."],
  ["Yêu cầu học sinh lập dàn ý bài khóa và trình bày lại. Giáo dục năng lực nào?",
    ["Trí nhớ","Tư duy","Tưởng tượng","Ngôn ngữ"], 0,
    "Lập dàn ý và trình bày lại nội dung bài học là hoạt động rèn luyện năng lực trí nhớ (ghi nhớ có ý nghĩa và tái hiện lại thông tin).",
    "Trí nhớ là quá trình tâm lí phản ánh những kinh nghiệm đã có của cá nhân dưới hình thức ghi nhớ, giữ gìn và làm xuất hiện lại (nhận lại, nhớ lại) những gì đã trải qua. Sản phẩm của trí nhớ là các biểu tượng — hình ảnh của sự vật được tạo ra trên cơ sở các hình ảnh đã có từ tri giác trước đó (khác với cảm giác/tri giác cần có sự vật tác động trực tiếp)."],
  ["Điều nào không đúng với sự quên?",

const QUIZ_SIZE = 30;
const NUM_SETS = 7;
const quizSets = [];
for (let i = 0; i < NUM_SETS; i++) {
  const chunk = allQuestions.slice(i * QUIZ_SIZE, (i + 1) * QUIZ_SIZE);
  if (chunk.length === 0) continue;
  quizSets.push({
    id: i + 1,
    name: `Bộ Quiz ${i + 1}`,
    questions: chunk,
    startIndex: i * QUIZ_SIZE
  });
}

const quizTopics = [
  ["Công dụng TL","Cảm giác","Tri giác"],
