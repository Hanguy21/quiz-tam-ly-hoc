<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Tâm Lý Học Ứng Dụng – 206 Câu</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap');

  :root {
    --bg: #0f1624;
    --surface: #1a2236;
    --card: #212f47;
    --border: #2d4066;
    --accent: #4f8ef7;
    --accent2: #7c5cfc;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #e2e8f0;
    --muted: #8899b4;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Be Vietnam Pro', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #1a2236 0%, #0f1624 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }
  .header-title { font-size: 18px; font-weight: 700; }
  .header-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .sound-toggle {
    margin-left: auto;
    width: 40px; height: 40px; flex-shrink: 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; transition: all .15s; color: var(--text);
  }
  .sound-toggle:hover { border-color: var(--accent); }

  /* MAIN LAYOUT */
  .container { max-width: 960px; margin: 0 auto; padding: 32px 20px; }

  /* HOME SCREEN */
  #home-screen { display: block; }
  .home-hero {
    text-align: center;
    padding: 40px 20px 32px;
    background: linear-gradient(180deg, #1e2f50 0%, transparent 100%);
    border-radius: 20px;
    margin-bottom: 32px;
    border: 1px solid var(--border);
  }
  .home-hero h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
  .home-hero h1 span { background: linear-gradient(90deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .home-hero p { color: var(--muted); font-size: 15px; }

  .quiz-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }
  .quiz-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    cursor: pointer;
    transition: all .2s;
    position: relative;
    overflow: hidden;
  }
  .quiz-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transform: scaleX(0); transform-origin: left;
    transition: transform .2s;
  }
  .quiz-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(79,142,247,.15); }
  .quiz-card:hover::before { transform: scaleX(1); }
  .quiz-num { font-size: 28px; font-weight: 800; color: var(--accent); margin-bottom: 4px; }
  .quiz-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .quiz-info { font-size: 12px; color: var(--muted); }
  .quiz-topics { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 4px; }
  .topic-tag {
    font-size: 10px; padding: 2px 8px;
    background: rgba(79,142,247,.12); color: var(--accent);
    border-radius: 20px; border: 1px solid rgba(79,142,247,.2);
  }
  .quiz-score-badge {
    position: absolute; top: 12px; right: 12px;
    font-size: 11px; font-weight: 700;
    padding: 2px 8px; border-radius: 20px;
    display: none;
  }
  .quiz-score-badge.show { display: block; }
  .badge-good { background: rgba(34,197,94,.2); color: var(--green); }
  .badge-mid { background: rgba(245,158,11,.2); color: var(--yellow); }
  .badge-bad { background: rgba(239,68,68,.2); color: var(--red); }

  /* QUIZ SCREEN */
  #quiz-screen { display: none; }

  .quiz-header {
    display: flex; align-items: center; gap: 16px; margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .back-btn {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 8px 16px; border-radius: 8px;
    cursor: pointer; font-size: 14px; font-family: inherit;
    display: flex; align-items: center; gap: 6px;
    transition: all .15s;
  }
  .back-btn:hover { border-color: var(--accent); }
  .quiz-title-bar { flex: 1; }
  .quiz-title-bar h2 { font-size: 18px; font-weight: 700; }
  .quiz-progress-info { font-size: 12px; color: var(--muted); }

  .progress-bar-wrap { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 28px; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg,var(--accent),var(--accent2)); border-radius: 2px; transition: width .3s; }

  /* QUESTION CARD */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 16px;
  }
  .q-number {
    font-size: 11px; font-weight: 700; color: var(--accent);
    text-transform: uppercase; letter-spacing: .08em; margin-bottom: 12px;
  }
  .q-text { font-size: 16px; font-weight: 600; line-height: 1.6; margin-bottom: 20px; }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    display: flex; align-items: flex-start; gap: 12px;
    background: var(--card); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 14px 16px;
    cursor: pointer; text-align: left; transition: all .15s;
    font-family: inherit; color: var(--text); font-size: 14px; line-height: 1.5;
    width: 100%;
  }
  .option-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(79,142,247,.08); }
  .opt-letter {
    width: 28px; height: 28px; flex-shrink: 0;
    background: rgba(255,255,255,.07); border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
  }
  .option-btn.selected .opt-letter { background: var(--accent); }
  .option-btn.correct { border-color: var(--green); background: rgba(34,197,94,.08); }
  .option-btn.correct .opt-letter { background: var(--green); }
  .option-btn.wrong { border-color: var(--red); background: rgba(239,68,68,.08); }
  .option-btn.wrong .opt-letter { background: var(--red); }
  .option-btn:disabled { cursor: default; }

  /* NAV */
  .nav-row {
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    margin-top: 20px; justify-content: space-between;
  }

  /* EXPLANATION BOXES */
  .explain-box {
    margin-top: 16px; padding: 16px 18px; border-radius: 12px;
    font-size: 13.5px; line-height: 1.65;
    animation: fadeIn .25s ease;
  }
  .explain-why {
    background: rgba(79,142,247,.08);
    border-left: 3px solid var(--accent);
  }
  .explain-summary {
    background: rgba(124,92,252,.08);
    border-left: 3px solid var(--accent2);
    margin-top: 10px;
  }
  .explain-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .06em; margin-bottom: 6px; display: flex; align-items: center; gap: 6px;
  }
  .explain-why .explain-label { color: var(--accent); }
  .explain-summary .explain-label { color: var(--accent2); }
  .explain-text { color: var(--text); opacity: .95; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  .nav-left { display: flex; gap: 10px; }
  .btn {
    padding: 10px 22px; border-radius: 9px; border: none;
    font-family: inherit; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all .15s;
  }
  .btn-primary { background: linear-gradient(135deg,var(--accent),var(--accent2)); color: #fff; }
  .btn-primary:hover { opacity: .88; transform: translateY(-1px); }
  .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
  .btn-outline:hover { border-color: var(--accent); }
  .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

  /* RESULT */
  #result-screen { display: none; }
  .result-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 40px; text-align: center;
    margin-bottom: 24px;
  }
  .result-score {
    font-size: 64px; font-weight: 800;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .result-label { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .result-sub { color: var(--muted); font-size: 14px; }
  .result-stats {
    display: flex; gap: 16px; justify-content: center; margin-top: 24px; flex-wrap: wrap;
  }
  .stat-box {
    background: var(--card); border-radius: 12px; padding: 16px 24px; min-width: 120px;
  }
  .stat-val { font-size: 26px; font-weight: 800; margin-bottom: 4px; }
  .stat-lbl { font-size: 12px; color: var(--muted); }

  /* REVIEW */
  .review-section { margin-top: 24px; }
  .review-section h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: var(--muted); }
  .review-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; margin-bottom: 12px;
  }
  .review-item.correct-item { border-left: 3px solid var(--green); }
  .review-item.wrong-item { border-left: 3px solid var(--red); }
  .review-q { font-size: 14px; font-weight: 600; margin-bottom: 10px; }
  .review-ans { font-size: 13px; margin-bottom: 4px; }
  .review-ans span { font-weight: 600; }
  .correct-ans { color: var(--green); }
  .wrong-ans { color: var(--red); }

  /* QUESTION NAV DOT */
  .q-nav { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
  .q-dot {
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; cursor: pointer;
    background: var(--card); border: 1.5px solid var(--border);
    transition: all .1s; color: var(--muted);
  }
  .q-dot.answered { background: rgba(79,142,247,.15); border-color: var(--accent); color: var(--accent); }
  .q-dot.current { background: var(--accent); border-color: var(--accent); color: #fff; }
  .q-dot:hover { border-color: var(--accent); }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .container { padding: 20px 12px; }
    .q-card { padding: 20px; }
    .result-score { font-size: 48px; }
    .quiz-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🧠</div>
  <div>
    <div class="header-title">Tâm Lý Học Ứng Dụng</div>
    <div class="header-sub">206 Câu Trắc Nghiệm · 7 Bộ Quiz</div>
  </div>
  <button class="sound-toggle" id="sound-toggle" onclick="toggleSound()" title="Bật/tắt âm thanh">🔊</button>
</div>

<!-- HOME -->
<div class="container">
<div id="home-screen">
  <div class="home-hero">
    <h1>Ôn Tập <span>Tâm Lý Học</span></h1>
    <p>Chọn một bộ quiz để bắt đầu luyện tập · Mỗi bộ gồm 30 câu hỏi</p>
  </div>
  <div class="quiz-grid" id="quiz-grid"></div>
</div>

<!-- QUIZ -->
<div id="quiz-screen">
  <div class="quiz-header">
    <button class="back-btn" onclick="goHome()">← Về trang chủ</button>
    <div class="quiz-title-bar">
      <h2 id="quiz-title-bar"></h2>
      <div class="quiz-progress-info" id="quiz-prog-info"></div>
    </div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
  </div>
  
  <!-- Question dots -->
  <div class="q-nav" id="q-nav"></div>
  <br>

  <div class="q-card" id="q-card">
    <div class="q-number" id="q-number"></div>
    <div class="q-text" id="q-text"></div>
    <div class="options" id="q-options"></div>
  </div>

  <div class="nav-row">
    <div class="nav-left">
      <button class="btn btn-outline" id="btn-prev" onclick="prevQ()">← Trước</button>
      <button class="btn btn-outline" id="btn-next" onclick="nextQ()">Tiếp →</button>
    </div>
    <button class="btn btn-primary" id="btn-submit" onclick="submitQuiz()">Nộp bài</button>
  </div>
</div>

<!-- RESULT -->
<div id="result-screen">
  <div class="result-card">
    <div class="result-score" id="res-score"></div>
    <div class="result-label" id="res-label"></div>
    <div class="result-sub" id="res-sub"></div>
    <div class="result-stats">
      <div class="stat-box">
        <div class="stat-val" id="stat-correct" style="color:var(--green)"></div>
        <div class="stat-lbl">Đúng</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="stat-wrong" style="color:var(--red)"></div>
        <div class="stat-lbl">Sai</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="stat-skip" style="color:var(--yellow)"></div>
        <div class="stat-lbl">Bỏ qua</div>
      </div>
    </div>
  </div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;">
    <button class="btn btn-outline" onclick="goHome()">← Về trang chủ</button>
    <button class="btn btn-primary" onclick="retakeQuiz()">🔄 Làm lại</button>
    <button class="btn btn-outline" onclick="showReview()">📋 Xem đáp án</button>
  </div>
  <div class="review-section" id="review-section"></div>
</div>
</div>

<script>
// ==================== DATA ====================
// Đáp án: a=0, b=1, c=2, d=3
// Format: [câu hỏi, [đáp án A, B, C, D], đáp án đúng (0-3), giải thích tại sao, tóm tắt kiến thức liên quan]

const allQuestions = [
  ["Trong các hiện tượng dưới đây, hiện tượng nào là tâm lí?",
    ["Thần kinh căng thẳng như dây đàn sắp đứt","Tim đập như muốn nhảy ra khỏi lồng ngực","Ăn, ngủ đều kém","Bồn chồn như có hẹn với ai"], 3,
    "\"Bồn chồn như có hẹn với ai\" là một trạng thái tâm lí (cảm xúc chủ quan bên trong); còn 3 phương án kia (căng thẳng thần kinh, tim đập nhanh, ăn ngủ kém) đều là các biểu hiện sinh lí của cơ thể.",
    "Tâm lí người là sự phản ánh hiện thực khách quan vào não thông qua lăng kính chủ quan của mỗi người. Nó có nguồn gốc từ thế giới khách quan (chủ yếu là các mối quan hệ xã hội), được nảy sinh bằng hoạt động và giao tiếp. Vì mang tính chủ thể, mỗi người phản ánh thế giới theo cách riêng dựa trên kinh nghiệm, nhu cầu và đặc điểm hệ thần kinh của mình — đây là lí do hai người cùng nhìn một sự việc nhưng cảm nhận khác nhau."],
  ["Tâm lí người là:",
    ["Do một lực lượng siêu nhiên sinh ra","Do não sản sinh ra, tương tự như gan tiết ra mật","Sự phản ánh hiện thực khách quan vào não người qua lăng kính chủ quan","Cả a, b, c"], 2,
    "Định nghĩa chuẩn: tâm lí người là sự phản ánh hiện thực khách quan vào não người, thông qua lăng kính chủ quan (kinh nghiệm, nhu cầu, đặc điểm cá nhân) — không phải do thần linh hay do não 'tiết ra' như một chất.",
    "Tâm lí người là sự phản ánh hiện thực khách quan vào não thông qua lăng kính chủ quan của mỗi người. Nó có nguồn gốc từ thế giới khách quan (chủ yếu là các mối quan hệ xã hội), được nảy sinh bằng hoạt động và giao tiếp. Vì mang tính chủ thể, mỗi người phản ánh thế giới theo cách riêng dựa trên kinh nghiệm, nhu cầu và đặc điểm hệ thần kinh của mình — đây là lí do hai người cùng nhìn một sự việc nhưng cảm nhận khác nhau."],
  ["Hiện tượng nào cho thấy tâm lí tác động đến sinh lý?",
    ["Lo lắng đến mất ngủ","Mệt mỏi không minh mẫn","Mắt kém tri giác kém","Ăn uống đầy đủ giúp cơ thể khỏe mạnh"], 0,
    "Lo lắng (hiện tượng tâm lí) dẫn đến mất ngủ (hiện tượng sinh lí) — đây là chiều tác động từ tâm lí sang sinh lí.",
    "Tâm lí và sinh lí có quan hệ chặt chẽ, tâm lí có cơ sở vật chất là hoạt động của não bộ. Sinh lí ảnh hưởng đến tâm lí (VD: nội tiết tố thay đổi làm thay đổi tâm trạng) và ngược lại tâm lí cũng tác động đến sinh lí (VD: lo lắng gây mất ngủ, ăn kém)."],
  ["Hiện tượng nào cho thấy sinh lý có ảnh hưởng rõ rệt đến tâm lí?",
    ["Tuyến nội tiết làm thay đổi tâm trạng","Lạnh làm run người","Buồn rầu làm ngưng trệ tiêu hóa","Thẹn làm đỏ mặt"], 0,
    "Tuyến nội tiết (yếu tố sinh lí) thay đổi làm thay đổi tâm trạng (hiện tượng tâm lí) — chiều tác động từ sinh lí sang tâm lí.",
    "Tâm lí và sinh lí có quan hệ chặt chẽ, tâm lí có cơ sở vật chất là hoạt động của não bộ. Sinh lí ảnh hưởng đến tâm lí (VD: nội tiết tố thay đổi làm thay đổi tâm trạng) và ngược lại tâm lí cũng tác động đến sinh lí (VD: lo lắng gây mất ngủ, ăn kém)."],
  ["Tâm lí người có nguồn gốc từ:",
    ["Não người","Hoạt động của cá nhân","Thế giới khách quan","Giao tiếp của cá nhân"], 2,
    "Tâm lí người có nguồn gốc từ thế giới khách quan (đặc biệt là các quan hệ xã hội), được phản ánh vào não chứ không phải do não tự sinh ra hay do hoạt động/giao tiếp 'tạo ra' trực tiếp — hoạt động và giao tiếp chỉ là con đường hình thành.",
    "Tâm lí người là sự phản ánh hiện thực khách quan vào não thông qua lăng kính chủ quan của mỗi người. Nó có nguồn gốc từ thế giới khách quan (chủ yếu là các mối quan hệ xã hội), được nảy sinh bằng hoạt động và giao tiếp. Vì mang tính chủ thể, mỗi người phản ánh thế giới theo cách riêng dựa trên kinh nghiệm, nhu cầu và đặc điểm hệ thần kinh của mình — đây là lí do hai người cùng nhìn một sự việc nhưng cảm nhận khác nhau."],
  ["Những đứa trẻ do động vật nuôi từ nhỏ không có được tâm lí người vì:",
    ["Các mối quan hệ xã hội quy định bản chất tâm lí người","Môi trường sống quy định bản chất tâm lí người","Các dạng hoạt động và giao tiếp quy định trực tiếp sự hình thành tâm lí người","Cả a, b, c"], 3,
    "Trẻ bị động vật nuôi thiếu các mối quan hệ xã hội, dạng hoạt động và giao tiếp đặc trưng của loài người — mà chính các yếu tố này mới quy định trực tiếp sự hình thành tâm lí người, nên trẻ không phát triển được tâm lí người bình thường dù vẫn có cấu tạo não người.",
    "Tâm lí người mang bản chất xã hội - lịch sử: nó được hình thành, phát triển và biểu hiện trong hoạt động và các mối quan hệ giao tiếp xã hội, chứ không phải chỉ do yếu tố sinh học quyết định. Vì vậy trẻ em thiếu môi trường xã hội (bị động vật nuôi) sẽ không có tâm lí người bình thường; muốn hiểu tâm lí một nhóm khách hàng hay cá nhân, phải nghiên cứu môi trường sống, hoàn cảnh xã hội của họ."],
  ["Nhân tố tâm lí giữ vai trò cơ bản trong hoạt động của con người, bởi vì:",
    ["Tâm lí có chức năng định hướng cho hoạt động","Tâm lí điều khiển, kiểm tra và điều chỉnh hoạt động","Tâm lí là động lực thúc đẩy con người hoạt động","Cả a, b, c"], 3,
    "Tâm lí giữ vai trò cơ bản vì nó thực hiện đồng thời cả 3 chức năng: định hướng, điều khiển/điều chỉnh và tạo động lực cho hoạt động của con người.",
    "Tâm lí có 3 chức năng cơ bản: (1) Định hướng — giúp xác định mục đích, phương hướng hoạt động; (2) Điều khiển, điều chỉnh — kiểm soát hoạt động cho phù hợp mục tiêu; (3) Động lực — thôi thúc, lôi cuốn con người hành động và vượt khó khăn. 'Dự đoán' không phải là một chức năng riêng biệt của tâm lí."],
  ["Đâu không phải là chức năng của các hiện tượng tâm lí người?",
    ["Định hướng hoạt động","Điều chỉnh hoạt động","Điều khiển hoạt động","Dự đoán hoạt động"], 3,
    "3 chức năng chính thức của tâm lí là định hướng, điều khiển, điều chỉnh hoạt động; 'dự đoán hoạt động' không phải là một chức năng độc lập được xếp trong nhóm này.",
    "Tâm lí có 3 chức năng cơ bản: (1) Định hướng — giúp xác định mục đích, phương hướng hoạt động; (2) Điều khiển, điều chỉnh — kiểm soát hoạt động cho phù hợp mục tiêu; (3) Động lực — thôi thúc, lôi cuốn con người hành động và vượt khó khăn. 'Dự đoán' không phải là một chức năng riêng biệt của tâm lí."],
  ["\"Tâm lý là động lực thôi thúc, lôi cuốn con người hoạt động, khắc phục mọi khó khăn vươn tới mục đích\". Chức năng nào đã được đề cập?",
    ["Động lực","Điều khiển","Điều chỉnh","Định hướng"], 0,
    "Câu mô tả tâm lí \"thôi thúc, lôi cuốn... khắc phục khó khăn vươn tới mục đích\" chính là định nghĩa của chức năng động lực.",
    "Tâm lí có 3 chức năng cơ bản: (1) Định hướng — giúp xác định mục đích, phương hướng hoạt động; (2) Điều khiển, điều chỉnh — kiểm soát hoạt động cho phù hợp mục tiêu; (3) Động lực — thôi thúc, lôi cuốn con người hành động và vượt khó khăn. 'Dự đoán' không phải là một chức năng riêng biệt của tâm lí."],
  ["Phản ánh tâm lí người là một loại phản ánh đặc biệt vì:",
    ["Hình ảnh tâm lí là sự phản ánh hiện thực khách quan vào não","Hình ảnh tâm lí là bản sao chép về thế giới khách quan","Hình ảnh tâm lí mang tính sinh động, sáng tạo","Hình ảnh tâm lí là dấu vết của thế giới khách quan"], 2,
    "Phản ánh tâm lí là đặc biệt vì nó không phải là bản sao chép \"chết\", máy móc mà mang tính sinh động và sáng tạo — con người xử lí, cải biến thông tin chứ không sao chép y nguyên như gương phản chiếu.",
    "Tâm lí người là sự phản ánh hiện thực khách quan vào não thông qua lăng kính chủ quan của mỗi người. Nó có nguồn gốc từ thế giới khách quan (chủ yếu là các mối quan hệ xã hội), được nảy sinh bằng hoạt động và giao tiếp. Vì mang tính chủ thể, mỗi người phản ánh thế giới theo cách riêng dựa trên kinh nghiệm, nhu cầu và đặc điểm hệ thần kinh của mình — đây là lí do hai người cùng nhìn một sự việc nhưng cảm nhận khác nhau."],
  ["Hiện tượng nào dưới đây là trạng thái tâm lí?",
    ["Lành lạnh","Căng thẳng","Nhạy cảm","Yêu đời"], 1,
    "\"Căng thẳng\" là một trạng thái tâm lí — tồn tại tương đối lâu, không có mốc mở đầu/kết thúc rõ ràng như một quá trình. Các phương án còn lại là cảm giác sinh lí (lành lạnh) hoặc thuộc tính/đặc điểm cá nhân (nhạy cảm, yêu đời).",
    "Ba loại hiện tượng tâm lí phân biệt theo thời gian tồn tại: Quá trình tâm lí (ngắn, có mở đầu-diễn biến-kết thúc rõ ràng, VD: đang suy nghĩ, đang nghe giảng); Trạng thái tâm lí (tồn tại lâu hơn nhưng không có mốc đầu-cuối rõ, là 'cái nền' đi kèm hoạt động, VD: chú ý, căng thẳng, hồi hộp); Thuộc tính tâm lí (ổn định, bền vững, đặc trưng riêng cho từng người, VD: tính trung thực, kiên trì)."],
  ["Trong các tình huống, đâu là quá trình tâm lí?",
    ["Thoáng thấy một vật gì đo đỏ lướt qua","Cô ta do dự trước quyết định học thêm Pháp văn","Chị ấy luôn thích thú học môn thể dục thẩm mỹ","Tôi chăm chú nghe giảng bài"], 3,
    "\"Chăm chú nghe giảng bài\" là một hành động nhận thức đang diễn ra, có mở đầu-kết thúc rõ ràng → đây là quá trình tâm lí. Các phương án khác là cảm giác thoáng qua, trạng thái do dự (trạng thái), hoặc sở thích ổn định (thuộc tính).",
    "Ba loại hiện tượng tâm lí phân biệt theo thời gian tồn tại: Quá trình tâm lí (ngắn, có mở đầu-diễn biến-kết thúc rõ ràng, VD: đang suy nghĩ, đang nghe giảng); Trạng thái tâm lí (tồn tại lâu hơn nhưng không có mốc đầu-cuối rõ, là 'cái nền' đi kèm hoạt động, VD: chú ý, căng thẳng, hồi hộp); Thuộc tính tâm lí (ổn định, bền vững, đặc trưng riêng cho từng người, VD: tính trung thực, kiên trì)."],
  ["Những hiện tượng nào là thuộc tính tâm lí?",
    ["Nghe và nghĩ về những điều thầy giảng","Chăm chú ghi chép bài","Trung thực, không quay cóp khi làm bài thi","Giải bài tập"], 2,
    "\"Trung thực, không quay cóp\" là một phẩm chất đạo đức ổn định, lặp lại nhất quán ở người đó → đây là thuộc tính tâm lí, khác với các hành động nhất thời (nghe giảng, ghi chép, giải bài) là quá trình tâm lí.",
    "Ba loại hiện tượng tâm lí phân biệt theo thời gian tồn tại: Quá trình tâm lí (ngắn, có mở đầu-diễn biến-kết thúc rõ ràng, VD: đang suy nghĩ, đang nghe giảng); Trạng thái tâm lí (tồn tại lâu hơn nhưng không có mốc đầu-cuối rõ, là 'cái nền' đi kèm hoạt động, VD: chú ý, căng thẳng, hồi hộp); Thuộc tính tâm lí (ổn định, bền vững, đặc trưng riêng cho từng người, VD: tính trung thực, kiên trì)."],
  ["Hiện tượng nào dưới đây là ý thức?",
    ["Học sinh làm tính nhân nhanh chóng không nhớ tới quy tắc","Học sinh quyết định thi vào Sư phạm và giải thích vì em rất yêu trẻ","Trẻ sơ sinh nắm chặt ngón tay người lớn khi chạm vào bàn tay","Khi say rượu Minh nói ra điều tâm sự mà trước đây chính Minh còn mơ hồ"], 1,
    "Học sinh tự nhận thức lí do (\"vì em rất yêu trẻ\") và chủ động quyết định — đây là biểu hiện của ý thức (có mục đích, có lí giải rõ ràng), khác với hành động tự động hóa hoặc phản xạ vô thức ở các phương án còn lại.",
    "Ý thức là hình thức phản ánh tâm lí cao nhất, chỉ có ở con người, thể hiện ở khả năng nhận thức, tỏ thái độ và điều khiển hành vi một cách có mục đích, có lí do rõ ràng (khác với hành động bản năng hoặc vô thức/tự động hóa)."],
  ["Khi đi du lịch, dù đến cùng địa điểm nhưng mỗi lần đến lại mang cảm xúc khác nhau. Điều này chứng tỏ:",
    ["Tâm lý người mang tính tích cực","Tâm lý người mang tính tiêu cực","Tâm lý người mang bản chất xã hội - văn hóa","Tâm lý người mang tính chủ thể"], 3,
    "Cùng một địa điểm nhưng cảm xúc mỗi lần khác nhau — chứng tỏ tâm lí luôn mang tính chủ thể: mỗi lần trải nghiệm, trạng thái tâm lí, tâm trạng của người đó khác nhau nên cách cảm nhận cũng khác đi.",
    "Tâm lí người là sự phản ánh hiện thực khách quan vào não thông qua lăng kính chủ quan của mỗi người. Nó có nguồn gốc từ thế giới khách quan (chủ yếu là các mối quan hệ xã hội), được nảy sinh bằng hoạt động và giao tiếp. Vì mang tính chủ thể, mỗi người phản ánh thế giới theo cách riêng dựa trên kinh nghiệm, nhu cầu và đặc điểm hệ thần kinh của mình — đây là lí do hai người cùng nhìn một sự việc nhưng cảm nhận khác nhau."],
  ["Các quá trình tâm lí là những hiện tượng tâm lí có đặc điểm nào?",
    ["Thời gian tương đối ngắn, có mở đầu, diễn biến, kết thúc tương đối rõ ràng","Thời gian tương đối ngắn, không mở đầu, không diễn biến, kết thúc không rõ ràng","Thời gian tương đối ngắn, không mở đầu, diễn biến, kết thúc tương đối rõ ràng","Thời gian tương đối ngắn, có mở đầu, diễn biến, kết thúc không rõ ràng"], 0,
    "Đúng theo định nghĩa: quá trình tâm lí có thời gian tương đối ngắn, có mở đầu - diễn biến - kết thúc tương đối rõ ràng.",
    "Ba loại hiện tượng tâm lí phân biệt theo thời gian tồn tại: Quá trình tâm lí (ngắn, có mở đầu-diễn biến-kết thúc rõ ràng, VD: đang suy nghĩ, đang nghe giảng); Trạng thái tâm lí (tồn tại lâu hơn nhưng không có mốc đầu-cuối rõ, là 'cái nền' đi kèm hoạt động, VD: chú ý, căng thẳng, hồi hộp); Thuộc tính tâm lí (ổn định, bền vững, đặc trưng riêng cho từng người, VD: tính trung thực, kiên trì)."],
  ["Thuộc tính tâm lí mang những đặc điểm nào?",
    ["Không thay đổi","Tương đối ổn định, bền vững","Thay đổi theo thời gian","Đặc trưng cho mỗi cá thể và có tính độc đáo"], 1,
    "Thuộc tính tâm lí mang tính tương đối ổn định, bền vững — khác với quá trình (ngắn, biến đổi liên tục) hay trạng thái (tồn tại vừa phải).",
    "Ba loại hiện tượng tâm lí phân biệt theo thời gian tồn tại: Quá trình tâm lí (ngắn, có mở đầu-diễn biến-kết thúc rõ ràng, VD: đang suy nghĩ, đang nghe giảng); Trạng thái tâm lí (tồn tại lâu hơn nhưng không có mốc đầu-cuối rõ, là 'cái nền' đi kèm hoạt động, VD: chú ý, căng thẳng, hồi hộp); Thuộc tính tâm lí (ổn định, bền vững, đặc trưng riêng cho từng người, VD: tính trung thực, kiên trì)."],
  ["Hiện tượng nào dưới đây là quá trình tâm lí?",
    ["Giải bài tập","Chăm chú ghi chép bài","Hồi hộp khi đi thi","Trung thực, không quay cóp khi làm bài thi"], 0,
    "\"Giải bài tập\" là một hoạt động nhận thức có mở đầu và kết thúc cụ thể → quá trình tâm lí. Ghi chép bài (hoạt động lặp lại theo thói quen) mang tính trạng thái/kỹ năng, hồi hộp là trạng thái, trung thực là thuộc tính.",
    "Ba loại hiện tượng tâm lí phân biệt theo thời gian tồn tại: Quá trình tâm lí (ngắn, có mở đầu-diễn biến-kết thúc rõ ràng, VD: đang suy nghĩ, đang nghe giảng); Trạng thái tâm lí (tồn tại lâu hơn nhưng không có mốc đầu-cuối rõ, là 'cái nền' đi kèm hoạt động, VD: chú ý, căng thẳng, hồi hộp); Thuộc tính tâm lí (ổn định, bền vững, đặc trưng riêng cho từng người, VD: tính trung thực, kiên trì)."],
  ["Hiện tượng nào dưới đây là trạng thái tâm lí?",
    ["Chăm chú nghe giảng bài","Tập thể dục buổi sáng","Thoáng thấy một vật gì đo đỏ lướt qua","Chị ấy luôn thích thú học môn thể dục thẩm mĩ"], 0,
    "\"Chăm chú nghe giảng bài\" ở đây được xem như trạng thái tập trung kéo dài đi kèm hoạt động nghe giảng (so với các phương án là hoạt động thể chất, cảm giác thoáng qua, hoặc sở thích ổn định).",
    "Ba loại hiện tượng tâm lí phân biệt theo thời gian tồn tại: Quá trình tâm lí (ngắn, có mở đầu-diễn biến-kết thúc rõ ràng, VD: đang suy nghĩ, đang nghe giảng); Trạng thái tâm lí (tồn tại lâu hơn nhưng không có mốc đầu-cuối rõ, là 'cái nền' đi kèm hoạt động, VD: chú ý, căng thẳng, hồi hộp); Thuộc tính tâm lí (ổn định, bền vững, đặc trưng riêng cho từng người, VD: tính trung thực, kiên trì)."],
  ["Đặc điểm thể hiện sự khác biệt căn bản của tri giác so với cảm giác là:",
    ["Phản ánh từng thuộc tính bên ngoài của sự vật","Phản ánh trọn vẹn các thuộc tính bề ngoài","Sự phản ánh khi sự vật tác động trực tiếp vào giác quan","Sự phản ánh của chủ thể đối với thế giới bên ngoài"], 1,
    "Tri giác phản ánh trọn vẹn các thuộc tính bề ngoài của sự vật, còn cảm giác chỉ phản ánh từng thuộc tính riêng lẻ — đây chính là khác biệt căn bản giữa hai quá trình.",
    "Tri giác là quá trình tâm lí phản ánh một cách trọn vẹn các thuộc tính bề ngoài của sự vật, hiện tượng khi chúng trực tiếp tác động vào giác quan. Khác cảm giác ở chỗ tri giác cho ta hình ảnh hoàn chỉnh, có cấu trúc về đối tượng, chứ không phải từng thuộc tính rời rạc."],
  ["\"Hình ảnh trực quan mà tri giác đem lại bao giờ cũng thuộc về một sự vật hiện tượng nhất định\" là biểu hiện quy luật nào?",
    ["Tính đối tượng","Tính lựa chọn","Tính ý nghĩa","Tính ổn định"], 0,
    "Đây là định nghĩa của tính đối tượng: hình ảnh trực quan tri giác đem lại luôn gắn với một sự vật/hiện tượng cụ thể, xác định.",
    "Tính đối tượng của tri giác: hình ảnh trực quan mà tri giác đem lại luôn thuộc về một sự vật, hiện tượng cụ thể nhất định của thế giới bên ngoài (không phải hình ảnh trừu tượng, mơ hồ)."],
  ["Phản ánh một vài đối tượng trong vô số sự vật xung quanh là biểu hiện của quy luật tri giác nào?",
    ["Tính lựa chọn","Tính ý nghĩa","Tính ổn định","Tổng giác"], 0,
    "Chọn lọc một vài đối tượng trong vô số sự vật xung quanh chính là biểu hiện của tính lựa chọn trong tri giác.",
    "Tính lựa chọn của tri giác: con người không phản ánh tất cả các sự vật đang tác động, mà chỉ tách một số đối tượng ra khỏi vô số đối tượng khác để tri giác rõ ràng (đối tượng làm 'hình', phần còn lại làm 'nền')."],
  ["Khả năng phản ánh sự vật một cách không đổi khi điều kiện tri giác bị thay đổi là biểu hiện của quy luật nào?",
    ["Tính ý nghĩa","Tính ổn định","Tổng giác","Ảo ảnh tri giác"], 1,
    "Phản ánh không đổi dù điều kiện tri giác (ánh sáng, khoảng cách, góc nhìn) thay đổi — đây là tính ổn định của tri giác.",
    "Tính ổn định của tri giác: khả năng phản ánh sự vật một cách không thay đổi khi điều kiện tri giác (khoảng cách, góc nhìn, ánh sáng...) bị thay đổi, nhờ có kinh nghiệm và cơ chế tự điều chỉnh của hệ thần kinh."],
  ["Sự phản ánh sai lệch các sự vật, hiện tượng một cách khách quan là biểu hiện quy luật nào?",
    ["Tính đối tượng","Tính lựa chọn","Tổng giác","Ảo ảnh tri giác"], 3,
    "Phản ánh sai lệch khách quan về sự vật chính là định nghĩa của ảo ảnh tri giác.",
    "Ảo ảnh tri giác: sự phản ánh sai lệch các sự vật, hiện tượng một cách khách quan (do đặc điểm cấu tạo giác quan hoặc do quy luật của tri giác), xảy ra ở mọi người trong những điều kiện xác định, con người có thể chủ động vận dụng vào thực tiễn (trang trí, ngụy trang, thời trang, kiến trúc...)."],
  ["Tri giác chịu ảnh hưởng nội dung đời sống tâm lý và đặc điểm nhân cách là biểu hiện quy luật nào?",
    ["Tính ý nghĩa","Tính ổn định","Tổng giác","Ảo giác"], 2,
    "Tri giác bị chi phối bởi đời sống tâm lí và đặc điểm nhân cách của người tri giác — đây là biểu hiện của tổng giác.",
    "Tổng giác: sự phụ thuộc của tri giác vào nội dung đời sống tâm lí, kinh nghiệm, nhu cầu, hứng thú, tâm trạng... của con người — cùng một hình ảnh nhưng người khác nhau/tâm trạng khác nhau có thể tri giác khác nhau (VD: nhìn một bức tranh mơ hồ, mỗi người thấy một hình khác)."],
  ["Người lái ôtô thấy vật tiến nhanh tựa như phình to nhưng hiểu đó là ảo ảnh. Đó là biểu hiện quy luật nào?",
    ["Tính lựa chọn của tri giác","Tính ổn định của tri giác","Tính đối tượng của tri giác","Tính ý nghĩa của tri giác"], 1,
    "Người lái xe biết trước đó chỉ là ảo giác (không phải vật thật to lên) nhưng khả năng nhận biết sự vật không đổi trong tình huống thay đổi thị giác — thể hiện tính ổn định của tri giác giúp con người vẫn phán đoán đúng khoảng cách/kích thước thực.",
    "Tính ổn định của tri giác: khả năng phản ánh sự vật một cách không thay đổi khi điều kiện tri giác (khoảng cách, góc nhìn, ánh sáng...) bị thay đổi, nhờ có kinh nghiệm và cơ chế tự điều chỉnh của hệ thần kinh."],
  ["Sau khi tiếp nhận kích thích, cơ quan thị giác đưa thông tin lên não dưới dạng xung thần kinh nào?",
    ["Sóng âm thanh","Sóng ánh sáng","Phản ứng hóa học","Áp lực, nhiệt độ"], 1,
    "Mắt tiếp nhận ánh sáng phản xạ từ vật thể dưới dạng sóng ánh sáng, sau đó chuyển hóa thành xung thần kinh gửi lên não.",
    "Cảm giác là quá trình tâm lí phản ánh một cách riêng lẻ, từng thuộc tính bề ngoài của sự vật, hiện tượng khi chúng đang trực tiếp tác động vào giác quan. Đây là mức độ nhận thức cảm tính thấp nhất, đơn giản nhất trong nhận thức của con người."],
  ["Loại cảm giác nào thuộc nhóm cảm giác bên ngoài?",
    ["Cảm giác vận động","Cảm giác nén","Cảm giác sờ mó","Cảm giác rung"], 2,
    "Cảm giác sờ mó (xúc giác qua da) là cảm giác do kích thích bên ngoài tác động, thuộc nhóm cảm giác bên ngoài; còn cảm giác vận động, nén, rung là các cảm giác bên trong cơ thể.",
    "Cảm giác bên ngoài là những cảm giác do kích thích từ bên ngoài cơ thể tác động vào các giác quan (nhìn, nghe, ngửi, nếm, da/sờ mó), khác với cảm giác bên trong (vận động, thăng bằng, cơ thể/nén, rung) phản ánh trạng thái bên trong cơ thể."],
  ["\"Hình ảnh trực quan của tri giác bao giờ cũng thuộc về một sự vật, hiện tượng nhất định\" là đặc điểm quy luật nào?",
    ["Tính ý nghĩa","Tính đối tượng","Tính lựa chọn","Ảo ảnh tri giác"], 1,
    "Đây chính là định nghĩa tính đối tượng của tri giác: hình ảnh luôn thuộc về một sự vật cụ thể, xác định.",
    "Tính đối tượng của tri giác: hình ảnh trực quan mà tri giác đem lại luôn thuộc về một sự vật, hiện tượng cụ thể nhất định của thế giới bên ngoài (không phải hình ảnh trừu tượng, mơ hồ)."],
  ["Ngưỡng cảm giác sai biệt được hiểu là:",
    ["Cường độ kích thích tối thiểu gây ra cảm giác","Cường độ kích thích tối đa gây ra cảm giác","Mức độ chênh lệch tối thiểu về cường độ để phân biệt được chúng","Mức độ chênh lệch tối đa về cường độ để phân biệt được chúng"], 2,
    "Ngưỡng sai biệt là mức chênh lệch cường độ tối thiểu giữa hai kích thích để ta phân biệt được sự khác nhau giữa chúng — khác với ngưỡng tuyệt đối (cường độ tối thiểu/tối đa để gây cảm giác).",
    "Ngưỡng cảm giác gồm: Ngưỡng tuyệt đối phía dưới — cường độ kích thích TỐI THIỂU đủ gây cảm giác; Ngưỡng tuyệt đối phía trên — cường độ kích thích TỐI ĐA còn gây được cảm giác (vượt quá sẽ mất cảm giác hoặc gây đau); Ngưỡng sai biệt — mức chênh lệch cường độ TỐI THIỂU giữa hai kích thích để phân biệt được sự khác nhau giữa chúng. Nếu kích thích nằm dưới ngưỡng (quá nhẹ, quá nhỏ) thì ta sẽ không cảm nhận được."],
  ["Khi đi từ chỗ sáng vào chỗ tối, lúc đầu chưa nhìn thấy, sau vài giây nhìn rõ hơn. Hiện tượng này do:",
    ["Tăng độ nhạy cảm của cảm giác nhìn","Giảm độ nhạy cảm của cảm giác nhìn","Không thay đổi","Tất cả đáp án trên"], 0,
    "Khi mới vào chỗ tối, độ nhạy cảm của cảm giác nhìn còn thấp; sau vài giây, độ nhạy cảm TĂNG LÊN để thích nghi với ánh sáng yếu, giúp nhìn rõ hơn — đây là biểu hiện quy luật thích ứng.",
    "Quy luật thích ứng: khả năng thay đổi độ nhạy cảm của cảm giác cho phù hợp với sự thay đổi của cường độ kích thích — kích thích tác động lâu, liên tục thì độ nhạy cảm giảm dần (tăng ngưỡng cảm giác) đến khi thấy 'bình thường', quen dần; còn kích thích yếu, ít tác động thì độ nhạy cảm tăng lên để dễ phát hiện hơn."],
  ["Giáo viên dùng bút đỏ để chấm bài là ứng dụng quy luật nào của tri giác?",
    ["Quy luật tính lựa chọn","Quy luật ảo ảnh tri giác","Quy luật tính ý nghĩa","Quy luật tính tổng giác"], 0,
    "Bút đỏ nổi bật trên nền giấy trắng/chữ đen giúp giáo viên và học sinh dễ nhận ra phần được chấm — đây là vận dụng tính lựa chọn của tri giác (làm nổi 'hình' so với 'nền').",
    "Tính lựa chọn của tri giác: con người không phản ánh tất cả các sự vật đang tác động, mà chỉ tách một số đối tượng ra khỏi vô số đối tượng khác để tri giác rõ ràng (đối tượng làm 'hình', phần còn lại làm 'nền')."],
  ["Ăn mãi một món dù ngon đến đâu cũng thấy bình thường. Đó là do quy luật nào?",
    ["Thích ứng","Thích nghi","Tác động qua lại","Ngưỡng cảm giác"], 0,
    "Ăn một món liên tục làm độ nhạy cảm vị giác giảm dần, không còn thấy ngon như ban đầu — đây là quy luật thích ứng của cảm giác.",
    "Quy luật thích ứng: khả năng thay đổi độ nhạy cảm của cảm giác cho phù hợp với sự thay đổi của cường độ kích thích — kích thích tác động lâu, liên tục thì độ nhạy cảm giảm dần (tăng ngưỡng cảm giác) đến khi thấy 'bình thường', quen dần; còn kích thích yếu, ít tác động thì độ nhạy cảm tăng lên để dễ phát hiện hơn."],
  ["Hãy tìm màu phấn tương phản nhất khi viết trên bảng màu xanh, màu đen:",
    ["Phấn ghi","Phấn trắng","Phấn đỏ","Phấn tím"], 1,
    "Trắng và đen là hai màu đối lập cực đại về độ sáng nên tạo tương phản mạnh nhất khi đặt cạnh nhau trên nền bảng tối — vận dụng quy luật tác động qua lại (tương phản đồng thời) của cảm giác.",
    "Quy luật tác động qua lại giữa các cảm giác: các cảm giác không tồn tại độc lập mà luôn ảnh hưởng lẫn nhau. Biểu hiện dưới 2 dạng: Tương phản đồng thời (hai kích thích cùng lúc làm tăng cảm nhận sự khác biệt, VD: phối màu đen-trắng, chữ đỏ nổi bật trên nền khác) và tương phản nối tiếp (kích thích trước ảnh hưởng đến cảm nhận kích thích sau, VD: dội nước lạnh làm mắt tinh hơn tạm thời)."],
  ["Trong giai đoạn nhận thức cảm tính, các quá trình tâm lí phản ánh sự vật ở mức độ nào?",
    ["Mối liên hệ có tính bản chất","Mối liên hệ có tính quy luật","Thuộc tính bên trong, khái quát","Thuộc tính bề ngoài, cụ thể"], 3,
    "Ở giai đoạn nhận thức cảm tính (cảm giác, tri giác), con người chỉ phản ánh những thuộc tính bề ngoài, cụ thể của sự vật — chưa đi vào bản chất, quy luật bên trong (đó là nhiệm vụ của tư duy).",
    "Cảm giác là quá trình tâm lí phản ánh một cách riêng lẻ, từng thuộc tính bề ngoài của sự vật, hiện tượng khi chúng đang trực tiếp tác động vào giác quan. Đây là mức độ nhận thức cảm tính thấp nhất, đơn giản nhất trong nhận thức của con người."],
  ["Tri giác là quá trình tâm lí phản ánh những thuộc tính nào?",

    "Tri giác phản ánh trọn vẹn các thuộc tính bề ngoài của sự vật hiện tượng — đây là đặc trưng cơ bản phân biệt tri giác với cảm giác (chỉ phản ánh riêng lẻ).",
    "Tri giác là quá trình tâm lí phản ánh một cách trọn vẹn các thuộc tính bề ngoài của sự vật, hiện tượng khi chúng trực tiếp tác động vào giác quan. Khác cảm giác ở chỗ tri giác cho ta hình ảnh hoàn chỉnh, có cấu trúc về đối tượng, chứ không phải từng thuộc tính rời rạc."],
  ["\"Quá trình nhận thức phản ánh một cách riêng lẻ từng thuộc tính của sự vật\" đề cập đến hiện tượng nào?",
    ["Tư duy","Tưởng tượng","Tri giác","Cảm giác"], 3,

  ["\"Hình ảnh trực quan của tri giác bao giờ cũng thuộc về một sự vật hiện tượng nhất định\" là biểu hiện quy luật nào?",

    "Tính đối tượng của tri giác: hình ảnh trực quan mà tri giác đem lại luôn thuộc về một sự vật, hiện tượng cụ thể nhất định của thế giới bên ngoài (không phải hình ảnh trừu tượng, mơ hồ)."],
  ["\"Mọi tác động trong dạy học phải đủ ngưỡng thì mới mang lại hiệu quả\" là ứng dụng quy luật nào của cảm giác?",
    ["Tác động qua lại của các cảm giác","Ngưỡng cảm giác","Thích ứng của cảm giác","Không đủ thông tin để xác định"], 1,

  ["Nhà thiết kế thời trang phối đen với trắng dựa trên quy luật nào trong cảm giác?",
    ["Quy luật tương phản đồng thời","Quy luật về sự thích ứng","Quy luật về ngưỡng cảm giác","Quy luật tương phản nối tiếp"], 0,
    "Phối đen-trắng tạo hiệu ứng tương phản đồng thời rõ rệt — vận dụng quy luật tác động qua lại giữa các cảm giác.",

  ["Khi đèn phòng vụt tắt, mắt không nhìn thấy gì. Quy luật nào của cảm giác?",
    ["Quy luật ngưỡng cảm giác","Quy luật thích ứng của cảm giác","Quy luật tác động qua lại của các cảm giác","Quy luật thích nghi cảm giác"], 1,
    "Đèn tắt đột ngột, mắt cần một khoảng thời gian để độ nhạy cảm tăng lên thích nghi với bóng tối mới nhìn thấy được — đây là quy luật thích ứng.",
    "Quy luật thích ứng: khả năng thay đổi độ nhạy cảm của cảm giác cho phù hợp với sự thay đổi của cường độ kích thích — kích thích tác động lâu, liên tục thì độ nhạy cảm giảm dần (tăng ngưỡng cảm giác) đến khi thấy 'bình thường', quen dần; còn kích thích yếu, ít tác động thì độ nhạy cảm tăng lên để dễ phát hiện hơn."],
  ["Cảm giác từ sóng âm phản ánh thuộc tính của âm thanh đến tai người là loại cảm giác nào?",
    ["Cảm giác nhìn (Thị giác)","Cảm giác ngửi (Khứu giác)","Cảm giác nghe (Thính giác)","Cảm giác nếm (Vị giác)"], 2,
    "Sóng âm tác động vào tai tạo ra cảm giác nghe — đây chính là thính giác (cảm giác nghe).",
    "Cảm giác là quá trình tâm lí phản ánh một cách riêng lẻ, từng thuộc tính bề ngoài của sự vật, hiện tượng khi chúng đang trực tiếp tác động vào giác quan. Đây là mức độ nhận thức cảm tính thấp nhất, đơn giản nhất trong nhận thức của con người."],
  ["\"Quá trình nhận thức phản ánh riêng lẻ từng thuộc tính khi chúng tác động vào giác quan ta\" là hiện tượng nào?",
    ["Tư duy","Tưởng tượng","Tri giác","Cảm giác"], 3,
    "\"Phản ánh riêng lẻ từng thuộc tính\" là đặc trưng của cảm giác.",
    "Cảm giác là quá trình tâm lí phản ánh một cách riêng lẻ, từng thuộc tính bề ngoài của sự vật, hiện tượng khi chúng đang trực tiếp tác động vào giác quan. Đây là mức độ nhận thức cảm tính thấp nhất, đơn giản nhất trong nhận thức của con người."],
  ["\"Quá trình nhận thức phản ánh trọn vẹn từng thuộc tính khi chúng tác động vào giác quan ta\" là hiện tượng nào?",
    ["Tư duy","Tưởng tượng","Tri giác","Cảm giác"], 2,
    "\"Phản ánh trọn vẹn thuộc tính\" là đặc trưng của tri giác (không phải cảm giác).",
    "Tri giác là quá trình tâm lí phản ánh một cách trọn vẹn các thuộc tính bề ngoài của sự vật, hiện tượng khi chúng trực tiếp tác động vào giác quan. Khác cảm giác ở chỗ tri giác cho ta hình ảnh hoàn chỉnh, có cấu trúc về đối tượng, chứ không phải từng thuộc tính rời rạc."],
  ["Trong hình, một số người nhìn thấy cây trước, một số thấy sư tử, khỉ đột. Đây là quy luật nào của tri giác?",
    ["Tính đối tượng","Tính lựa chọn","Tính ý nghĩa","Tính ổn định"], 1,
    "Mỗi người tri giác hình ảnh khác nhau (cây, sư tử, khỉ đột) tùy theo kinh nghiệm và trạng thái tâm lí cá nhân của họ — đây là biểu hiện của tổng giác.",
    "Tổng giác: sự phụ thuộc của tri giác vào nội dung đời sống tâm lí, kinh nghiệm, nhu cầu, hứng thú, tâm trạng... của con người — cùng một hình ảnh nhưng người khác nhau/tâm trạng khác nhau có thể tri giác khác nhau (VD: nhìn một bức tranh mơ hồ, mỗi người thấy một hình khác)."],
  ["Cách hiểu nào đúng với ngưỡng cảm giác?",
    ["Ngưỡng cảm giác là giới hạn mà ở đó kích thích gây được cảm giác","Ngưỡng cảm giác không thay đổi trong cuộc sống","Mỗi giác quan có cảm giác như nhau ở tất cả mọi người","Cả a, b, c"], 0,
    "Ngưỡng cảm giác đúng là giới hạn cường độ kích thích mà ở đó bắt đầu gây được cảm giác; ngưỡng này có thể thay đổi theo luyện tập/hoàn cảnh và khác nhau giữa các cá nhân, nên các phương án B, C đều sai.",
    "Ngưỡng cảm giác gồm: Ngưỡng tuyệt đối phía dưới — cường độ kích thích TỐI THIỂU đủ gây cảm giác; Ngưỡng tuyệt đối phía trên — cường độ kích thích TỐI ĐA còn gây được cảm giác (vượt quá sẽ mất cảm giác hoặc gây đau); Ngưỡng sai biệt — mức chênh lệch cường độ TỐI THIỂU giữa hai kích thích để phân biệt được sự khác nhau giữa chúng. Nếu kích thích nằm dưới ngưỡng (quá nhẹ, quá nhỏ) thì ta sẽ không cảm nhận được."],
  ["Khi tắm nước lạnh, ban đầu cảm thấy lạnh nhưng sau không cảm thấy lạnh nhiều. Quy luật nào?",
    ["Quy luật ngưỡng","Quy luật thích ứng","Quy luật tác động qua lại giữa các cảm giác","Không có cơ sở xác định"], 1,
    "Ban đầu cảm thấy lạnh, sau đó độ nhạy cảm giảm dần khiến cảm giác lạnh bớt đi — đây là quy luật thích ứng của cảm giác.",
    "Quy luật thích ứng: khả năng thay đổi độ nhạy cảm của cảm giác cho phù hợp với sự thay đổi của cường độ kích thích — kích thích tác động lâu, liên tục thì độ nhạy cảm giảm dần (tăng ngưỡng cảm giác) đến khi thấy 'bình thường', quen dần; còn kích thích yếu, ít tác động thì độ nhạy cảm tăng lên để dễ phát hiện hơn."],
  ["Trong hình, bạn biết cô gái không phải người tý hon. Quy luật nào của tri giác?",
    ["Tính đối tượng","Tính lựa chọn","Tính ý nghĩa","Tính ổn định"], 3,
    "Dù thấy hình ảnh nhỏ hơn thực tế do khoảng cách/góc nhìn, người quan sát vẫn nhận biết đúng là người bình thường (không phải người tí hon thật) — đây là tính ổn định giúp tri giác không bị 'đánh lừa' bởi các biến đổi bề ngoài.",
    "Tính ổn định của tri giác: khả năng phản ánh sự vật một cách không thay đổi khi điều kiện tri giác (khoảng cách, góc nhìn, ánh sáng...) bị thay đổi, nhờ có kinh nghiệm và cơ chế tự điều chỉnh của hệ thần kinh."],
  ["Nút bật/tắt quạt điện thường có màu khác biệt so với các nút còn lại. Quy luật nào được dùng?",
    ["Tính ảo ảnh của tri giác","Tính tổng giác của tri giác","Tính lựa chọn của tri giác","Tất cả đáp án trên"], 2,
    "Nút bấm khác màu giúp người dùng dễ tách nút đó ra khỏi các nút còn lại để nhận biết nhanh — vận dụng tính lựa chọn của tri giác.",
    "Tính lựa chọn của tri giác: con người không phản ánh tất cả các sự vật đang tác động, mà chỉ tách một số đối tượng ra khỏi vô số đối tượng khác để tri giác rõ ràng (đối tượng làm 'hình', phần còn lại làm 'nền')."],
  ["Đặc điểm đúng với quá trình cảm giác của con người?",
    ["Sự phản ánh từng thuộc tính riêng lẻ bên ngoài của sự vật","Sự phản ánh trọn vẹn các thuộc tính bên ngoài","Sự phản ánh của chủ thể đối với thế giới bên ngoài","Sự hoạt động phối hợp của một loạt các cơ quan phân tích"], 0,
    "Cảm giác là sự phản ánh từng thuộc tính riêng lẻ, bề ngoài của sự vật — đây là đặc điểm cốt lõi phân biệt với tri giác (trọn vẹn) và các quá trình nhận thức lí tính khác.",
    "Cảm giác là quá trình tâm lí phản ánh một cách riêng lẻ, từng thuộc tính bề ngoài của sự vật, hiện tượng khi chúng đang trực tiếp tác động vào giác quan. Đây là mức độ nhận thức cảm tính thấp nhất, đơn giản nhất trong nhận thức của con người."],
  ["\"Khả năng duy trì lâu dài chú ý vào một hay một số đối tượng\". Thuộc tính nào đã mô tả?",
    ["Sự tập trung của chú ý","Sự bền vững của chú ý","Sự phân phối chú ý","Sự phân tán chú ý"], 1,
    "\"Khả năng duy trì lâu dài chú ý\" chính là định nghĩa của thuộc tính bền vững của chú ý.",
    "Chú ý là trạng thái tâm lí, biểu hiện sự tập trung của hoạt động tâm lí vào một hay một số đối tượng nhất định để phản ánh chúng tốt hơn. Chú ý có 4 thuộc tính cơ bản: Sức tập trung (mức độ chú ý dồn vào phạm vi hẹp), Sự bền vững (duy trì chú ý lâu dài trên một đối tượng), Sự phân phối (chú ý cùng lúc nhiều đối tượng/hoạt động khác nhau), Sự di chuyển (chuyển chú ý linh hoạt từ đối tượng này sang đối tượng khác theo yêu cầu)."],
  ["Loại chú ý nào không cần sự nỗ lực của bản thân?",
    ["Chú ý có chủ định","Chú ý không chủ định","Chú ý sau chủ định","Chú ý trước chủ định"], 1,
    "Chú ý không chủ định không cần mục đích hay sự nỗ lực ý chí, xảy ra tự nhiên do tác động bên ngoài.",
    "3 loại chú ý theo mức độ tự giác: Chú ý không chủ định — không có mục đích định trước, không cần nỗ lực ý chí, do tác động bên ngoài (mới lạ, nổi bật, tương phản) gây ra một cách tự nhiên; Chú ý có chủ định — có mục đích tự giác, cần sự nỗ lực ý chí để duy trì; Chú ý 'sau khi có chủ định' — vốn là chú ý có chủ định nhưng do hứng thú với công việc nên không còn cần căng thẳng ý chí nữa (VD: say mê đọc sách quên cả giờ giấc)."],
  ["Điều kiện cần thiết để làm nảy sinh chú ý có chủ định?",
    ["Độ mới lạ của kích thích","Sự tương phản của tác nhân kích thích","Sử dụng các tâm thế đang có ở chủ thể","Xác định nhiệm vụ cần thực hiện để đạt mục đích tự giác"], 3,
    "Điều kiện làm nảy sinh chú ý có chủ định là phải xác định rõ nhiệm vụ, mục đích cần đạt được một cách tự giác — khác với chú ý không chủ định (chỉ cần yếu tố mới lạ, tương phản từ bên ngoài).",
    "3 loại chú ý theo mức độ tự giác: Chú ý không chủ định — không có mục đích định trước, không cần nỗ lực ý chí, do tác động bên ngoài (mới lạ, nổi bật, tương phản) gây ra một cách tự nhiên; Chú ý có chủ định — có mục đích tự giác, cần sự nỗ lực ý chí để duy trì; Chú ý 'sau khi có chủ định' — vốn là chú ý có chủ định nhưng do hứng thú với công việc nên không còn cần căng thẳng ý chí nữa (VD: say mê đọc sách quên cả giờ giấc)."],
  ["Các hiện tượng \"chăm chú nhìn, lắng tai nghe, tập trung suy nghĩ\" là biểu hiện của hiện tượng tâm lí nào?",
    ["Xúc cảm, tình cảm","Trí nhớ","Cảm giác","Chú ý"], 3,
    "Chăm chú nhìn, lắng nghe, tập trung suy nghĩ đều là những biểu hiện cụ thể của trạng thái chú ý.",
    "Chú ý là trạng thái tâm lí, biểu hiện sự tập trung của hoạt động tâm lí vào một hay một số đối tượng nhất định để phản ánh chúng tốt hơn. Chú ý có 4 thuộc tính cơ bản: Sức tập trung (mức độ chú ý dồn vào phạm vi hẹp), Sự bền vững (duy trì chú ý lâu dài trên một đối tượng), Sự phân phối (chú ý cùng lúc nhiều đối tượng/hoạt động khác nhau), Sự di chuyển (chuyển chú ý linh hoạt từ đối tượng này sang đối tượng khác theo yêu cầu)."],
  ["Các nhà thiết kế quảng cáo thường quan tâm đến yếu tố nào để thu hút sự chú ý?",
    ["Độ tinh xảo của sản phẩm","Độ mới lạ, độc đáo","Độ thông dụng của sản phẩm","Độ đặc biệt của sản phẩm"], 1,
    "Quảng cáo cần sự mới lạ, độc đáo để thu hút chú ý không chủ định của người xem một cách tự nhiên, không cần họ phải cố gắng để ý.",
    "3 loại chú ý theo mức độ tự giác: Chú ý không chủ định — không có mục đích định trước, không cần nỗ lực ý chí, do tác động bên ngoài (mới lạ, nổi bật, tương phản) gây ra một cách tự nhiên; Chú ý có chủ định — có mục đích tự giác, cần sự nỗ lực ý chí để duy trì; Chú ý 'sau khi có chủ định' — vốn là chú ý có chủ định nhưng do hứng thú với công việc nên không còn cần căng thẳng ý chí nữa (VD: say mê đọc sách quên cả giờ giấc)."],
  ["Các thuộc tính cơ bản của chú ý gồm:",
    ["Tập trung, bền bỉ, phân tán và di chuyển","Tập trung, bền vững, phân tán và di chuyển","Tập trung, bền vững, phân phối và di chuyển","Tập trung, bền bỉ, phân phối và di chuyển"], 2,
    "4 thuộc tính cơ bản của chú ý là: tập trung, bền vững, phân phối và di chuyển (không phải 'bền bỉ' hay 'phân tán').",
    "Chú ý là trạng thái tâm lí, biểu hiện sự tập trung của hoạt động tâm lí vào một hay một số đối tượng nhất định để phản ánh chúng tốt hơn. Chú ý có 4 thuộc tính cơ bản: Sức tập trung (mức độ chú ý dồn vào phạm vi hẹp), Sự bền vững (duy trì chú ý lâu dài trên một đối tượng), Sự phân phối (chú ý cùng lúc nhiều đối tượng/hoạt động khác nhau), Sự di chuyển (chuyển chú ý linh hoạt từ đối tượng này sang đối tượng khác theo yêu cầu)."],
  ["\"Chú ý không có mục đích tự giác, không cần nỗ lực, chủ yếu do tác động bên ngoài gây ra\". Là loại chú ý nào?",
    ["Chú ý không chủ định","Chú ý có chủ định","Chú ý sau khi có chủ định","Cả 3 loại chú ý trên"], 0,
    "Đây là định nghĩa chuẩn của chú ý không chủ định: không mục đích, không cần nỗ lực, do tác động bên ngoài.",
    "3 loại chú ý theo mức độ tự giác: Chú ý không chủ định — không có mục đích định trước, không cần nỗ lực ý chí, do tác động bên ngoài (mới lạ, nổi bật, tương phản) gây ra một cách tự nhiên; Chú ý có chủ định — có mục đích tự giác, cần sự nỗ lực ý chí để duy trì; Chú ý 'sau khi có chủ định' — vốn là chú ý có chủ định nhưng do hứng thú với công việc nên không còn cần căng thẳng ý chí nữa (VD: say mê đọc sách quên cả giờ giấc)."],
  ["Loại chú ý cần có chủ đích, mục đích định trước và sự nỗ lực của bản thân là:",
    ["Chú ý không chủ định","Chú ý có chủ định","Chú ý sau khi có chủ định","Cả 3 loại chú ý trên"], 1,
    "Chú ý có chủ định đòi hỏi phải có mục đích định trước và cần sự nỗ lực ý chí duy trì.",
    "3 loại chú ý theo mức độ tự giác: Chú ý không chủ định — không có mục đích định trước, không cần nỗ lực ý chí, do tác động bên ngoài (mới lạ, nổi bật, tương phản) gây ra một cách tự nhiên; Chú ý có chủ định — có mục đích tự giác, cần sự nỗ lực ý chí để duy trì; Chú ý 'sau khi có chủ định' — vốn là chú ý có chủ định nhưng do hứng thú với công việc nên không còn cần căng thẳng ý chí nữa (VD: say mê đọc sách quên cả giờ giấc)."],
  ["\"Vốn là chú ý có chủ định nhưng không đòi hỏi sự căng thẳng ý chí\" là loại chú ý nào?",
    ["Chú ý không chủ định","Chú ý có chủ định","Chú ý sau khi có chủ định","Cả 3 loại chú ý trên"], 2,
    "Đây là mô tả chính xác của chú ý 'sau khi có chủ định' — ban đầu cần cố gắng (có chủ định) nhưng do hứng thú nên duy trì được mà không cần căng thẳng ý chí nữa.",
    "3 loại chú ý theo mức độ tự giác: Chú ý không chủ định — không có mục đích định trước, không cần nỗ lực ý chí, do tác động bên ngoài (mới lạ, nổi bật, tương phản) gây ra một cách tự nhiên; Chú ý có chủ định — có mục đích tự giác, cần sự nỗ lực ý chí để duy trì; Chú ý 'sau khi có chủ định' — vốn là chú ý có chủ định nhưng do hứng thú với công việc nên không còn cần căng thẳng ý chí nữa (VD: say mê đọc sách quên cả giờ giấc)."],
  ["Bộ nhớ nào có khả năng lưu giữ thông tin gần như không giới hạn?",
    ["Trí nhớ giác quan","Trí nhớ ngắn hạn","Trí nhớ dài hạn","Tất cả các bộ nhớ"], 2,
    "Trí nhớ dài hạn có khả năng lưu giữ thông tin gần như không giới hạn về dung lượng và thời gian, khác với trí nhớ giác quan và ngắn hạn (dung lượng và thời gian rất hạn chế).",
    "Trí nhớ phân theo thời gian lưu giữ: Trí nhớ giác quan (cực ngắn, vài giây); Trí nhớ ngắn hạn/trí nhớ làm việc (lưu tạm thời, dung lượng hạn chế, dùng để xử lí thông tin đang thao tác, VD: nhẩm số điện thoại); Trí nhớ dài hạn (lưu trữ lâu dài, gần như không giới hạn dung lượng, thông qua quá trình củng cố — ký ức càng được truy cập/ôn tập thường xuyên càng bền vững, nhưng không phải 'cố định vĩnh viễn' vì vẫn có thể phai nhạt hoặc bị quên)."],
  ["\"Quá trình tâm lí phản ánh những kinh nghiệm đã có bằng cách ghi nhớ, giữ gìn và làm xuất hiện lại những điều đã trải qua\". Hiện tượng nào?",
    ["Trí nhớ","Tưởng tượng","Tri giác","Tư duy"], 0,
    "Đây chính là định nghĩa của trí nhớ: ghi nhớ, giữ gìn, làm xuất hiện lại kinh nghiệm đã trải qua.",
    "Trí nhớ là quá trình tâm lí phản ánh những kinh nghiệm đã có của cá nhân dưới hình thức ghi nhớ, giữ gìn và làm xuất hiện lại (nhận lại, nhớ lại) những gì đã trải qua. Sản phẩm của trí nhớ là các biểu tượng — hình ảnh của sự vật được tạo ra trên cơ sở các hình ảnh đã có từ tri giác trước đó (khác với cảm giác/tri giác cần có sự vật tác động trực tiếp)."],
  ["Trí nhớ nào sẽ được sử dụng để lưu trữ thông tin trong thời gian dài?",
    ["Trí nhớ giác quan","Trí nhớ làm việc","Trí nhớ dài hạn","Cả 3 loại trí nhớ trên"], 2,
    "Trí nhớ dài hạn được dùng để lưu trữ thông tin lâu dài, khác với trí nhớ giác quan (cực ngắn) hay trí nhớ làm việc (ngắn hạn, tạm thời).",
    "Trí nhớ phân theo thời gian lưu giữ: Trí nhớ giác quan (cực ngắn, vài giây); Trí nhớ ngắn hạn/trí nhớ làm việc (lưu tạm thời, dung lượng hạn chế, dùng để xử lí thông tin đang thao tác, VD: nhẩm số điện thoại); Trí nhớ dài hạn (lưu trữ lâu dài, gần như không giới hạn dung lượng, thông qua quá trình củng cố — ký ức càng được truy cập/ôn tập thường xuyên càng bền vững, nhưng không phải 'cố định vĩnh viễn' vì vẫn có thể phai nhạt hoặc bị quên)."],
  ["Ghi nhớ không có mục đích đặt ra từ trước là loại ghi nhớ nào?",
    ["Ghi nhớ không chủ định","Ghi nhớ có chủ định","Ghi nhớ logic","Ghi nhớ máy móc"], 0,
    "Ghi nhớ không có mục đích định trước chính là ghi nhớ không chủ định.",
    "Trí nhớ phân theo mục đích ghi nhớ: Ghi nhớ không chủ định (không đặt mục đích ghi nhớ trước, diễn ra tự nhiên); Ghi nhớ có chủ định (có mục đích, có phương pháp, cần nỗ lực ý chí). Về cách ghi nhớ: Ghi nhớ máy móc (lặp đi lặp lại đơn giản, không cần hiểu nội dung) và Ghi nhớ có ý nghĩa/logic (dựa trên hiểu bản chất, mối liên hệ logic giữa các phần tài liệu — giúp lĩnh hội tri thức sâu sắc và bền vững hơn nhiều so với ghi nhớ máy móc)."],
  ["Mệnh đề đúng với trí nhớ:",
    ["Biểu tượng của nó mang tính sáng tạo","Biểu tượng được tạo ra từ hình ảnh thu được từ tri giác","Sản phẩm là biểu tượng","Phản ánh sự vật khi không còn tác động trực tiếp vào giác quan"], 3,
    "Trí nhớ phản ánh sự vật khi sự vật không còn tác động trực tiếp vào giác quan nữa (khác với cảm giác/tri giác cần tác động trực tiếp) — đây là đặc điểm cốt lõi phân biệt trí nhớ.",
    "Trí nhớ là quá trình tâm lí phản ánh những kinh nghiệm đã có của cá nhân dưới hình thức ghi nhớ, giữ gìn và làm xuất hiện lại (nhận lại, nhớ lại) những gì đã trải qua. Sản phẩm của trí nhớ là các biểu tượng — hình ảnh của sự vật được tạo ra trên cơ sở các hình ảnh đã có từ tri giác trước đó (khác với cảm giác/tri giác cần có sự vật tác động trực tiếp)."],
  ["Loại trí nhớ nào đúng với trí nhớ vận động?",
    ["Nhớ về các động tác của một bài thể dục","Nhớ về phong cảnh đẹp, mùi thơm","Nhớ công thức toán bằng cách giải bài tập","Nhớ giờ bắt đầu và địa điểm buổi nói chuyện"], 0,
    "Nhớ động tác của bài thể dục là biểu hiện điển hình của trí nhớ vận động (nhớ các thao tác, cử động cơ thể).",
    "Trí nhớ phân theo nội dung phản ánh: Trí nhớ vận động (nhớ các động tác, thao tác vận động — nền tảng hình thành kỹ xảo); Trí nhớ cảm xúc (nhớ những rung cảm, xúc động đã trải qua, VD: đỏ mặt khi nhớ kỉ niệm cũ); Trí nhớ hình ảnh (nhớ hình ảnh, âm thanh, mùi vị đã tri giác); Trí nhớ từ ngữ - logic (nhớ ý nghĩa, tư tưởng, khái niệm — loại trí nhớ đặc trưng, giữ vai trò chính ở con người)."],
  ["Loại trí nhớ nào đúng với trí nhớ xúc cảm?",
    ["Sự tái mặt hay đỏ mặt khi nhớ đến kỉ niệm cũ","Nhớ về phong cảnh đẹp, mùi thơm","Nhớ ý chính của đoạn tài liệu học tập","Nhớ được kiến thức trong khi làm bài thi"], 0,
    "Đỏ mặt/tái mặt khi nhớ lại kỉ niệm là biểu hiện của trí nhớ cảm xúc (nhớ lại rung cảm đã trải qua).",
    "Trí nhớ phân theo nội dung phản ánh: Trí nhớ vận động (nhớ các động tác, thao tác vận động — nền tảng hình thành kỹ xảo); Trí nhớ cảm xúc (nhớ những rung cảm, xúc động đã trải qua, VD: đỏ mặt khi nhớ kỉ niệm cũ); Trí nhớ hình ảnh (nhớ hình ảnh, âm thanh, mùi vị đã tri giác); Trí nhớ từ ngữ - logic (nhớ ý nghĩa, tư tưởng, khái niệm — loại trí nhớ đặc trưng, giữ vai trò chính ở con người)."],
  ["Loại trí nhớ nào đúng với trí nhớ từ ngữ - logic?",
    ["Nhớ ý chính của đoạn tài liệu học tập","Nhớ công thức toán bằng cách giải bài tập","Nhớ giờ bắt đầu và địa điểm buổi nói chuyện","Nhớ được kiến thức trong khi làm bài thi"], 0,
    "Nhớ ý chính của tài liệu học tập (nội dung, ý nghĩa) là biểu hiện của trí nhớ từ ngữ - logic.",
    "Trí nhớ phân theo nội dung phản ánh: Trí nhớ vận động (nhớ các động tác, thao tác vận động — nền tảng hình thành kỹ xảo); Trí nhớ cảm xúc (nhớ những rung cảm, xúc động đã trải qua, VD: đỏ mặt khi nhớ kỉ niệm cũ); Trí nhớ hình ảnh (nhớ hình ảnh, âm thanh, mùi vị đã tri giác); Trí nhớ từ ngữ - logic (nhớ ý nghĩa, tư tưởng, khái niệm — loại trí nhớ đặc trưng, giữ vai trò chính ở con người)."],
  ["Loại trí nhớ nào đúng với trí nhớ hình ảnh?",
    ["Nhớ về phong cảnh đẹp, mùi thơm","Sự tái mặt hay đỏ mặt khi nhớ đến kỉ niệm cũ","Học sinh nhớ ánh mắt của cô giáo khi giảng bài","Nhớ giờ bắt đầu và địa điểm buổi nói chuyện"], 0,
    "Nhớ phong cảnh đẹp, mùi thơm (hình ảnh, âm thanh, mùi vị đã tri giác) là biểu hiện của trí nhớ hình ảnh.",
    "Trí nhớ phân theo nội dung phản ánh: Trí nhớ vận động (nhớ các động tác, thao tác vận động — nền tảng hình thành kỹ xảo); Trí nhớ cảm xúc (nhớ những rung cảm, xúc động đã trải qua, VD: đỏ mặt khi nhớ kỉ niệm cũ); Trí nhớ hình ảnh (nhớ hình ảnh, âm thanh, mùi vị đã tri giác); Trí nhớ từ ngữ - logic (nhớ ý nghĩa, tư tưởng, khái niệm — loại trí nhớ đặc trưng, giữ vai trò chính ở con người)."],
  ["Đặc điểm không phù hợp với quá trình tư duy:",
    ["Phản ánh những hình ảnh đã xảy ra trong quá khứ","Nảy sinh trước các tình huống có vấn đề","Sử dụng nguyên liệu của nhận thức cảm tính","Là quá trình nhận thức đi tìm cái mới"], 0,
    "Tư duy luôn hướng tới tìm cái mới, chưa biết — \"phản ánh hình ảnh đã xảy ra trong quá khứ\" thực chất là đặc điểm của trí nhớ, không phải tư duy.",
    "Tư duy là quá trình nhận thức lí tính bậc cao, phản ánh những thuộc tính bản chất, những mối liên hệ và quan hệ có tính quy luật của sự vật, hiện tượng mà trước đó chủ thể chưa biết. Tư duy chỉ nảy sinh khi gặp 'tình huống có vấn đề' — vấn đề mới, không xa lạ hoàn toàn (phải liên quan tới kinh nghiệm đã có) nhưng vượt quá hiểu biết cũ, đòi hỏi phải tìm cách giải quyết mới."],
  ["Tư duy là quá trình phản ánh các thuộc tính nào của sự vật, hiện tượng?",
    ["Riêng lẻ bề ngoài","Trọn vẹn bề ngoài","Bản chất, mối liên hệ có tính quy luật mà ta đã biết","Bản chất, mối liên hệ có tính quy luật mà trước đó ta chưa biết"], 3,
    "Tư duy phản ánh những thuộc tính bản chất, mối liên hệ có tính quy luật MÀ TRƯỚC ĐÓ TA CHƯA BIẾT — đây là điểm khác biệt quan trọng so với việc chỉ nhắc lại kiến thức đã biết.",
    "Tư duy là quá trình nhận thức lí tính bậc cao, phản ánh những thuộc tính bản chất, những mối liên hệ và quan hệ có tính quy luật của sự vật, hiện tượng mà trước đó chủ thể chưa biết. Tư duy chỉ nảy sinh khi gặp 'tình huống có vấn đề' — vấn đề mới, không xa lạ hoàn toàn (phải liên quan tới kinh nghiệm đã có) nhưng vượt quá hiểu biết cũ, đòi hỏi phải tìm cách giải quyết mới."],
  ["Hành động giúp người học phát hiện logic của đối tượng, điểm xuất phát lĩnh hội khái niệm là:",
    ["Phân tích","Mô hình hóa","Cụ thể hóa","Kiểm tra đánh giá"], 0,
    "Phân tích giúp người học 'bóc tách' cấu trúc logic của đối tượng thành các thành phần, đây là bước xuất phát để lĩnh hội khái niệm mới.",
    "Các thao tác tư duy cơ bản: Phân tích (tách đối tượng thành các bộ phận, thành phần); Tổng hợp (hợp nhất các bộ phận đã phân tích thành một chỉnh thể); So sánh (xác định sự giống và khác nhau giữa các đối tượng); Trừu tượng hóa (gạt bỏ những thuộc tính không bản chất, giữ lại thuộc tính bản chất); Khái quát hóa (hợp nhất theo thuộc tính bản chất chung). Các thao tác này không thực hiện theo trình tự máy móc, cố định mà diễn ra linh hoạt tùy theo nhiệm vụ tư duy cụ thể."],
  ["Điều kiện nào không cần thiết để tình huống làm nảy sinh tư duy?",
    ["Tình huống phải quen thuộc, không xa lạ với cá nhân","Chứa vấn đề mà hiểu biết cũ không giải quyết được","Cá nhân nhận thức được tình huống","Vấn đề liên quan đến kinh nghiệm của cá nhân"], 0,
    "Tình huống làm nảy sinh tư duy cần liên quan đến kinh nghiệm cá nhân (không hoàn toàn xa lạ) nhưng chứa yếu tố mới — \"tình huống quen thuộc\" không phải là điều kiện bắt buộc và không nhất thiết đúng, vì tình huống có thể mới lạ miễn là cá nhân nhận thức được và có liên hệ với kinh nghiệm.",
    "Tư duy là quá trình nhận thức lí tính bậc cao, phản ánh những thuộc tính bản chất, những mối liên hệ và quan hệ có tính quy luật của sự vật, hiện tượng mà trước đó chủ thể chưa biết. Tư duy chỉ nảy sinh khi gặp 'tình huống có vấn đề' — vấn đề mới, không xa lạ hoàn toàn (phải liên quan tới kinh nghiệm đã có) nhưng vượt quá hiểu biết cũ, đòi hỏi phải tìm cách giải quyết mới."],
  ["Áp dụng \"thử - sai\", Nam xác định được giờ xe bus đến. Điều này nhấn mạnh đến quá trình nào?",
    ["Tưởng tượng","Tư duy","Cảm giác","Tri giác"], 1,
    "Phương pháp \"thử - sai\" tìm ra quy luật (giờ xe đến) là một quá trình suy luận, tìm ra mối liên hệ có tính quy luật mới — đây là đặc trưng của tư duy.",
    "Tư duy là quá trình nhận thức lí tính bậc cao, phản ánh những thuộc tính bản chất, những mối liên hệ và quan hệ có tính quy luật của sự vật, hiện tượng mà trước đó chủ thể chưa biết. Tư duy chỉ nảy sinh khi gặp 'tình huống có vấn đề' — vấn đề mới, không xa lạ hoàn toàn (phải liên quan tới kinh nghiệm đã có) nhưng vượt quá hiểu biết cũ, đòi hỏi phải tìm cách giải quyết mới."],
  ["Quả táo rơi giúp Newton tìm ra định luật vạn vật hấp dẫn. Chứng minh đặc điểm nào của tư duy?",
    ["Tính trừu tượng","Tính khái quát","Tư duy liên hệ chặt chẽ với nhận thức cảm tính","Tư duy liên hệ chặt chẽ với ngôn ngữ"], 2,
    "Newton liên hệ hiện tượng quả táo rơi (đã tri giác) với một quy luật vật lí tổng quát — thể hiện tư duy luôn gắn bó chặt chẽ với nhận thức cảm tính (lấy dữ liệu cảm tính làm điểm khởi đầu để khái quát).",
    "Tư duy có các đặc điểm cơ bản: Tính 'có vấn đề' (chỉ nảy sinh khi gặp tình huống chưa biết cách giải quyết); Tính gián tiếp (dùng ngôn ngữ, công cụ, kinh nghiệm để nhận thức chứ không cần tác động trực tiếp của sự vật); Tính trừu tượng và khái quát (phản ánh cái chung, cái bản chất của một loạt sự vật cùng loại); Quan hệ chặt chẽ với ngôn ngữ (không có ngôn ngữ thì tư duy không thể diễn ra và biểu đạt); Quan hệ chặt chẽ với nhận thức cảm tính (lấy cảm giác, tri giác làm 'nguyên liệu' đầu vào, và kết quả tư duy được kiểm nghiệm lại qua thực tiễn cảm tính)."],
  ["Thao tác nào phân chia đối tượng nhận thức thành các bộ phận thành phần khác nhau?",
    ["Phân tích","Tổng hợp","Khái quát","So sánh"], 0,
    "Phân tích là thao tác tách một đối tượng thành các bộ phận, thành phần khác nhau.",

  ["Thao tác nào hợp nhất các thành phần đã tách rời thành một chỉnh thể?",

  ["Thao tác nào xác định sự giống và khác nhau giữa các đối tượng nhận thức?",

  ["Cố gắng dùng lý thuyết để giải thích tại sao nước biển có màu xanh. Nhấn mạnh đến quá trình nào?",
    ["Tưởng tượng","Tư duy","Cảm giác","Tri giác"], 1,
    "Đây là một quá trình tìm nguyên nhân, giải thích bản chất hiện tượng bằng lí thuyết đã có — đặc trưng của tư duy (không phải tưởng tượng, cảm giác hay tri giác).",

  ["\"Quá trình nhận thức phản ánh những thuộc tính bản chất, mối liên hệ có tính quy luật mà trước đó ta chưa biết\". Là hiện tượng nào?",

  ["Người lao động chọn con đường ngắn nhất để đi đến nơi công sở. Loại tư duy nào?",
    ["Tư duy hình ảnh cụ thể","Tư duy thực hành","Tư duy trừu tượng","Tư duy lí luận"], 1,
    "Chọn đường ngắn nhất khi đi làm là một tư duy thực hành, ứng dụng trực tiếp vào công việc hàng ngày (không đòi hỏi lí luận trừu tượng phức tạp).",
    "Tư duy phân loại theo phương tiện/phương thức giải quyết: Tư duy trực quan - hành động (giải quyết bằng hành động vận động cụ thể có thể quan sát được, thường ở trẻ nhỏ hoặc công việc chân tay); Tư duy trực quan - hình ảnh (giải quyết dựa trên hình ảnh cụ thể của sự vật hiện tượng, không cần thao tác vật lí trực tiếp); Tư duy trừu tượng/lí luận (giải quyết dựa trên khái niệm, phán đoán, suy luận logic bằng ngôn ngữ, không cần sự vật cụ thể trước mắt)."],
  ["Trẻ em làm toán bằng cách dùng tay di chuyển các đối tượng cụ thể. Loại tư duy nào?",

  ["Đặc điểm chỉ đúng với tư duy:",

  ["Đặc điểm chỉ đúng với tư duy:",

  ["Đặc điểm chỉ đúng với tư duy:",

    "Tư duy là quá trình nhận thức lí tính bậc cao, phản ánh những thuộc tính bản chất, những mối liên hệ và quan hệ có tính quy luật của sự vật, hiện tượng mà trước đó chủ thể chưa biết. Tư duy chỉ nảy sinh khi gặp 'tình huống có vấn đề' — vấn đề mới, không xa lạ hoàn toàn (phải liên quan tới kinh nghiệm đã có) nhưng vượt quá hiểu biết cũ, đòi hỏi phải tìm cách giải quyết mới."],
  ["Mệnh đề đúng với cả tư duy và tưởng tượng:",

    "Cả tư duy và tưởng tượng đều là các quá trình nhận thức lí tính (mức độ cao hơn cảm tính), điểm chung cơ bản nhất của hai quá trình này.",
    "Tưởng tượng là quá trình nhận thức lí tính phản ánh những cái chưa từng có trong kinh nghiệm của cá nhân, bằng cách xây dựng những hình ảnh mới trên cơ sở những biểu tượng đã có. Khác với tư duy: tưởng tượng xuất hiện khi tình huống có tính bất định cao (dữ liệu không rõ ràng, không đầy đủ), cho phép 'nhảy cóc' qua một số giai đoạn tư duy chặt chẽ; còn tư duy đòi hỏi dữ liệu rõ ràng, giải quyết theo trình tự logic chặt chẽ hơn."],
  ["\"Quá trình nhận thức phản ánh những cái chưa có trong kinh nghiệm bằng cách xây dựng hình ảnh mới từ biểu tượng đã có\". Hiện tượng nào?",

  ["Đặc điểm chỉ đúng với tưởng tượng:",

  ["Đặc điểm chỉ đúng với tưởng tượng:",

  ["\"Tạo ra hình ảnh hoặc chương trình hành vi không được thực hiện hoặc không thể thực hiện\". Loại tưởng tượng nào?",

  ["\"Tạo ra hình ảnh nhằm đáp ứng nhu cầu, kích thích tính tích cực của con người\". Loại tưởng tượng nào?",
    ["Tưởng tượng tích cực","Tưởng tượng tiêu cực","Ước mơ","Lý tưởng"], 0,
    "\"Đáp ứng nhu cầu, kích thích tính tích cực\" là đặc trưng của tưởng tượng tích cực.",
    "Tưởng tượng phân theo tính chủ động và hiệu lực: Tưởng tượng tích cực (tạo hình ảnh đáp ứng nhu cầu, kích thích tính tích cực hành động của con người) và Tưởng tượng tiêu cực (tạo ra hình ảnh không được/không thể thực hiện trong thực tế, thường mang tính thay thế hành động thật — VD: mơ mộng viển vông). Trong tưởng tượng tích cực có 2 dạng đặc biệt: Ước mơ (hướng tới tương lai mong muốn của cá nhân, không trực tiếp thể hiện trong hoạt động hiện tại) và Lý tưởng (hình ảnh chói lọi, rực sáng, có tác dụng lôi cuốn mạnh mẽ toàn bộ hoạt động của cá nhân trong thời gian dài)."],
  ["\"Tượng nhân sư\" ở Giza nhấn mạnh đến cách tưởng tượng nào?",
    ["Nhấn mạnh","Chắp ghép","Liên hợp","Điển hình hóa"], 1,
    "Tượng nhân sư ghép đầu người với thân sư tử — giữ nguyên hình dạng từng bộ phận rồi ghép lại — đây là cách chắp ghép.",
    "6 cách sáng tạo hình ảnh mới trong tưởng tượng: (1) Chắp ghép — ghép các bộ phận của nhiều sự vật khác nhau, giữ nguyên hình dạng, thành một hình ảnh mới (VD: nàng tiên cá, nhân sư); (2) Liên hợp — ghép các bộ phận/chức năng nhưng có cải biến, sắp xếp lại để tạo ra một chỉnh thể có chức năng mới (VD: xe tăng lội nước, bút đa năng, robot có nhiều cảm biến kết hợp); (3) Nhấn mạnh — phóng đại một bộ phận/thuộc tính để biểu đạt ý nghĩa (VD: tranh biếm họa, tượng nghìn tay nghìn mắt); (4) Điển hình hóa — khái quát những nét chung, tiêu biểu của cả một nhóm đối tượng vào một hình tượng đại diện; (5) Loại suy (mô phỏng) — dựa trên sự tương tự với một cấu tạo/nguyên lí đã có trong tự nhiên (VD: tàu ngầm mô phỏng da cá heo, robot bay mô phỏng cánh chim/bướm); (6) Thay đổi kích thước, số lượng — phóng to/thu nhỏ hoặc tăng giảm số lượng bộ phận so với thực tế (VD: quả cầu địa lí thu nhỏ Trái Đất)."],
  ["Ý nào không phản ánh đúng vai trò của tư duy đối với con người?",
    ["Giúp con người hành động có ý thức","Không bao giờ sai lầm trong nhận thức","Mở rộng vô hạn phạm vi nhận thức","Giúp con người vượt khỏi thích nghi thụ động"], 1,
    "\"Không bao giờ sai lầm\" là phát biểu SAI về tư duy — con người vẫn có thể tư duy sai (do thiếu thông tin, thiên kiến...), nên đây là đáp án không phản ánh đúng vai trò của tư duy.",
    "Tư duy có các đặc điểm cơ bản: Tính 'có vấn đề' (chỉ nảy sinh khi gặp tình huống chưa biết cách giải quyết); Tính gián tiếp (dùng ngôn ngữ, công cụ, kinh nghiệm để nhận thức chứ không cần tác động trực tiếp của sự vật); Tính trừu tượng và khái quát (phản ánh cái chung, cái bản chất của một loạt sự vật cùng loại); Quan hệ chặt chẽ với ngôn ngữ (không có ngôn ngữ thì tư duy không thể diễn ra và biểu đạt); Quan hệ chặt chẽ với nhận thức cảm tính (lấy cảm giác, tri giác làm 'nguyên liệu' đầu vào, và kết quả tư duy được kiểm nghiệm lại qua thực tiễn cảm tính)."],
  ["Tư duy là quá trình phản ánh các thuộc tính nào của sự vật?",
    ["Riêng lẻ bề ngoài","Trọn vẹn bề ngoài","Bản chất, mối liên hệ có tính quy luật mà ta đã biết","Bản chất, mối liên hệ có tính quy luật mà trước đó ta chưa biết"], 3,
    "Tư duy phản ánh thuộc tính bản chất, mối liên hệ quy luật MÀ TRƯỚC ĐÓ CHƯA BIẾT — đây là đặc trưng làm nên giá trị nhận thức mới của tư duy.",
    "Tư duy là quá trình nhận thức lí tính bậc cao, phản ánh những thuộc tính bản chất, những mối liên hệ và quan hệ có tính quy luật của sự vật, hiện tượng mà trước đó chủ thể chưa biết. Tư duy chỉ nảy sinh khi gặp 'tình huống có vấn đề' — vấn đề mới, không xa lạ hoàn toàn (phải liên quan tới kinh nghiệm đã có) nhưng vượt quá hiểu biết cũ, đòi hỏi phải tìm cách giải quyết mới."],
  ["Sản phẩm của quá trình tư duy là gì?",
    ["Biểu tượng mới","Biểu tượng đã có","Hình ảnh","Lập luận, phán đoán, suy luận"], 3,
    "Sản phẩm của tư duy là các kết quả lập luận: phán đoán, suy luận (thể hiện thành khái niệm, quy luật), không phải biểu tượng hay hình ảnh đơn thuần.",
    "Tư duy là quá trình nhận thức lí tính bậc cao, phản ánh những thuộc tính bản chất, những mối liên hệ và quan hệ có tính quy luật của sự vật, hiện tượng mà trước đó chủ thể chưa biết. Tư duy chỉ nảy sinh khi gặp 'tình huống có vấn đề' — vấn đề mới, không xa lạ hoàn toàn (phải liên quan tới kinh nghiệm đã có) nhưng vượt quá hiểu biết cũ, đòi hỏi phải tìm cách giải quyết mới."],
  ["Học sinh xếp cá voi vào loài cá vì sống ở dưới nước. Không dùng thao tác tư duy nào?",
    ["Phân tích","Trừu tượng hóa","So sánh","Tổng hợp"], 1,
    "Xếp cá voi vào 'loài cá' dựa trên đặc điểm bề ngoài (sống dưới nước) là một sự trừu tượng hóa SAI (bỏ qua đặc điểm sinh học thật: cá voi là thú, không phải cá) — chứng tỏ KHÔNG dùng đúng thao tác trừu tượng hóa (lẽ ra phải trừu tượng hóa đúng những thuộc tính bản chất như hô hấp bằng phổi, đẻ con...).",
    "Các thao tác tư duy cơ bản: Phân tích (tách đối tượng thành các bộ phận, thành phần); Tổng hợp (hợp nhất các bộ phận đã phân tích thành một chỉnh thể); So sánh (xác định sự giống và khác nhau giữa các đối tượng); Trừu tượng hóa (gạt bỏ những thuộc tính không bản chất, giữ lại thuộc tính bản chất); Khái quát hóa (hợp nhất theo thuộc tính bản chất chung). Các thao tác này không thực hiện theo trình tự máy móc, cố định mà diễn ra linh hoạt tùy theo nhiệm vụ tư duy cụ thể."],
  ["Sự đổi mới sáng tạo về các loại bút viết nhấn mạnh đến cách tưởng tượng nào?",

  ["Sự đổi mới sáng tạo (thêm nhiều chức năng) nhấn mạnh đến cách tưởng tượng nào?",

  ["Kỹ sư chế tạo tàu dựa theo cấu tạo da cá heo nhấn mạnh đến cách tưởng tượng nào?",

  ["Robot bay mô phỏng chuyển động của chim/bướm nhấn mạnh đến cách tưởng tượng nào?",
